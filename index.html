      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}
      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
        <button onClick={onCancel} style={btnGhost()} disabled={busy}>Cancel</button>
        <button onClick={save} disabled={!valid || busy} style={btn(!valid || busy)}>
          {busy ? 'Saving…' : 'Save changes'}
        </button>
      </div>
    </div>
  );
}

// ============================================================
// SCHEDULE SECTION
// In-place editor for the project's invoice/claim schedule.
// Uses the same row editors as the wizard. Dirty-tracked with explicit save.
// ============================================================
function ScheduleSection({ project, invoices, setInvoices, access, showFlash }) {
  const [rows, setRows] = useState(null);
  const [dirty, setDirty] = useState(false);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const projectValue = Number(project.value) || 0;
  const isStage = project.payment_type === 'stage';

  // Seed local state from server data; reset on server change unless user is editing
  useEffect(() => {
    if (invoices === null) return;
    if (!dirty) {
      setRows(invoices.map((r, i) => ({
        _key: r.id || `existing-${i}-${Math.random()}`,
        id: r.id,
        sequence: r.sequence,
        invoice_date: r.invoice_date || '',
        payment_date_override: r.payment_date_override || '',
        invoice_pct: r.invoice_pct == null ? '' : r.invoice_pct,
        invoice_value_net: r.invoice_value_net == null ? '' : r.invoice_value_net,
        notes: r.notes || '',
      })));
    }
  }, [invoices, dirty]);

  if (rows === null) return null;

  const markDirty = (next) => { setRows(next); setDirty(true); };

  const addRow = () => {
    markDirty([...rows, {
      _key: `new-${Date.now()}-${Math.random()}`,
      id: null, sequence: rows.length + 1,
      invoice_date: '', payment_date_override: '',
      invoice_pct: isStage ? '' : null,
      invoice_value_net: isStage ? null : '',
      notes: '',
    }]);
  };
  const removeRow = (key) => {
    markDirty(rows.filter(r => r._key !== key).map((r, i) => ({ ...r, sequence: i + 1 })));
  };
  const updateRow = (key, field, value) => {
    markDirty(rows.map(r => r._key === key ? { ...r, [field]: value } : r));
  };

  // Stage validation: % must sum to 100
  const sumPct = isStage ? rows.reduce((s, r) => s + (Number(r.invoice_pct) || 0), 0) : null;
  const validSum = !isStage || Math.abs(sumPct - 100) <= 0.005;

  const save = async () => {
    setError('');
    if (rows.length === 0) { setError(`Add at least one ${isStage ? 'stage' : 'claim'}.`); return; }
    if (rows.some(r => !r.invoice_date)) { setError(`Every row needs an invoice date.`); return; }
    if (isStage && !validSum) { setError('Stages must sum to 100%.'); return; }
    if (!isStage && rows.some(r => r.invoice_value_net === '' || Number(r.invoice_value_net) <= 0)) {
      setError('Every claim needs a positive value.'); return;
    }
    const bad = rows.find(r => r.payment_date_override && cmpDate(r.payment_date_override, r.invoice_date) < 0);
    if (bad) { setError(`Row ${bad.sequence}: payment date is before the invoice date.`); return; }

    setBusy(true);
    try {
      // Wipe-and-rewrite — matches wizard pattern
      await sbDelete('project_invoices', `project_id=eq.${project.id}`, access.session);
      const pctToGbp = (p) => Number(p) / 100 * projectValue;
      const inserts = rows.map(r => ({
        project_id: project.id,
        sequence: r.sequence,
        invoice_date: r.invoice_date,
        payment_date_override: r.payment_date_override || null,
        invoice_pct: isStage ? Number(r.invoice_pct) : null,
        invoice_value_net: isStage ? pctToGbp(r.invoice_pct) : Number(r.invoice_value_net),
        notes: r.notes || null,
      }));
      let newRows = [];
      if (inserts.length > 0) {
        newRows = await sbInsert('project_invoices', inserts, access.session);
      }
      // Log structural event
      await sbUpdate('projects', `id=eq.${project.id}`, {
        audit_log: [
          ...(Array.isArray(project.audit_log) ? project.audit_log : []),
          { event: 'schedule_edited', actor: getEmail(access.session), at: new Date().toISOString(), row_count: rows.length },
        ],
      }, access.session);
      setInvoices(newRows);
      setDirty(false);
      showFlash('ok', 'Schedule saved.');
    } catch (e) {
      setError(e.message);
    } finally { setBusy(false); }
  };

  const discard = () => {
    setRows(invoices.map((r, i) => ({
      _key: r.id || `existing-${i}-${Math.random()}`,
      id: r.id, sequence: r.sequence,
      invoice_date: r.invoice_date || '',
      payment_date_override: r.payment_date_override || '',
      invoice_pct: r.invoice_pct == null ? '' : r.invoice_pct,
      invoice_value_net: r.invoice_value_net == null ? '' : r.invoice_value_net,
      notes: r.notes || '',
    })));
    setDirty(false); setError('');
  };

  const titleSuffix = isStage ? 'Stage payments' : 'Valuation claims';

  return (
    <SectionBox
      title={`Schedule — ${titleSuffix}`}
      actions={
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {dirty && <span style={{ fontSize: 11, color: C.amber, fontWeight: 600 }}>● Unsaved</span>}
          <button onClick={addRow} style={miniBtn()}>+ Add row</button>
        </div>
      }
    >
      {rows.length === 0 ? (
        <div style={{ padding: 24, textAlign: 'center', color: C.muted, fontSize: 13, border: `1px dashed ${C.line}`, borderRadius: 6 }}>
          No {isStage ? 'stages' : 'claims'} yet. Click + Add row above.
        </div>
      ) : (
        <div style={{ overflowX: 'auto' }}>
          <div style={{ minWidth: isStage ? 1100 : 1050 }}>
            <ScheduleHeaderRow isStage={isStage} />
            {rows.map(r => isStage ? (
              <StageRowEditor
                key={r._key} row={r} mode="pct" project={project} projectValue={projectValue}
                onChange={(field, value) => updateRow(r._key, field, value)}
                onRemove={() => removeRow(r._key)}
              />
            ) : (
              <ValuationRowEditor
                key={r._key} row={r} project={project}
                onChange={(field, value) => updateRow(r._key, field, value)}
                onRemove={() => removeRow(r._key)}
              />
            ))}
            <ScheduleSumRow
              rows={rows} project={project} isStage={isStage}
              validSum={validSum} sumPct={sumPct}
            />
          </div>
        </div>
      )}

      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginTop: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}

      {dirty && (
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 16, paddingTop: 16, borderTop: `1px solid ${C.line}` }}>
          <button onClick={discard} disabled={busy} style={btnGhost()}>Discard</button>
          <button onClick={save} disabled={busy || (isStage && !validSum)} style={btn(busy || (isStage && !validSum))}>
            {busy ? 'Saving…' : 'Save schedule'}
          </button>
        </div>
      )}
    </SectionBox>
  );
}

// ============================================================
// RETENTION RELEASES SECTION
// Like the schedule editor but simpler — release date + amount + type + notes.
// ============================================================
const RELEASE_TYPE_LABELS = {
  practical_completion: 'Practical Completion',
  end_of_defects:       'End of Defects',
  other:                'Other',
};

function RetentionReleasesSection({ project, releases, setReleases, access, showFlash }) {
  const [rows, setRows] = useState(null);
  const [dirty, setDirty] = useState(false);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    if (releases === null) return;
    if (!dirty) {
      setRows(releases.map((r, i) => ({
        _key: r.id || `existing-${i}-${Math.random()}`,
        id: r.id,
        release_date: r.release_date || '',
        amount: r.amount == null ? '' : r.amount,
        release_type: r.release_type || '',
        notes: r.notes || '',
      })));
    }
  }, [releases, dirty]);

  if (rows === null) return null;

  const markDirty = (next) => { setRows(next); setDirty(true); };

  const addRow = () => {
    markDirty([...rows, {
      _key: `new-${Date.now()}-${Math.random()}`,
      id: null, release_date: '', amount: '', release_type: '', notes: '',
    }]);
  };
  const removeRow = (key) => markDirty(rows.filter(r => r._key !== key));
  const updateRow = (key, field, value) => {
    markDirty(rows.map(r => r._key === key ? { ...r, [field]: value } : r));
  };
  // Bidirectional % ↔ £ — typing in the % column writes both pct and amount;
  // typing in the £ column writes amount only (pct is derived on display).
  // % is relative to project value (per construction convention — defects retention
  // is "2.5% of contract value" not "2.5% of the retention pot").
  const projectValueNum = Number(project.value) || 0;
  const updateAmountFromPct = (key, pct) => {
    if (pct === '' || pct == null) {
      markDirty(rows.map(r => r._key === key ? { ...r, amount: '' } : r));
      return;
    }
    const amount = round2((Number(pct) / 100) * projectValueNum);
    markDirty(rows.map(r => r._key === key ? { ...r, amount } : r));
  };

  const save = async () => {
    setError('');
    if (rows.some(r => !r.release_date)) { setError('Every release needs a date.'); return; }
    if (rows.some(r => r.amount === '' || Number(r.amount) === 0)) { setError('Every release needs a non-zero amount.'); return; }
    setBusy(true);
    try {
      await sbDelete('project_retention_releases', `project_id=eq.${project.id}`, access.session);
      const inserts = rows.map(r => ({
        project_id: project.id,
        release_date: r.release_date,
        amount: Number(r.amount),
        release_type: r.release_type || null,
        notes: r.notes || null,
      }));
      let newRows = [];
      if (inserts.length > 0) newRows = await sbInsert('project_retention_releases', inserts, access.session);
      await sbUpdate('projects', `id=eq.${project.id}`, {
        audit_log: [
          ...(Array.isArray(project.audit_log) ? project.audit_log : []),
          { event: 'retention_edited', actor: getEmail(access.session), at: new Date().toISOString(), row_count: rows.length },
        ],
      }, access.session);
      setReleases(newRows);
      setDirty(false);
      showFlash('ok', 'Retention releases saved.');
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };

  const discard = () => {
    setRows(releases.map((r, i) => ({
      _key: r.id || `existing-${i}-${Math.random()}`,
      id: r.id,
      release_date: r.release_date || '',
      amount: r.amount == null ? '' : r.amount,
      release_type: r.release_type || '',
      notes: r.notes || '',
    })));
    setDirty(false); setError('');
  };

  // Suggested guidance based on header settings
  const totalWithheld = (Number(project.retention_pct) || 0) / 100 * (Number(project.value) || 0);
  const defectsAmount = project.defects_retention_pct != null
    ? Number(project.defects_retention_pct) / 100 * (Number(project.value) || 0)
    : null;
  const pcAmount = defectsAmount != null ? totalWithheld - defectsAmount : null;

  // Generate suggested release rows from project header values.
  //   - If defects_retention_pct is set: two rows (PC then End of Defects)
  //   - Otherwise: one row at retention_date (or end_date) for the full amount
  //   - PC date defaults to project end_date; End of Defects defaults to retention_date
  //     (or end_date + 12 months if blank)
  const canGenerate = totalWithheld > 0 && rows.length === 0;
  const generateSuggested = () => {
    const startDate = project.end_date || addDays(new Date().toISOString().slice(0, 10), 0);
    const eodDate = project.retention_date || (project.end_date ? addDays(project.end_date, 365) : '');
    const newRows = [];
    if (pcAmount != null && pcAmount > 0) {
      newRows.push({
        _key: `gen-pc-${Date.now()}`,
        id: null,
        release_date: startDate,
        amount: round2(pcAmount),
        release_type: 'practical_completion',
        notes: '',
      });
      newRows.push({
        _key: `gen-eod-${Date.now() + 1}`,
        id: null,
        release_date: eodDate,
        amount: round2(defectsAmount),
        release_type: 'end_of_defects',
        notes: '',
      });
    } else {
      newRows.push({
        _key: `gen-single-${Date.now()}`,
        id: null,
        release_date: project.retention_date || startDate,
        amount: round2(totalWithheld),
        release_type: 'other',
        notes: '',
      });
    }
    setRows(newRows);
    setDirty(true);
  };

  return (
    <SectionBox
      title="Retention releases"
      actions={
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {dirty && <span style={{ fontSize: 11, color: C.amber, fontWeight: 600 }}>● Unsaved</span>}
          {canGenerate && (
            <button onClick={generateSuggested} style={miniBtn()} title="Generate suggested release rows from project header">
              ⚡ Auto-generate
            </button>
          )}
          <button onClick={addRow} style={miniBtn()}>+ Add release</button>
        </div>
      }
    >
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, padding: '8px 12px', background: C.bg, borderRadius: 6, lineHeight: 1.5 }}>
        Add cash events for retention being released back to Arke. Each appears as a separate cash-in row on the cashflow grid.
        {totalWithheld > 0 && (
          <React.Fragment>
            {' '}This project is expected to withhold <strong>£{fmtMoney(totalWithheld)}</strong> in total retention
            {pcAmount != null && (
              <span> — typically released as <strong>£{fmtMoney(pcAmount)}</strong> at Practical Completion and <strong>£{fmtMoney(defectsAmount)}</strong> at End of Defects.</span>
            )}
          </React.Fragment>
        )}
      </div>

      {rows.length === 0 ? (
        <div style={{ padding: 24, textAlign: 'center', color: C.muted, fontSize: 13, border: `1px dashed ${C.line}`, borderRadius: 6 }}>
          No retention releases yet. Click + Add release.
        </div>
      ) : (
        <div>
          <div style={{
            display: 'grid', gridTemplateColumns: '1.2fr 0.7fr 1.1fr 1.3fr 1.6fr 40px',
            gap: 8, padding: '6px 4px',
            fontSize: 11, color: C.muted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em',
          }}>
            <div>Date</div>
            <div style={{ textAlign: 'right' }}>% of value</div>
            <div style={{ textAlign: 'right' }}>Amount £</div>
            <div>Release type</div>
            <div>Notes</div>
            <div></div>
          </div>
          {rows.map(r => {
            // Derive % live from amount + project value
            const pctDisplay = (r.amount === '' || r.amount == null || projectValueNum === 0)
              ? ''
              : round2((Number(r.amount) / projectValueNum) * 100);
            return (
              <div key={r._key} style={{
                display: 'grid', gridTemplateColumns: '1.2fr 0.7fr 1.1fr 1.3fr 1.6fr 40px',
                gap: 8, padding: '6px 4px', alignItems: 'flex-start',
              }}>
                <DateField
                  value={r.release_date}
                  onChange={(v) => updateRow(r._key, 'release_date', v)}
                  min={project.end_date || undefined}
                />
                <NumberInput
                  value={pctDisplay}
                  onChange={(v) => updateAmountFromPct(r._key, v)}
                  step="0.01" align="right"
                />
                <NumberInput
                  value={r.amount}
                  onChange={(v) => updateRow(r._key, 'amount', v)}
                  step="0.01" align="right"
                />
                <select
                  value={r.release_type}
                  onChange={(e) => updateRow(r._key, 'release_type', e.target.value)}
                  style={{ ...inp(), padding: '8px 8px' }}
                >
                  <option value="">— Not specified —</option>
                  <option value="practical_completion">Practical Completion</option>
                  <option value="end_of_defects">End of Defects</option>
                  <option value="other">Other</option>
                </select>
                <input
                  value={r.notes}
                  onChange={(e) => updateRow(r._key, 'notes', e.target.value)}
                  style={inp()}
                  placeholder="Optional"
                />
                <button onClick={() => removeRow(r._key)} style={{ ...miniBtn(), color: C.redStatus, padding: '6px 8px' }}>×</button>
              </div>
            );
          })}
          {/* Sum row */}
          {(() => {
            const sumAmount = rows.reduce((s, r) => s + (Number(r.amount) || 0), 0);
            const sumPct = projectValueNum > 0 ? (sumAmount / projectValueNum) * 100 : 0;
            const expectedPct = Number(project.retention_pct) || 0;
            const matches = Math.abs(sumPct - expectedPct) < 0.005;
            return (
              <div style={{
                display: 'grid', gridTemplateColumns: '1.2fr 0.7fr 1.1fr 1.3fr 1.6fr 40px',
                gap: 8, padding: '10px 4px 4px',
                borderTop: `2px solid ${C.line}`, marginTop: 8, alignItems: 'center',
              }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.text, paddingLeft: 4 }}>Sum</div>
                <div style={{
                  padding: '8px 8px', background: C.redSoft,
                  border: `1px solid ${matches ? C.line : C.amber}`,
                  borderRadius: 4, fontSize: 13, fontWeight: 700,
                  color: matches ? C.green : C.amber, textAlign: 'right',
                  fontVariantNumeric: 'tabular-nums',
                }}>{sumPct.toFixed(2)}%</div>
                <DerivedMoneyCell value={sumAmount} bold color={matches ? C.green : C.text} />
                <div style={{ fontSize: 11, color: C.muted, paddingLeft: 4 }}>
                  {expectedPct > 0 && (matches
                    ? `✓ matches ${expectedPct}% retention`
                    : `expected ${expectedPct}%`)}
                </div>
                <div></div>
                <div></div>
              </div>
            );
          })()}
        </div>
      )}

      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginTop: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}

      {dirty && (
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 16, paddingTop: 16, borderTop: `1px solid ${C.line}` }}>
          <button onClick={discard} disabled={busy} style={btnGhost()}>Discard</button>
          <button onClick={save} disabled={busy} style={btn(busy)}>
            {busy ? 'Saving…' : 'Save releases'}
          </button>
        </div>
      )}
    </SectionBox>
  );
}

// ============================================================
// RETENTION POT CARD — shows withheld / released / balance
// ============================================================
function RetentionPotCard({ project, invoices, releases }) {
  const retPct = Number(project.retention_pct) || 0;
  if (retPct === 0) return null;

  const projectValue = Number(project.value) || 0;
  const totalExpected = retPct / 100 * projectValue;

  // Withheld so far = sum over invoices of (gross × retention%)
  // For stage rows: gross = invoice_pct/100 × project_value
  // For valuation rows: gross = invoice_value_net (already gross of retention)
  const withheld = (invoices || []).reduce((sum, inv) => {
    let gross = 0;
    if (inv.invoice_pct != null) {
      gross = (Number(inv.invoice_pct) / 100) * projectValue;
    } else if (inv.invoice_value_net != null) {
      gross = Number(inv.invoice_value_net);
    }
    return sum + gross * (retPct / 100);
  }, 0);

  const released = (releases || []).reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
  const balance = withheld - released;

  // Helper for the "in/out" tile colours
  const stat = (label, value, color) => (
    <div style={{ minWidth: 0 }}>
      <div style={{ fontSize: 11, color: C.muted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{label}</div>
      <div style={{ fontSize: 18, fontWeight: 700, color: color || C.text, fontVariantNumeric: 'tabular-nums', marginTop: 2 }}>
        £{fmtMoney(value)}
      </div>
    </div>
  );

  // Sanity-check warning
  const reconciles = Math.abs(withheld - released) < 0.01;
  const overReleased = released > withheld + 0.01;

  return (
    <SectionBox title="Retention pot">
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
        {stat('Expected total', totalExpected, C.text)}
        {stat('Withheld so far', withheld, C.prussian)}
        {stat('Released so far', released, C.green)}
        {stat('Balance held', balance, balance < 0 ? C.redStatus : C.text)}
      </div>
      {overReleased && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 12, marginTop: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          ⚠ Releases exceed withheld retention. Check your release rows against the invoiced amounts.
        </div>
      )}
      {!overReleased && reconciles && withheld > 0 && (
        <div style={{ background: C.greenLight, color: C.green, padding: 10, borderRadius: 6, fontSize: 12, marginTop: 12, borderLeft: `3px solid ${C.green}`, fontWeight: 500 }}>
          ✓ Retention fully reconciled.
        </div>
      )}
    </SectionBox>
  );
}

// ============================================================
// CASHFLOW RECONCILIATION CARD
// Compares the EXPECTED total cashflow (project value + VAT) against the
// ACTUAL projected cashflow (sum of invoice-driven cash events + retention releases).
// Flags up any mismatch so the user knows to fix the schedule.
// ============================================================
function CashflowReconciliationCard({ project, invoices, releases }) {
  const projectValue = Number(project.value) || 0;
  if (projectValue === 0) return null;
  const vatRate = (project.vat_rate == null || project.vat_rate === '') ? 0.20 : Number(project.vat_rate);

  // Expected: every pound of the project value lands in Arke's account (after
  // retention is held and then released) plus VAT on top of all of it.
  const expectedTotal = projectValue * (1 + vatRate);

  // Actual: sum of all projected cash events for this project. The engine
  // already deducts retention from invoices and accounts for retention releases.
  const events = projectCashEvents(project, invoices, releases);
  const actualTotal = events.reduce((s, e) => s + e.gross, 0);

  const diff = expectedTotal - actualTotal;
  const reconciles = Math.abs(diff) < 0.01;
  const short = diff > 0; // schedule + releases come up short
  const over = diff < 0;  // schedule + releases overshoot

  const stat = (label, value, color) => (
    <div style={{ minWidth: 0 }}>
      <div style={{ fontSize: 11, color: C.muted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{label}</div>
      <div style={{ fontSize: 18, fontWeight: 700, color: color || C.text, fontVariantNumeric: 'tabular-nums', marginTop: 2 }}>
        £{fmtMoney(value)}
      </div>
    </div>
  );

  return (
    <SectionBox title="Cashflow reconciliation">
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.5 }}>
        Every pound of the project value should land in Arke's bank account by the time the schedule and retention releases are complete. Mismatches usually mean the schedule is missing rows, retention isn't fully scheduled for release, or a value is wrong.
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
        {stat('Expected (value + VAT)', expectedTotal, C.text)}
        {stat('Projected cashflow', actualTotal, reconciles ? C.green : C.text)}
        {stat(short ? 'Short by' : (over ? 'Over by' : 'Difference'), Math.abs(diff), reconciles ? C.green : C.redStatus)}
      </div>
      {reconciles ? (
        <div style={{ background: C.greenLight, color: C.green, padding: 10, borderRadius: 6, fontSize: 12, marginTop: 12, borderLeft: `3px solid ${C.green}`, fontWeight: 500 }}>
          ✓ Cashflow fully reconciles to the project value.
        </div>
      ) : (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 12, marginTop: 12, borderLeft: `3px solid ${C.redStatus}`, fontWeight: 500, lineHeight: 1.5 }}>
          ⚠ Schedule + retention releases {short ? 'come up short by' : 'overshoot by'} £{fmtMoney(Math.abs(diff))}.
          {short && (project.retention_pct > 0) && ' Have you added retention release rows for the full retention amount?'}
        </div>
      )}
    </SectionBox>
  );
}

// ============================================================
// PROJECT CASHFLOW ENGINE
// Compute per-cash-event details for a single project.
// Used by the mini-cashflow section here and (later) the master grid.
// Returns array of { date: ISO, gross, label, source }.
// ============================================================
function projectCashEvents(project, invoices, releases) {
  const events = [];
  const projectValue = Number(project.value) || 0;
  const retPct = Number(project.retention_pct) || 0;
  // VAT rate defaults to 20% if column is null/undefined. Number(null) returns 0
  // (not null), so we must check the raw value before coercing.
  const vatRate = (project.vat_rate == null || project.vat_rate === '') ? 0.20 : Number(project.vat_rate);
  const terms = Number(project.payment_terms_days) || 30;

  for (const inv of (invoices || [])) {
    // Gross amount (before retention deduction):
    //  stage rows: pct × project_value
    //  valuation rows: invoice_value_net (already gross)
    let gross = 0;
    if (inv.invoice_pct != null) {
      gross = (Number(inv.invoice_pct) / 100) * projectValue;
    } else if (inv.invoice_value_net != null) {
      gross = Number(inv.invoice_value_net);
    }
    const claim = gross * (1 - retPct / 100);     // what arrives in Arke's bank net-of-retention
    const vat = claim * vatRate;
    const cashIn = claim + vat;
    const payDate = inv.payment_date_override || (inv.invoice_date ? addDays(inv.invoice_date, terms) : '');
    if (payDate) {
      events.push({
        date: payDate,
        gross: cashIn,
        label: `Invoice ${inv.sequence}${inv.notes ? ' — ' + inv.notes : ''}`,
        source: 'invoice',
        breakdown: { gross, retention: gross - claim, claim, vat },
      });
    }
  }

  for (const r of (releases || [])) {
    const amount = Number(r.amount) || 0;
    const vat = amount * vatRate;
    const cashIn = amount + vat;
    events.push({
      date: r.release_date,
      gross: cashIn,
      label: `Retention release${r.release_type ? ' — ' + RELEASE_TYPE_LABELS[r.release_type] : ''}`,
      source: 'retention',
      breakdown: { amount, vat },
    });
  }

  events.sort((a, b) => cmpDate(a.date, b.date));
  return events;
}

// Find the Monday of the week containing an ISO date
function mondayOf(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00Z');
  if (isNaN(d.getTime())) return '';
  // getUTCDay: Sun=0..Sat=6. We want Mon as start of week.
  const day = d.getUTCDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setUTCDate(d.getUTCDate() + diff);
  return d.toISOString().slice(0, 10);
}

// ============================================================
// PROJECT MINI-CASHFLOW
// Shows 13 weeks of this project's cash events, from this week onward.
// ============================================================
function ProjectMiniCashflowSection({ project, invoices, releases }) {
  const events = useMemo(() => projectCashEvents(project, invoices, releases), [project, invoices, releases]);

  // Build a 13-week window starting from this week's Monday
  const startMonday = mondayOf(new Date().toISOString().slice(0, 10));
  const weeks = [];
  for (let i = 0; i < 13; i++) weeks.push(addDays(startMonday, i * 7));

  // Bucket events by week
  const byWeek = {};
  for (const e of events) {
    const wk = mondayOf(e.date);
    if (!wk) continue;
    if (!byWeek[wk]) byWeek[wk] = [];
    byWeek[wk].push(e);
  }

  // Past events (before window start) — collapsed line
  const pastEvents = events.filter(e => cmpDate(e.date, startMonday) < 0);
  const futureBeyondWindow = events.filter(e => cmpDate(e.date, addDays(startMonday, 13 * 7)) >= 0);

  return (
    <SectionBox title="Project cashflow (next 13 weeks)">
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 12 }}>
        Money expected from this project, week by week. All figures include VAT.
      </div>
      {pastEvents.length > 0 && (
        <div style={{ fontSize: 12, color: C.muted, padding: '6px 12px', background: C.bg, borderRadius: 4, marginBottom: 10 }}>
          {pastEvents.length} event{pastEvents.length !== 1 ? 's' : ''} before window — totalling £{fmtMoney(pastEvents.reduce((s, e) => s + e.gross, 0))}
        </div>
      )}
      <div style={{ overflowX: 'auto' }}>
        <div style={{ display: 'grid', gridTemplateColumns: `repeat(${weeks.length}, minmax(80px, 1fr))`, gap: 4, minWidth: weeks.length * 80 }}>
          {weeks.map(wk => (
            <div key={wk} style={{ textAlign: 'center', fontSize: 10, color: C.muted, fontWeight: 600, paddingBottom: 4 }}>
              {fmtDateShort(wk).replace(/, 20\d\d/, '')}
            </div>
          ))}
          {weeks.map(wk => {
            const wkEvents = byWeek[wk] || [];
            const total = wkEvents.reduce((s, e) => s + e.gross, 0);
            return (
              <div key={wk + '-cell'} style={{
                border: `1px solid ${C.line}`,
                background: total > 0 ? C.greenLight : C.white,
                borderRadius: 4, padding: 6, minHeight: 50,
                fontSize: 11, fontVariantNumeric: 'tabular-nums',
              }}>
                {wkEvents.length === 0 ? (
                  <div style={{ color: C.line, textAlign: 'center', marginTop: 8 }}>—</div>
                ) : (
                  <React.Fragment>
                    {wkEvents.map((e, i) => (
                      <div key={i} title={e.label} style={{
                        color: e.source === 'retention' ? C.prussian : C.text,
                        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                        fontWeight: 500,
                      }}>
                        £{fmtMoney(e.gross)}
                      </div>
                    ))}
                    {wkEvents.length > 1 && (
                      <div style={{ borderTop: `1px solid ${C.line}`, marginTop: 3, paddingTop: 2, fontWeight: 700, color: C.green }}>
                        £{fmtMoney(total)}
                      </div>
                    )}
                  </React.Fragment>
                )}
              </div>
            );
          })}
        </div>
      </div>
      {futureBeyondWindow.length > 0 && (
        <div style={{ fontSize: 12, color: C.muted, padding: '6px 12px', background: C.bg, borderRadius: 4, marginTop: 10 }}>
          {futureBeyondWindow.length} event{futureBeyondWindow.length !== 1 ? 's' : ''} after window — totalling £{fmtMoney(futureBeyondWindow.reduce((s, e) => s + e.gross, 0))}
        </div>
      )}
    </SectionBox>
  );
}

// ============================================================
// PROJECT LIFECYCLE TIMELINE — Gantt-style visual of the whole project
// Phases: active project band (start → end), defects period band (end → retention release)
// Markers: each invoice payment date + each retention release date
// ============================================================
function ProjectLifecycleTimeline({ project, invoices, releases }) {
  const start = project.start_date || null;
  const end = project.end_date || null;
  const retDate = project.retention_date || null;

  // We need at least start + (end or retention) to draw a useful timeline
  if (!start || (!end && !retDate)) {
    return null;
  }

  // Compute the timeline window. From start, to the latest of: retDate, end + 1 day, last event
  const today = new Date().toISOString().slice(0, 10);
  const terms = Number(project.payment_terms_days) || 30;

  // Build event list (invoices + releases + today marker)
  const events = [];
  for (const inv of (invoices || [])) {
    const payDate = inv.payment_date_override
      || (inv.invoice_date ? addDays(inv.invoice_date, terms) : null);
    if (payDate) {
      events.push({
        date: payDate,
        kind: 'invoice',
        label: `Invoice ${inv.sequence}${inv.notes ? ' — ' + inv.notes : ''}`,
      });
    }
  }
  for (const r of (releases || [])) {
    if (r.release_date) {
      events.push({
        date: r.release_date,
        kind: 'retention',
        label: `Retention release${r.release_type ? ' — ' + (RELEASE_TYPE_LABELS[r.release_type] || r.release_type) : ''} (£${fmtMoney(r.amount)})`,
      });
    }
  }

  // Determine the timeline's right edge
  const candidates = [end, retDate, ...events.map(e => e.date)].filter(Boolean);
  const lastDate = candidates.reduce((acc, d) => (cmpDate(d, acc) > 0 ? d : acc), start);
  // Pad timeline 30 days past last event for breathing room
  const timelineEnd = addDays(lastDate, 14);

  // Position helper: convert ISO date → 0-1 ratio along timeline
  const startMs = new Date(start + 'T00:00:00Z').getTime();
  const endMs = new Date(timelineEnd + 'T00:00:00Z').getTime();
  const range = endMs - startMs;
  const ratio = (iso) => {
    if (!iso) return null;
    const ms = new Date(iso + 'T00:00:00Z').getTime();
    if (isNaN(ms)) return null;
    if (range === 0) return 0;
    return Math.max(0, Math.min(1, (ms - startMs) / range));
  };

  // Phase bands: project (start → end) and defects (end → retDate)
  const projectStartR = ratio(start);
  const projectEndR = end ? ratio(end) : ratio(start);
  const defectsEndR = retDate ? ratio(retDate) : null;

  // Generate month tick marks across the range
  const monthTicks = [];
  {
    const d = new Date(start + 'T00:00:00Z');
    d.setUTCDate(1); // first of the month
    while (d.getTime() <= endMs) {
      const iso = d.toISOString().slice(0, 10);
      const r = ratio(iso);
      if (r != null && r >= 0 && r <= 1) {
        monthTicks.push({
          iso,
          ratio: r,
          // Show year only on January, otherwise just month abbrev
          label: d.getUTCMonth() === 0
            ? d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric', timeZone: 'UTC' })
            : d.toLocaleDateString('en-GB', { month: 'short', timeZone: 'UTC' }),
        });
      }
      d.setUTCMonth(d.getUTCMonth() + 1);
    }
  }

  // Today marker (only show if it falls within the timeline window)
  const todayR = (cmpDate(today, start) >= 0 && cmpDate(today, timelineEnd) <= 0)
    ? ratio(today) : null;

  // SVG dimensions
  // Use a percentage-based layout so the timeline scales with the available container width.
  // SVG with preserveAspectRatio: 'none' is the trick — viewBox stays fixed, content stretches.
  const W = 1000;       // viewBox width
  const H = 80;         // viewBox height
  const Y_BAND_TOP = 18;
  const Y_BAND_BOTTOM = 38;
  const Y_MARKER = 52;
  const Y_TICK_LABEL = 70;

  return (
    <SectionBox title="Project lifecycle">
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 14, lineHeight: 1.5 }}>
        Full lifecycle from project start through end of defects. Coloured bands show the active period and defects period; dots mark each scheduled cash event.
      </div>

      {/* Legend */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 16, marginBottom: 12, fontSize: 11, color: C.muted }}>
        <LegendItem swatch={C.red} label="Project active" type="band" />
        {retDate && <LegendItem swatch={C.prussian} label="Defects period" type="band" />}
        <LegendItem swatch={C.green} label="Invoice payment" type="dot" />
        <LegendItem swatch={C.amber} label="Retention release" type="dot" />
        {todayR != null && <LegendItem swatch={C.text} label="Today" type="line" />}
      </div>

      <div style={{ width: '100%' }}>
        <svg
          viewBox={`0 0 ${W} ${H}`}
          preserveAspectRatio="none"
          style={{ width: '100%', height: 100, display: 'block', overflow: 'visible' }}
        >
          {/* Phase bands */}
          {/* Project active band */}
          <rect
            x={projectStartR * W} y={Y_BAND_TOP}
            width={Math.max(2, (projectEndR - projectStartR) * W)} height={Y_BAND_BOTTOM - Y_BAND_TOP}
            fill={C.red} opacity="0.85"
            rx="2"
          />
          <title>Project active: {fmtDateShort(start)} → {end ? fmtDateShort(end) : '—'}</title>

          {/* Defects period band (after end → retention release) */}
          {end && retDate && defectsEndR != null && (
            <g>
              <rect
                x={projectEndR * W} y={Y_BAND_TOP}
                width={Math.max(2, (defectsEndR - projectEndR) * W)} height={Y_BAND_BOTTOM - Y_BAND_TOP}
                fill={C.prussian} opacity="0.75"
                rx="2"
              />
              <title>Defects period: {fmtDateShort(end)} → {fmtDateShort(retDate)}</title>
            </g>
          )}

          {/* Today vertical line */}
          {todayR != null && (
            <g>
              <line
                x1={todayR * W} y1={Y_BAND_TOP - 6} x2={todayR * W} y2={Y_BAND_BOTTOM + 6}
                stroke={C.text} strokeWidth="1.5" strokeDasharray="3,2"
                vectorEffect="non-scaling-stroke"
              />
              <title>Today: {fmtDateShort(today)}</title>
            </g>
          )}

          {/* Month tick marks + labels */}
          {monthTicks.map((t, i) => (
            <g key={i}>
              <line
                x1={t.ratio * W} y1={Y_BAND_BOTTOM + 2} x2={t.ratio * W} y2={Y_BAND_BOTTOM + 6}
                stroke={C.muted} strokeWidth="1" vectorEffect="non-scaling-stroke"
              />
            </g>
          ))}

          {/* Event markers */}
          {events.map((ev, i) => {
            const r = ratio(ev.date);
            if (r == null) return null;
            const x = r * W;
            const color = ev.kind === 'invoice' ? C.green : C.amber;
            return (
              <g key={i}>
                <circle
                  cx={x} cy={Y_MARKER} r="5"
                  fill={color} stroke={C.white} strokeWidth="2"
                  vectorEffect="non-scaling-stroke"
                />
                <title>{ev.label} · {fmtDateShort(ev.date)}</title>
              </g>
            );
          })}
        </svg>

        {/* Month labels live in a separate flex row so the text doesn't get
            stretched horizontally by preserveAspectRatio='none' on the SVG */}
        <div style={{ position: 'relative', height: 16, marginTop: -4 }}>
          {monthTicks.map((t, i) => (
            <div key={i} style={{
              position: 'absolute',
              left: `${t.ratio * 100}%`,
              transform: 'translateX(-50%)',
              fontSize: 10, color: C.muted, fontWeight: 500,
              whiteSpace: 'nowrap',
            }}>
              {t.label}
            </div>
          ))}
        </div>
      </div>

      {/* Phase date summary line */}
      <div style={{ display: 'flex', gap: 16, marginTop: 18, fontSize: 11, flexWrap: 'wrap' }}>
        <PhaseDate label="Start" value={start} color={C.red} />
        {end && <PhaseDate label="End" value={end} color={C.red} />}
        {retDate && <PhaseDate label="Retention release" value={retDate} color={C.prussian} />}
        <PhaseDate label="Events" value={`${events.length} scheduled`} muted />
      </div>
    </SectionBox>
  );
}

function LegendItem({ swatch, label, type }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
      {type === 'band' && (
        <span style={{ width: 14, height: 8, background: swatch, opacity: 0.8, borderRadius: 2, display: 'inline-block' }} />
      )}
      {type === 'dot' && (
        <span style={{ width: 8, height: 8, background: swatch, borderRadius: 4, display: 'inline-block', border: `1.5px solid ${C.white}`, boxShadow: `0 0 0 0.5px ${swatch}` }} />
      )}
      {type === 'line' && (
        <span style={{
          width: 14, height: 2, background: swatch, display: 'inline-block',
          backgroundImage: `linear-gradient(to right, ${swatch} 60%, transparent 60%)`,
          backgroundSize: '4px 100%',
        }} />
      )}
      <span>{label}</span>
    </span>
  );
}

function PhaseDate({ label, value, color, muted }) {
  return (
    <span>
      <span style={{ color: C.muted, marginRight: 5 }}>{label}:</span>
      <span style={{ fontWeight: 600, color: muted ? C.muted : (color || C.text) }}>
        {typeof value === 'string' && value.match(/^\d{4}-\d{2}-\d{2}$/) ? fmtDateShort(value) : value}
      </span>
    </span>
  );
}

// ============================================================
// CONTRIBUTORS INLINE — compact chips + add picker
// Used inside HeaderEditor (and wizard Step 1). Self-contained — manages its own
// busy state and reports up via showFlash callback.
// ============================================================
function ContributorsInline({ project, assignees, setAssignees, allUsers, access, showFlash }) {
  const [pickerOpen, setPickerOpen] = useState(false);
  const [busy, setBusy] = useState(false);

  const assigneeRows = (assignees || []).map(a => {
    const u = (allUsers || []).find(x => x.user_id === a.user_id);
    return { ...a, email: u ? u.email : '(unknown)', display_name: u ? u.display_name : null, role: u ? u.role : null };
  });

  const eligibleUsers = (allUsers || []).filter(u =>
    !(assignees || []).some(a => a.user_id === u.user_id)
  );

  const add = async (userId) => {
    setBusy(true);
    try {
      const inserted = await sbInsert('project_contributors', [{
        project_id: project.id, user_id: userId,
        added_by_email: getEmail(access.session),
      }], access.session);
      const target = (allUsers || []).find(u => u.user_id === userId);
      await sbUpdate('projects', `id=eq.${project.id}`, {
        audit_log: [
          ...(Array.isArray(project.audit_log) ? project.audit_log : []),
          { event: 'assignee_added', actor: getEmail(access.session), at: new Date().toISOString(), target: target ? target.email : userId },
        ],
      }, access.session);
      setAssignees([...(assignees || []), inserted[0]]);
      setPickerOpen(false);
      if (showFlash) showFlash('ok', `Added ${target ? (target.display_name || target.email) : 'user'}.`);
    } catch (e) { if (showFlash) showFlash('err', 'Could not add: ' + e.message); }
    finally { setBusy(false); }
  };

  const remove = async (userId) => {
    setBusy(true);
    try {
      await sbDelete('project_contributors', `project_id=eq.${project.id}&user_id=eq.${userId}`, access.session);
      const target = (allUsers || []).find(u => u.user_id === userId);
      await sbUpdate('projects', `id=eq.${project.id}`, {
        audit_log: [
          ...(Array.isArray(project.audit_log) ? project.audit_log : []),
          { event: 'assignee_removed', actor: getEmail(access.session), at: new Date().toISOString(), target: target ? target.email : userId },
        ],
      }, access.session);
      setAssignees((assignees || []).filter(a => a.user_id !== userId));
      if (showFlash) showFlash('ok', 'Removed.');
    } catch (e) { if (showFlash) showFlash('err', 'Could not remove: ' + e.message); }
    finally { setBusy(false); }
  };

  return (
    <div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center', minHeight: 32 }}>
        {assigneeRows.length === 0 && !pickerOpen && (
          <span style={{ fontSize: 12, color: C.muted, fontStyle: 'italic' }}>None yet.</span>
        )}
        {assigneeRows.map(a => (
          <span key={a.user_id} style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            background: a.role === 'editor' ? C.redLight : C.prussianLight,
            color: a.role === 'editor' ? C.red : C.prussian,
            padding: '4px 6px 4px 10px', borderRadius: 14, fontSize: 12, fontWeight: 600,
          }}>
            {a.display_name || a.email}
            <button
              onClick={() => remove(a.user_id)} disabled={busy}
              style={{
                background: 'transparent', border: 'none', cursor: 'pointer',
                color: 'inherit', padding: '0 4px', fontSize: 14, lineHeight: 1, opacity: 0.7,
              }}
              title="Remove"
            >×</button>
          </span>
        ))}
        {eligibleUsers.length > 0 && (
          <button
            onClick={() => setPickerOpen(o => !o)}
            disabled={busy}
            style={{ ...miniBtn(), padding: '4px 10px' }}
          >
            {pickerOpen ? 'Close' : '+ Add'}
          </button>
        )}
      </div>
      {pickerOpen && (
        <div style={{ marginTop: 8, padding: 10, background: C.bg, borderRadius: 6 }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 6 }}>
            {eligibleUsers.length === 0 ? (
              <div style={{ fontSize: 12, color: C.muted }}>Everyone is already assigned.</div>
            ) : eligibleUsers.map(u => (
              <button
                key={u.user_id}
                onClick={() => add(u.user_id)}
                disabled={busy}
                style={{
                  ...btnGhost(), padding: '8px 10px', fontSize: 12,
                  textAlign: 'left', justifyContent: 'flex-start',
                }}
              >
                <div style={{ fontWeight: 600 }}>{u.display_name || u.email}</div>
                {u.display_name && <div style={{ fontSize: 10, color: C.muted, fontWeight: 400 }}>{u.email}</div>}
                <div style={{ fontSize: 10, color: u.role === 'editor' ? C.red : C.prussian, fontWeight: 600, marginTop: 2 }}>
                  {u.role === 'editor' ? 'Editor' : 'Contributor'}
                </div>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const AUDIT_EVENT_LABELS = {
  created:           'Project created',
  activated:         'Activated',
  status_changed:    'Status changed',
  archived:          'Archived',
  unarchived:        'Un-archived',
  assignee_added:    'Assignee added',
  assignee_removed:  'Assignee removed',
  header_edited:     'Header edited',
  schedule_edited:   'Schedule edited',
  retention_edited:  'Retention releases edited',
};

function AuditLogSection({ project }) {
  const [expanded, setExpanded] = useState(false);
  const [showAll, setShowAll] = useState(false);
  const log = Array.isArray(project.audit_log) ? project.audit_log : [];
  // Newest first
  const sorted = [...log].sort((a, b) => cmpDate(b.at, a.at) || (b.at || '').localeCompare(a.at || ''));
  const visible = showAll ? sorted : sorted.slice(0, 10);

  return (
    <SectionBox
      title={`Activity${sorted.length > 0 ? ` (${sorted.length})` : ''}`}
      actions={
        <button onClick={() => setExpanded(e => !e)} style={miniBtn()}>
          {expanded ? '▾ Hide' : '▸ Show'}
        </button>
      }
    >
      {!expanded ? (
        <div style={{ fontSize: 12, color: C.muted, fontStyle: 'italic' }}>
          {sorted.length === 0 ? 'No activity yet.' : `${sorted.length} event${sorted.length === 1 ? '' : 's'} logged. Click Show to expand.`}
        </div>
      ) : sorted.length === 0 ? (
        <div style={{ padding: 16, textAlign: 'center', color: C.muted, fontSize: 13 }}>No activity yet.</div>
      ) : (
        <React.Fragment>
          <div>
            {visible.map((ev, i) => (
              <div key={i} style={{
                display: 'flex', alignItems: 'flex-start', gap: 10,
                padding: '8px 0', borderBottom: i === visible.length - 1 ? 'none' : `1px solid ${C.line}`,
                fontSize: 13,
              }}>
                <div style={{ width: 6, height: 6, borderRadius: 3, background: C.red, marginTop: 6, flexShrink: 0 }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600 }}>
                    {AUDIT_EVENT_LABELS[ev.event] || ev.event}
                    {ev.from && ev.to && <span style={{ color: C.muted, fontWeight: 400 }}> — {ev.from} → {ev.to}</span>}
                    {ev.target && <span style={{ color: C.muted, fontWeight: 400 }}> — {ev.target}</span>}
                  </div>
                  <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
                    {ev.actor || 'unknown'} · {fmtDate(ev.at)}
                  </div>
                </div>
              </div>
            ))}
          </div>
          {sorted.length > 10 && (
            <div style={{ textAlign: 'center', marginTop: 12 }}>
              <button onClick={() => setShowAll(s => !s)} style={btnGhost()}>
                {showAll ? `Show last 10` : `Show all ${sorted.length} events`}
              </button>
            </div>
          )}
        </React.Fragment>
      )}
    </SectionBox>
  );
}

const PROJECT_STATUS_BADGE = {
  draft:    { bg: C.amberLight,    fg: C.amber,    label: 'Draft' },

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <h1 style={brandTitle()}>{isEditor ? 'Projects' : 'My projects'}</h1>

              + New project

          <div style={{ fontSize: 14, marginBottom: 16 }}>
            {rows.length === 0

            <a href={buildHash(['projects','new'])} style={{ ...btn(false), textDecoration: 'none', display: 'inline-block' }}>

        <div style={{ background: C.white, border: `1px solid ${C.line}`, borderRadius: 8, overflow: 'hidden' }}>
          <div style={{
            display: 'grid', gridTemplateColumns: '2.2fr 1fr 1.1fr 0.8fr 1.1fr 0.7fr',
            gap: 12, padding: '12px 18px', background: C.redSoft,
            borderBottom: `1px solid ${C.line}`,
            fontSize: 11, color: C.muted, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em',
          }}>
            <div>Project</div>
            <div>Number</div>
            <div style={{ textAlign: 'right' }}>Value</div>
            <div>Type</div>
            <div>Status</div>
            <div style={{ textAlign: 'right' }}>Updated</div>
          </div>
          {visible.map(r => <ProjectRegisterRow key={r.id} row={r} isEditor={isEditor} />)}

// ============================================================
// NEW PROJECT WIZARD
// Routes:
//   #/projects/new?step=N        — fresh wizard, creates a draft on step 1 save
//   #/projects/<id>/wizard?step=N — resume an existing draft
// Step 1: Header  | Step 2: Payment type  | Step 3: Schedule  | Step 4: Done
// ============================================================
function NewProjectWizard({ access, navigate, route, projectId }) {
  const stepParam = parseInt(route.params.step || '1', 10);
  const step = (stepParam >= 1 && stepParam <= 4) ? stepParam : 1;

  const [loading, setLoading] = useState(!!projectId);
  const [project, setProject] = useState(null); // the row in projects
  const [error, setError] = useState(null);

  // Load existing project (for resume)
  useEffect(() => {
    if (!projectId) { setLoading(false); return; }
    (async () => {
      setLoading(true);
      try {
        const rows = await sbSelect('projects', `id=eq.${projectId}&limit=1`, access.session);
        if (!rows || rows.length === 0) {
          setError('Project not found.');
          setLoading(false);
          return;
        }
        setProject(rows[0]);
      } catch (e) { setError(e.message); }
      finally { setLoading(false); }
    })();
  }, [projectId, access.session]);

  if (error) return <ErrorMsg msg={error} />;
  if (loading) return <LoadingMsg label="Loading…" />;

  const goStep = (n) => {
    const id = projectId || (project && project.id);
    if (id) {
      navigate(['projects', id, 'wizard'], { step: String(n) });
    } else {
      navigate(['projects', 'new'], { step: String(n) });
    }
  };

  const finish = () => {
    if (project) navigate(['projects', project.id]);
    else navigate(['projects']);
  };

  return (
    <div style={{ maxWidth: 760 }}>
      <BackLink href={buildHash(['projects'])}>Projects</BackLink>
      <h1 style={brandTitle()}>{project ? `Edit “${project.name || 'Untitled'}”` : 'New project'}</h1>
      <p style={{ color: C.muted, fontSize: 14, marginTop: 0, marginBottom: 20 }}>
        Step {step} of 4 — {['Header','Payment type','Schedule','Done'][step - 1]}
      </p>

      <WizardStepper step={step} project={project} />

      <div style={{ marginTop: 20 }}>
        {step === 1 && (
          <WizardStep1Header
            access={access} project={project} setProject={setProject}
            onNext={() => goStep(2)}
          />
        )}
        {step === 2 && project && (
          <WizardStep2Type
            access={access} project={project} setProject={setProject}
            onBack={() => goStep(1)} onNext={() => goStep(3)}
          />
        )}
        {step === 3 && project && (
          <WizardStep3Schedule
            access={access} project={project} setProject={setProject}
            onBack={() => goStep(2)} onNext={() => goStep(4)}
          />
        )}
        {step === 4 && project && (
          <WizardStep4Done
            access={access} project={project} setProject={setProject}
            onBack={() => goStep(3)} onFinish={finish}
          />
        )}
        {step >= 2 && !project && (
          <Card>
            <p style={{ color: C.muted, fontSize: 13, margin: 0 }}>Complete step 1 first.</p>
            <div style={{ marginTop: 12 }}>
              <button onClick={() => goStep(1)} style={btnGhost()}>← Back to step 1</button>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

function WizardStepper({ step, project }) {
  const labels = ['Header', 'Payment type', 'Schedule', 'Done'];
  // A step is reachable if its preceding step has produced enough data:
  //   step 1: always reachable
  //   step 2+: requires project to exist
  const reachable = (n) => n === 1 || !!project;
  return (
    <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
      {labels.map((label, i) => {
        const n = i + 1;
        const isCurrent = n === step;
        const done = n < step;
        const can = reachable(n);
        return (
          <React.Fragment key={n}>
            <div style={{
              flex: 1, padding: '8px 12px', textAlign: 'center',
              border: `1px solid ${isCurrent ? C.red : C.line}`,
              background: isCurrent ? C.redSoft : (done ? C.greenLight : C.white),
              color: isCurrent ? C.red : (done ? C.green : (can ? C.text : C.muted)),
              borderRadius: 6, fontSize: 12, fontWeight: 600,
              opacity: can ? 1 : 0.5,
            }}>
              {done && '✓ '}{n}. {label}
            </div>
            {i < labels.length - 1 && <div style={{ width: 8 }} />}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ============================================================
// WIZARD STEP 1 — HEADER
// ============================================================
function WizardStep1Header({ access, project, setProject, onNext }) {
  // Owner defaults to current user on fresh project. On resume, use saved value.
  const currentUserEmail = getEmail(access.session);
  const { users } = useCashflowUsers(access.session, true);
  // Assignees state — only loaded if project exists (need project.id to query)
  const [assignees, setAssignees] = useState([]);
  useEffect(() => {
    if (!project) return;
    (async () => {
      try {
        const a = await sbSelect('project_contributors', `project_id=eq.${project.id}`, access.session);
        setAssignees(a || []);
      } catch (e) { /* non-fatal */ }
    })();
  }, [project, access.session]);

  const [form, setForm] = useState(() => ({
    name:              project ? (project.name || '') : '',
    number:            project ? (project.number || '') : '',
    value:             project ? project.value : '',
    retention_pct:     project ? project.retention_pct : '',
    defects_retention_pct: project && project.defects_retention_pct != null ? project.defects_retention_pct : '',
    start_date:        project ? (project.start_date || '') : '',
    end_date:          project ? (project.end_date || '') : '',
    retention_date:    project ? (project.retention_date || '') : '',
    payment_terms_days: project ? project.payment_terms_days : 30,
    owner_email:       project ? (project.owner_email || '') : (currentUserEmail || ''),
  }));
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  // Date validation. End-before-start and retention-before-end are both
  // category errors — hard blocks on save.
  const endBeforeStart = form.start_date && form.end_date && cmpDate(form.end_date, form.start_date) < 0;
  const retentionBeforeEnd = form.end_date && form.retention_date && cmpDate(form.retention_date, form.end_date) < 0;

  // Soft: defects retention shouldn't exceed total retention (warn, don't block).
  const defectsExceedsRetention =
    form.defects_retention_pct !== '' && form.retention_pct !== ''
    && Number(form.defects_retention_pct) > Number(form.retention_pct);

  const valid =
    form.name && form.name.trim().length > 0
    && Number(form.value) >= 0
    && !endBeforeStart
    && !retentionBeforeEnd;

  const update = (field, val) => setForm(prev => ({ ...prev, [field]: val }));

  const save = async () => {
    if (!valid) return;
    setBusy(true); setError('');
    try {
      const payload = {
        name: form.name.trim(),
        number: form.number.trim() || null,
        value: Number(form.value) || 0,
        retention_pct: form.retention_pct === '' ? 0 : Number(form.retention_pct),
        defects_retention_pct: form.defects_retention_pct === '' ? null : Number(form.defects_retention_pct),
        start_date: form.start_date || null,
        end_date: form.end_date || null,
        retention_date: form.retention_date || null,
        payment_terms_days: Number(form.payment_terms_days) || 30,
        owner_email: form.owner_email.trim() || null,
      };
      let updated;
      if (project) {
        updated = await sbUpdate('projects', `id=eq.${project.id}`, payload, access.session);
      } else {
        // Add the create_event to audit_log on insert
        const auditEvent = { event: 'created', actor: getEmail(access.session), at: new Date().toISOString() };
        updated = await sbInsert('projects', {
          ...payload,
          status: 'draft',
          created_by_email: getEmail(access.session),
          audit_log: [auditEvent],
        }, access.session);
      }
      setProject(updated[0]);
      onNext();
    } catch (e) {
      setError(e.message);
    } finally { setBusy(false); }
  };

  return (
    <Card>
      <h2 style={{ marginTop: 0, fontSize: 18, color: C.text }}>Project header</h2>
      <p style={{ color: C.muted, fontSize: 13, marginTop: 4, marginBottom: 20 }}>
        The headline information about this project. Required: name and value.
      </p>

      <Field label="Project name *">
        <input value={form.name} onChange={(e) => update('name', e.target.value)} style={inp()} autoFocus />
      </Field>

      <div style={twoCol()}>
        <Field label="Project number">
          <input value={form.number} onChange={(e) => update('number', e.target.value)} style={inp()} placeholder="e.g. P-2401" />
        </Field>
        <Field label="Owner">
          <UserPicker
            value={form.owner_email}
            onChange={(v) => update('owner_email', v)}
            users={users}
          />
        </Field>
      </div>

      <div style={threeCol()}>
        <Field label="Project value (£)">
          <MoneyInput value={form.value} onChange={(v) => update('value', v)} />
        </Field>
        <Field label="Retention (%)">
          <NumberInput value={form.retention_pct} onChange={(v) => update('retention_pct', v)} step="0.01" placeholder="e.g. 5" />
        </Field>
        <Field label="Defects retention (%)">
          <NumberInput value={form.defects_retention_pct} onChange={(v) => update('defects_retention_pct', v)} step="0.01" placeholder="optional, e.g. 2.5" />
          {defectsExceedsRetention && (
            <div style={{ fontSize: 11, color: C.amber, marginTop: 3, fontWeight: 500 }}>
              ⚠ Defects retention exceeds total retention
            </div>
          )}
          {!defectsExceedsRetention && (
            <div style={{ fontSize: 11, color: C.muted, marginTop: 3, fontStyle: 'italic' }}>
              Part of retention held past defects period. Often half of total.
            </div>
          )}
        </Field>
      </div>

      <div style={threeCol()}>
        <Field label="Start date">
          <DateField
            value={form.start_date}
            onChange={(v) => update('start_date', v)}
          />
        </Field>
        <Field label="End date">
          <DateField
            value={form.end_date}
            onChange={(v) => update('end_date', v)}
            min={form.start_date || undefined}
            warning={endBeforeStart ? 'End date must be on or after start date' : null}
            error={endBeforeStart}
          />
        </Field>
        <Field label="Retention release date">
          <DateField
            value={form.retention_date}
            onChange={(v) => update('retention_date', v)}
            min={form.end_date || form.start_date || undefined}
            hint={form.end_date ? `Typically ~12 months after end (${fmtDateShort(addDays(form.end_date, 365))})` : 'After end of defects period'}
            warning={retentionBeforeEnd ? 'Retention is released after project end' : null}
            error={retentionBeforeEnd}
          />
        </Field>
      </div>

      <Field label="Payment terms (days)">
        <NumberInput value={form.payment_terms_days} onChange={(v) => update('payment_terms_days', v)} step="1" placeholder="30" />
      </Field>

      {project ? (
        <Field label="Contributors (additional people with access)">
          <ContributorsInline
            project={project}
            assignees={assignees} setAssignees={setAssignees}
            allUsers={users}
            access={access}
          />
        </Field>
      ) : (
        <div style={{ background: C.bg, padding: 12, borderRadius: 6, fontSize: 12, color: C.muted, marginBottom: 14, fontStyle: 'italic' }}>
          Contributors can be added once the project is saved.
        </div>
      )}

      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 20 }}>
        <button onClick={save} disabled={!valid || busy} style={btn(!valid || busy)}>
          {busy ? 'Saving…' : (project ? 'Save & continue →' : 'Create & continue →')}
        </button>
      </div>
    </Card>
  );
}

// ============================================================
// WIZARD STEP 2 — PAYMENT TYPE
// ============================================================
function WizardStep2Type({ access, project, setProject, onBack, onNext }) {
  const [paymentType, setPaymentType] = useState(project.payment_type || null);
  const [first_valuation_date, setFirstValDate] = useState(project.first_valuation_date || '');
  const [valuation_cycle_days, setCycleDays] = useState(project.valuation_cycle_days || 30);
  const [review_period_days, setReviewDays] = useState(project.review_period_days || 14);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  // For valuation, all three valuation fields must be set.
  // For stage, just the type is needed at this step.
  const valid = paymentType === 'stage' || (
    paymentType === 'valuation'
    && first_valuation_date
    && Number(valuation_cycle_days) > 0
    && Number(review_period_days) >= 0
  );

  const save = async () => {
    if (!valid) return;
    setBusy(true); setError('');
    try {
      const payload = {
        payment_type: paymentType,
        first_valuation_date: paymentType === 'valuation' ? (first_valuation_date || null) : null,
        valuation_cycle_days: paymentType === 'valuation' ? (Number(valuation_cycle_days) || null) : null,
        review_period_days: paymentType === 'valuation' ? (Number(review_period_days) || null) : null,
      };
      const updated = await sbUpdate('projects', `id=eq.${project.id}`, payload, access.session);
      setProject(updated[0]);
      onNext();
    } catch (e) {
      setError(e.message);
    } finally { setBusy(false); }
  };

  return (
    <Card>
      <h2 style={{ marginTop: 0, fontSize: 18, color: C.text }}>Payment type</h2>
      <p style={{ color: C.muted, fontSize: 13, marginTop: 4, marginBottom: 20 }}>
        How is this project billed? Pick one to reveal the relevant fields.
      </p>

      <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
        <PaymentTypeOption
          selected={paymentType === 'stage'}
          onClick={() => setPaymentType('stage')}
          label="Stage payment"
          description="Fixed schedule of invoices at agreed percentages or amounts of the project value."
        />
        <PaymentTypeOption
          selected={paymentType === 'valuation'}
          onClick={() => setPaymentType('valuation')}
          label="Valuation"
          description="Recurring claims raised at intervals, reviewed, then invoiced."
        />
      </div>

      {paymentType === 'valuation' && (
        <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 16, marginTop: 4 }}>
          <h3 style={{ fontSize: 14, color: C.text, margin: '0 0 12px' }}>Valuation parameters</h3>
          <div style={threeCol()}>
            <Field label="First valuation date">
              <DateInput value={first_valuation_date} onChange={setFirstValDate} />
            </Field>
            <Field label="Cycle (days)">
              <NumberInput value={valuation_cycle_days} onChange={setCycleDays} step="1" placeholder="30" />
            </Field>
            <Field label="Review period (days)">
              <NumberInput value={review_period_days} onChange={setReviewDays} step="1" placeholder="14" />
            </Field>
          </div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>
            Cycle = how often a new claim is raised. Review = how long between claim and invoice.
          </div>
        </div>
      )}

      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginTop: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between', marginTop: 20 }}>
        <button onClick={onBack} style={btnGhost()}>← Back</button>
        <button onClick={save} disabled={!valid || busy} style={btn(!valid || busy)}>
          {busy ? 'Saving…' : 'Save & continue →'}
        </button>
      </div>
    </Card>
  );
}

// ============================================================
// WIZARD STEP 3 — SCHEDULE

function WizardStep3Schedule({ access, project, setProject, onBack, onNext }) {
