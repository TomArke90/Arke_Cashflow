// ============================================================
// DEBTOR IMPORT MODAL — multi-step wizard
//   1. File picker
//   2. Parse + preview (auto-detects Xero aged-receivables format)
//   3. Match contacts to projects (auto-exact, manual for the rest)
//   4. Confirm + commit
// ============================================================
function DebtorImportModal({ access, projects, existingDebtors, onClose, onComplete }) {
  const [step, setStep] = useState(1);
  const [filename, setFilename] = useState('');
  const [parsed, setParsed] = useState(null); // { snapshotDate, rows: [{ contact, buckets, total }] }
  const [parseError, setParseError] = useState('');
  const [matches, setMatches] = useState({}); // contact_name -> project_id ('' = unmatched)
  const [busy, setBusy] = useState(false);
  const [commitError, setCommitError] = useState('');
  const fileInputRef = useRef(null);

  const handleFileChosen = async (file) => {
    if (!file) return;
    setFilename(file.name);
    setParseError('');
    setBusy(true);
    try {
      const data = await file.arrayBuffer();
      const result = parseAgedReceivablesXlsx(data);
      setParsed(result);
      // Auto-match contacts to projects by exact case-insensitive name match
      const initMatches = {};
      for (const row of result.rows) {
        const norm = row.contact.trim().toLowerCase();
        const match = (projects || []).find(p => p.name.trim().toLowerCase() === norm);
        initMatches[row.contact] = match ? match.id : '';
      }
      setMatches(initMatches);
      setStep(2);
    } catch (e) {
      setParseError(e.message);
    } finally { setBusy(false); }
  };

  const commit = async () => {
    setBusy(true); setCommitError('');
    try {
      // 1. Create the batch record
      const batch = await sbInsert('csv_import_batches', {
        created_by_email: getEmail(access.session),
        filename,
        snapshot_date: parsed.snapshotDate,
        row_count: parsed.rows.length,
        total_outstanding: parsed.rows.reduce((s, r) => s + r.total, 0),
        rows_inserted: 0, rows_updated: 0, rows_cleared: 0,
      }, access.session);
      const batchId = batch[0].id;

      // 2. Walk through parsed rows. Match against existing outstanding debtors
      //    by case-insensitive contact name. Insert new; update existing; track stats.
      const existingByName = new Map();
      for (const d of existingDebtors) {
        if (d.status === 'outstanding') {
          existingByName.set(d.contact_name.trim().toLowerCase(), d);
        }
      }

      let inserted = 0, updated = 0;
      const seenNames = new Set();

      for (const row of parsed.rows) {
        const key = row.contact.trim().toLowerCase();
        seenNames.add(key);
        const existing = existingByName.get(key);
        const projectId = matches[row.contact] || null;
        const payload = {
          contact_name: row.contact,
          project_id: projectId,
          current_amount: row.buckets.current,
          overdue_lt_1m: row.buckets.overdue_lt_1m,
          overdue_1m: row.buckets.overdue_1m,
          overdue_2m: row.buckets.overdue_2m,
          overdue_3m: row.buckets.overdue_3m,
          overdue_older: row.buckets.overdue_older,
          snapshot_date: parsed.snapshotDate,
          import_batch_id: batchId,
          source: 'imported',
          status: 'outstanding',
        };
        if (existing) {
          // Preserve user overrides on update — only refresh bucket values + snapshot.
          // Don't overwrite project_id if user has already set one and the matcher
          // didn't find a project (we still send the user's existing project_id).
          // payment_date_override and notes are NEVER touched by import.
          const updatePayload = { ...payload };
          if (!projectId && existing.project_id) {
            updatePayload.project_id = existing.project_id;
          }
          delete updatePayload.created_by_email;
          await sbUpdate('debtors', `id=eq.${existing.id}`, updatePayload, access.session);
          updated++;
        } else {
          payload.created_by_email = getEmail(access.session);
          await sbInsert('debtors', payload, access.session);
          inserted++;
        }
      }

      // 3. Soft-clear any outstanding debtors that didn't appear in this import
      let cleared = 0;
      for (const [name, d] of existingByName) {
        if (!seenNames.has(name)) {
          await sbUpdate('debtors', `id=eq.${d.id}`, {
            status: 'cleared',
            cleared_at: new Date().toISOString(),
            cleared_reason: `Auto-cleared on import of ${filename} (no longer in aged receivables)`,
          }, access.session);
          cleared++;
        }
      }

      // 4. Update the batch stats
      await sbUpdate('csv_import_batches', `id=eq.${batchId}`, {
        rows_inserted: inserted, rows_updated: updated, rows_cleared: cleared,
      }, access.session);

      onComplete();
    } catch (e) {
      setCommitError(e.message);
      setBusy(false);
    }
  };

  // Step 1 — file picker
  if (step === 1) {
    return (
      <div className="arke-modal-backdrop" onClick={onClose}>
        <div className="arke-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 540 }}>
          <h2 style={{ fontFamily: '"Century Gothic", "Avenir Next", Avenir, system-ui, sans-serif', color: C.red, marginTop: 0, fontWeight: 700, fontSize: 22 }}>
            Import aged receivables
          </h2>
          <p style={{ color: C.muted, fontSize: 13, marginBottom: 18 }}>
            Upload your Xero "Aged Receivables Summary" export (.xlsx or .csv). The file should
            have a Contact column and ageing buckets: Current, &lt; 1 Month, 1 Month, 2 Months,
            3 Months, Older.
          </p>
          <input
            ref={fileInputRef}
            type="file"
            accept=".xlsx,.xls,.csv"
            onChange={(e) => handleFileChosen(e.target.files[0])}
            style={{ display: 'none' }}
          />
          <button
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            disabled={busy}
            style={{
              ...btnGhost(), width: '100%', padding: 30, fontSize: 14,
              borderStyle: 'dashed', borderWidth: 2,
            }}
          >
            {busy ? 'Parsing…' : '📁 Choose file…'}
          </button>
          {parseError && (
            <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginTop: 12, borderLeft: `3px solid ${C.redStatus}` }}>
              {parseError}
            </div>
          )}
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 18 }}>
            <button onClick={onClose} style={btnGhost()}>Cancel</button>
          </div>
        </div>
      </div>
    );
  }

  // Step 2 — preview + match
  const matchedCount = Object.values(matches).filter(v => v).length;
  const unmatchedCount = parsed.rows.length - matchedCount;
  const grandTotal = parsed.rows.reduce((s, r) => s + r.total, 0);

  return (
    <div className="arke-modal-backdrop" onClick={onClose}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 920 }}>
        <h2 style={{ fontFamily: '"Century Gothic", "Avenir Next", Avenir, system-ui, sans-serif', color: C.red, marginTop: 0, fontWeight: 700, fontSize: 22 }}>
          Review import — {filename}
        </h2>
        <div style={{ display: 'flex', gap: 20, marginBottom: 18, fontSize: 13, color: C.muted, flexWrap: 'wrap' }}>
          <span>📅 Snapshot date: <strong style={{ color: C.text }}>{fmtDateShort(parsed.snapshotDate)}</strong></span>
          <span>👥 {parsed.rows.length} contacts</span>
          <span>£ {fmtMoney(grandTotal)} outstanding</span>
        </div>

        <div style={{
          padding: '10px 14px',
          background: unmatchedCount > 0 ? C.amberLight : C.greenLight,
          borderLeft: `3px solid ${unmatchedCount > 0 ? C.amber : C.green}`,
          borderRadius: 6, marginBottom: 14, fontSize: 13,
        }}>
          <strong style={{ color: unmatchedCount > 0 ? C.amber : C.green }}>
            {matchedCount} auto-matched · {unmatchedCount} unmatched
          </strong>
          {unmatchedCount > 0 && (
            <div style={{ marginTop: 4, color: C.muted, fontSize: 12 }}>
              Pick a project for each unmatched contact below, or leave as "Unmatched" if
              they're not project-related (insurance refunds, ad-hoc clients, etc.).
            </div>
          )}
        </div>

        <div style={{ maxHeight: '50vh', overflowY: 'auto', border: `1px solid ${C.line}`, borderRadius: 6 }}>
          <div style={{
            display: 'grid', gridTemplateColumns: '1.5fr 130px 1.5fr', gap: 16,
            padding: '8px 10px', background: C.bg,
            fontSize: 11, color: C.muted, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em',
            borderBottom: `1px solid ${C.line}`, position: 'sticky', top: 0,
          }}>
            <div>Contact</div>
            <div style={{ textAlign: 'right' }}>Total £</div>
            <div>Linked project</div>
          </div>
          {parsed.rows.map((r, i) => {
            const isMatched = !!matches[r.contact];
            return (
              <div key={i} style={{
                display: 'grid', gridTemplateColumns: '1.5fr 130px 1.5fr', gap: 16,
                padding: '8px 10px', borderBottom: i === parsed.rows.length - 1 ? 'none' : `1px solid ${C.line}`,
                alignItems: 'center',
                background: isMatched ? 'transparent' : C.amberLight,
              }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{r.contact}</div>
                <div style={{ fontSize: 13, fontVariantNumeric: 'tabular-nums', textAlign: 'right', whiteSpace: 'nowrap' }}>
                  £{fmtMoney(r.total)}
                </div>
                <select
                  value={matches[r.contact] || ''}
                  onChange={(e) => setMatches({ ...matches, [r.contact]: e.target.value })}
                  style={{ ...inp(), padding: '4px 6px', fontSize: 12 }}
                >
                  <option value="">⚠ Unmatched (other debtor)</option>
                  {(projects || []).map(p => (
                    <option key={p.id} value={p.id}>
                      {p.name} {p.status === 'complete' ? '(complete)' : ''}
                    </option>
                  ))}
                </select>
              </div>
            );
          })}
        </div>

        {commitError && (
          <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginTop: 14, borderLeft: `3px solid ${C.redStatus}` }}>
            {commitError}
          </div>
        )}

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 18 }}>
          <div style={{ fontSize: 11, color: C.muted, fontStyle: 'italic' }}>
            Existing contacts not in this file will be marked as cleared.
            Payment date overrides and notes are preserved on update.
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={onClose} disabled={busy} style={btnGhost()}>Cancel</button>
            <button onClick={commit} disabled={busy} style={btn(busy)}>
              {busy ? 'Importing…' : `Import ${parsed.rows.length} debtors`}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// XERO AGED RECEIVABLES PARSER
// Parses a Xero "Aged Receivables Summary" .xlsx file into a normalised shape.
// Format (per the supplied sample):
//   Row 0-1: blank
//   Row 2 col 0: "As at <date>"
//   Row 3 col 0: "Ageing by due date"
//   Row 4: blank
//   Row 5: column headers — "Contact", "Current", "< 1 Month", "1 Month", "2 Months", "3 Months", "Older", "Total"
//   Row 6 onwards: data rows
//   Last data rows: a "Total" row and a "Percentage of total" row (both skipped)
//
// Returns { snapshotDate (ISO), rows: [{ contact, buckets: {current, overdue_lt_1m, …}, total }] }
// ============================================================
function parseAgedReceivablesXlsx(arrayBuffer) {
  if (typeof XLSX === 'undefined') {
    throw new Error('XLSX library not loaded. Refresh the page and try again.');
  }
  const wb = XLSX.read(arrayBuffer, { type: 'array' });
  if (!wb.SheetNames || wb.SheetNames.length === 0) throw new Error('File has no sheets.');
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, blankrows: false });

  if (rows.length === 0) throw new Error('Sheet is empty.');

  // Find the snapshot date in the first ~6 rows. Expected format: "As at 21 May 2026"
  let snapshotDate = null;
  for (let i = 0; i < Math.min(rows.length, 6); i++) {
    for (const cell of rows[i]) {
      if (typeof cell === 'string' && /as at/i.test(cell)) {
        const m = cell.match(/as at\s+(.+)/i);
        if (m) {
          const parsed = parseFlexibleDate(m[1].trim());
          if (parsed) { snapshotDate = parsed; break; }
        }
      }
    }
    if (snapshotDate) break;
  }
  if (!snapshotDate) {
    // Fallback to today
    snapshotDate = new Date().toISOString().slice(0, 10);
  }

  // Find the header row containing "Contact"
  let headerRowIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    if (row.some(c => typeof c === 'string' && c.trim().toLowerCase() === 'contact')) {
      headerRowIdx = i; break;
    }
  }
  if (headerRowIdx === -1) {
    throw new Error('Could not find a "Contact" header row. Make sure this is a Xero Aged Receivables Summary export.');
  }

  // Map header → column index
  const headers = rows[headerRowIdx].map(h => typeof h === 'string' ? h.trim().toLowerCase() : '');
  const colIdx = {};
  for (let c = 0; c < headers.length; c++) {
    const h = headers[c];
    if (h === 'contact') colIdx.contact = c;
    else if (h === 'current') colIdx.current = c;
    else if (h === '< 1 month' || h === '<1 month' || h === 'less than 1 month') colIdx.overdue_lt_1m = c;
    else if (h === '1 month') colIdx.overdue_1m = c;
    else if (h === '2 months') colIdx.overdue_2m = c;
    else if (h === '3 months') colIdx.overdue_3m = c;
    else if (h === 'older') colIdx.overdue_older = c;
    else if (h === 'total') colIdx.total = c;
  }
  // Sanity check
  for (const required of ['contact', 'current', 'total']) {
    if (colIdx[required] === undefined) {
      throw new Error(`Missing required column "${required}" in header row. Found: ${headers.filter(Boolean).join(', ')}`);
    }
  }

  // Parse data rows
  const result = [];
  for (let i = headerRowIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    const contactRaw = row[colIdx.contact];
    if (contactRaw === null || contactRaw === undefined) continue;
    const contact = String(contactRaw).trim();
    if (!contact) continue;
    // Skip totals and percentage rows
    if (/^total$/i.test(contact) || /percentage of total/i.test(contact)) continue;

    const buckets = {
      current:       num(row[colIdx.current]),
      overdue_lt_1m: num(row[colIdx.overdue_lt_1m]),
      overdue_1m:    num(row[colIdx.overdue_1m]),
      overdue_2m:    num(row[colIdx.overdue_2m]),
      overdue_3m:    num(row[colIdx.overdue_3m]),
      overdue_older: num(row[colIdx.overdue_older]),
    };
    const total = num(row[colIdx.total]);
    // Skip all-zero rows (occasionally Xero emits a phantom empty row)
    if (total === 0 && Object.values(buckets).every(v => v === 0)) continue;
    result.push({ contact, buckets, total });
  }

  if (result.length === 0) {
    throw new Error('No data rows found between the header and the totals row.');
  }

  return { snapshotDate, rows: result };

  function num(v) {
    if (v === null || v === undefined || v === '') return 0;
    if (typeof v === 'number') return v;
    if (typeof v === 'string') {
      const cleaned = v.replace(/[,£\s]/g, '').replace(/\(/g, '-').replace(/\)/g, '');
      const n = Number(cleaned);
      return isNaN(n) ? 0 : n;
    }
    return 0;
  }
}

// Try to parse a date in various plain-English formats, returning an ISO yyyy-mm-dd string.
function parseFlexibleDate(s) {
  // Browser Date constructor handles a lot — "21 May 2026" works in modern engines
  const d = new Date(s);
  if (!isNaN(d.getTime())) {
    return d.toISOString().slice(0, 10);
  }
  return null;
}

// ============================================================
// OVERHEADS — recurring/one-off business cost engine + UI
// ============================================================

// Expand a single overhead row into an array of cash events between two ISO
// dates (inclusive of windowStart, exclusive of windowEnd). Each event has a
// negative gross amount (outflow). VAT is added per-event when vat_applies.
//
// Generation cap: at most ~520 events per overhead (~10 years of weekly), so a
// runaway loop can never lock the page.
function overheadCashEvents(o, windowStart, windowEnd) {
  const events = [];
  if (!o || !o.start_date) return events;
  const amountNet = Number(o.amount_net) || 0;
  if (amountNet === 0) return events;
  const vatRate = o.vat_applies ? (Number(o.vat_rate) || 0) : 0;
  const grossPerOccurrence = -(amountNet * (1 + vatRate)); // negative = outflow
  const interval = Math.max(1, Number(o.interval_count) || 1);
  const endCap = o.end_date || addMonths(windowEnd || '2999-01-01', 0);

  // Helper: should we emit at this date?
  const dateInRange = (d) => {
    if (windowStart && cmpDate(d, windowStart) < 0) return false;
    if (windowEnd && cmpDate(d, windowEnd) > 0) return false;
    if (endCap && cmpDate(d, endCap) > 0) return false;
    return true;
  };

  let date = o.start_date;
  let safety = 0;
  const maxIterations = 600;

  // Step forwards from start_date, emitting events that fall in the window.
  // For frequencies other than 'once', we keep stepping until we exceed the
  // window's end (or end_date, or the safety cap).
  const step = (d) => {
    if (o.frequency === 'weekly')    return addDays(d, 7 * interval);
    if (o.frequency === 'monthly')   return addMonths(d, 1 * interval);
    if (o.frequency === 'quarterly') return addMonths(d, 3 * interval);
    if (o.frequency === 'custom')    return addDays(d, 7 * interval); // default to weekly cadence
    return null; // 'once' — caller handles
  };

  if (o.frequency === 'once') {
    if (dateInRange(date)) {
      events.push({
        date,
        gross: grossPerOccurrence,
        label: o.name,
        source: 'overhead',
        overhead: o,
        amountNet,
        vat: amountNet * vatRate,
      });
    }
    return events;
  }

  while (safety++ < maxIterations) {
    if (windowEnd && cmpDate(date, windowEnd) > 0) break;
    if (endCap && cmpDate(date, endCap) > 0) break;
    if (dateInRange(date)) {
      events.push({
        date,
        gross: grossPerOccurrence,
        label: o.name,
        source: 'overhead',
        overhead: o,
        amountNet,
        vat: amountNet * vatRate,
      });
    }
    const next = step(date);
    if (!next || next === date) break;
    date = next;
  }
  return events;
}

const FREQUENCY_LABELS = {
  once:      'One-off',
  weekly:    'Weekly',
  monthly:   'Monthly',
  quarterly: 'Quarterly',
  custom:    'Every N weeks',
};

function fmtRecurrence(o) {
  if (o.frequency === 'once') return `One-off · ${fmtDateShort(o.start_date)}`;
  const interval = Number(o.interval_count) || 1;
  if (o.frequency === 'weekly') {
    return interval === 1 ? `Weekly from ${fmtDateShort(o.start_date)}` : `Every ${interval} weeks from ${fmtDateShort(o.start_date)}`;
  }
  if (o.frequency === 'monthly') {
    return interval === 1 ? `Monthly from ${fmtDateShort(o.start_date)}` : `Every ${interval} months from ${fmtDateShort(o.start_date)}`;
  }
  if (o.frequency === 'quarterly') {
    return interval === 1 ? `Quarterly from ${fmtDateShort(o.start_date)}` : `Every ${interval} quarters from ${fmtDateShort(o.start_date)}`;
  }
  return `Every ${interval} weeks from ${fmtDateShort(o.start_date)}`;
}

// Approximate monthly run-rate of an overhead. Useful for the page header
// summary. For 'once' overheads we return 0 (they're not a run-rate cost).
function monthlyRunRate(o) {
  const net = Number(o.amount_net) || 0;
  const interval = Math.max(1, Number(o.interval_count) || 1);
  if (o.frequency === 'once') return 0;
  if (o.frequency === 'weekly' || o.frequency === 'custom') return (net * (52 / 12)) / interval;
  if (o.frequency === 'monthly') return net / interval;
  if (o.frequency === 'quarterly') return net / (3 * interval);
  return 0;
}

function OverheadsPage({ access }) {
  const [overheads, setOverheads] = useState(null);
  const [categories, setCategories] = useState(null);
  const [error, setError] = useState(null);
  const [editing, setEditing] = useState(null); // overhead object, or 'new'

  const reload = useCallback(async () => {
    try {
      const [ohs, cats] = await Promise.all([
        sbSelect('overheads', 'select=*&order=name.asc', access.session),
        sbSelect('overhead_categories', 'select=*&active=eq.true&order=sort_order.asc,name.asc', access.session),
      ]);
      setOverheads(ohs || []);
      setCategories(cats || []);
    } catch (e) { setError(e.message); }
  }, [access.session]);

  useEffect(() => { reload(); }, [reload]);

  if (error) return <ErrorMsg msg={error} />;
  if (overheads === null || categories === null) return <LoadingMsg label="Loading overheads…" />;

  // Group overheads by category id; 'Uncategorised' bucket holds nulls
  const byCategory = {};
  for (const o of overheads) {
    const key = o.category_id || '__uncategorised__';
    (byCategory[key] = byCategory[key] || []).push(o);
  }

  const totalRunRate = overheads.reduce((s, o) => s + monthlyRunRate(o), 0);

  return (
    <div style={{ maxWidth: 1400 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 16, marginBottom: 20 }}>
        <div>
          <h1 style={{ ...brandTitle(), margin: '0 0 6px' }}>Overheads</h1>
          <div style={{ fontSize: 13, color: C.muted }}>
            {overheads.length} overhead{overheads.length === 1 ? '' : 's'} ·
            £{fmtMoney(totalRunRate)}/month run-rate (recurring only)
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <a href={buildHash(['settings','categories'])} style={btnGhost()}>
            Manage categories
          </a>
          <button onClick={() => setEditing('new')} style={btn(false)}>
            + Add overhead
          </button>
        </div>
      </div>

      {overheads.length === 0 ? (
        <SectionBox title="No overheads yet">
          <div style={{ padding: 30, textAlign: 'center', color: C.muted, fontSize: 13 }}>
            Add your first overhead to start factoring outflows into the cashflow grid.
            <div style={{ marginTop: 12 }}>
              <button onClick={() => setEditing('new')} style={btn(false)}>+ Add overhead</button>
            </div>
          </div>
        </SectionBox>
      ) : (
        <div>
          {/* Categories in their configured sort order */}
          {categories.map(cat => {
            const list = byCategory[cat.id] || [];
            if (list.length === 0) return null;
            return (
              <OverheadCategorySection
                key={cat.id}
                title={cat.name}
                overheads={list}
                onEdit={setEditing}
              />
            );
          })}
          {/* Uncategorised */}
          {byCategory.__uncategorised__ && byCategory.__uncategorised__.length > 0 && (
            <OverheadCategorySection
              title="Uncategorised"
              overheads={byCategory.__uncategorised__}
              onEdit={setEditing}
              uncategorised
            />
          )}
        </div>
      )}

      {editing && (
        <OverheadEditModal
          overhead={editing === 'new' ? null : editing}
          categories={categories}
          access={access}
          onClose={() => setEditing(null)}
          onSaved={() => { setEditing(null); reload(); }}
        />
      )}
    </div>
  );
}

function OverheadCategorySection({ title, overheads, onEdit, uncategorised }) {
  const subtotal = overheads.reduce((s, o) => s + monthlyRunRate(o), 0);
  return (
    <SectionBox
      title={title}
      actions={
        <span style={{ fontSize: 12, color: C.muted, fontVariantNumeric: 'tabular-nums' }}>
          {subtotal > 0 ? `£${fmtMoney(subtotal)}/mo` : ''}
        </span>
      }
    >
      <div>
        {/* Header row */}

          display: 'grid',

          <div>Recurrence</div>

                cursor: 'pointer', transition: 'background 0.1s',

              onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}

                <div style={{ fontWeight: 600, color: C.text }}>{o.name}</div>

                    {o.notes.length > 60 ? o.notes.slice(0, 60) + '…' : o.notes}
                  </div>
                )}
              </div>
              <div style={{ textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>
                <div style={{ fontWeight: 600 }}>£{fmtMoney(gross)}</div>
                <div style={{ fontSize: 10, color: C.muted, marginTop: 1 }}>
                  {o.vat_applies ? `£${fmtMoney(Number(o.amount_net) || 0)} + VAT` : 'no VAT'}
                </div>
              </div>
              <div style={{ fontSize: 12, color: C.muted }}>{fmtRecurrence(o)}</div>
              <div style={{ fontSize: 12, color: next ? C.text : C.muted, fontStyle: next ? 'normal' : 'italic' }}>
                {next ? fmtDateShort(next.date) : 'none upcoming'}
              </div>
              <div style={{ textAlign: 'center', color: C.muted, fontSize: 14 }}>›</div>
            </div>
          );
        })}
      </div>
    </SectionBox>
  );
}

function OverheadEditModal({ overhead, categories, access, onClose, onSaved }) {
  const isNew = !overhead;
  const [form, setForm] = useState(() => ({
    name: overhead ? overhead.name : '',
    category_id: overhead ? (overhead.category_id || '') : '',
    amount_net: overhead ? String(overhead.amount_net) : '',
    vat_applies: overhead ? !!overhead.vat_applies : false,
    vat_rate: overhead ? String(overhead.vat_rate) : '0.2000',
    frequency: overhead ? overhead.frequency : 'monthly',
    start_date: overhead ? overhead.start_date : new Date().toISOString().slice(0, 10),
    end_date: overhead ? (overhead.end_date || '') : '',
    interval_count: overhead ? String(overhead.interval_count || 1) : '1',
    notes: overhead ? (overhead.notes || '') : '',
  }));
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  const save = async () => {
    setError('');
    if (!form.name.trim()) { setError('Name is required.'); return; }
    const amt = Number(form.amount_net);
    if (!isFinite(amt)) { setError('Amount must be a number.'); return; }
    if (!form.start_date) { setError('Start date is required.'); return; }

    setBusy(true);
    const payload = {
      name: form.name.trim(),
      category_id: form.category_id || null,
      amount_net: amt,
      vat_applies: !!form.vat_applies,
      vat_rate: form.vat_applies ? (Number(form.vat_rate) || 0.20) : 0.20,
      frequency: form.frequency,
      start_date: form.start_date,
      end_date: form.end_date || null,
      interval_count: Math.max(1, Number(form.interval_count) || 1),
      notes: form.notes.trim() || null,
    };
    try {
      if (isNew) {
        payload.created_by_email = getEmail(access.session);
        await sbInsert('overheads', payload, access.session);
      } else {
        await sbUpdate('overheads', `id=eq.${overhead.id}`, payload, access.session);
      }
      onSaved();
    } catch (e) { setError(e.message); setBusy(false); }
  };

  const remove = async () => {
    if (!window.confirm(`Delete "${overhead.name}"? This will remove it from the cashflow grid for all future weeks.`)) return;
    setBusy(true);
    try {
      const r = await fetch(
        `${SUPABASE_URL}/rest/v1/overheads?id=eq.${overhead.id}`,
        { method: 'DELETE', headers: sbHeaders(access.session) }
      );
      if (!r.ok) throw new Error(`Delete failed: ${r.status} ${await r.text()}`);
      onSaved();
    } catch (e) { setError(e.message); setBusy(false); }
  };

  // Preview: show the next 4 occurrences (using current form values)
  const previewOverhead = {
    ...form,
    amount_net: Number(form.amount_net) || 0,
    interval_count: Math.max(1, Number(form.interval_count) || 1),
    vat_rate: Number(form.vat_rate) || 0.20,
  };
  const today = new Date().toISOString().slice(0, 10);
  const preview = form.start_date
    ? overheadCashEvents(previewOverhead, form.start_date, addMonths(today, 24)).slice(0, 4)
    : [];

  return (
    <div className="arke-modal-backdrop" onClick={onClose}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 580 }}>
        <h2 style={{ fontFamily: '"Century Gothic", "Avenir Next", Avenir, system-ui, sans-serif', color: C.red, marginTop: 0, marginBottom: 20, fontWeight: 700, fontSize: 22 }}>
          {isNew ? 'New overhead' : overhead.name}
        </h2>

        <Field label="Name *">
          <input
            value={form.name}
            onChange={(e) => setForm({ ...form, name: e.target.value })}
            style={inp()}
            placeholder="e.g. Office rent, Adobe CC, Pension contributions"
            autoFocus={isNew}
          />
        </Field>

        <Field label="Category">
          <select
            value={form.category_id}
            onChange={(e) => setForm({ ...form, category_id: e.target.value })}
            style={inp()}
          >
            <option value="">— Uncategorised —</option>
            {categories.map(c => (
              <option key={c.id} value={c.id}>{c.name}</option>
            ))}
          </select>
        </Field>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          <Field label="Net amount (£) *">
            <input
              type="number"
              step="0.01"
              value={form.amount_net}
              onChange={(e) => setForm({ ...form, amount_net: e.target.value })}
              style={inp()}
              placeholder="0.00"
            />
          </Field>
          <Field label="VAT">
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', fontSize: 13 }}>
              <input
                type="checkbox"
                checked={form.vat_applies}
                onChange={(e) => setForm({ ...form, vat_applies: e.target.checked })}
                style={{ width: 16, height: 16 }}
              />
              <span>VAT applies ({form.vat_applies ? `${(Number(form.vat_rate) * 100).toFixed(0)}%` : 'off'})</span>
            </label>
          </Field>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          <Field label="Frequency *">
            <select
              value={form.frequency}
              onChange={(e) => setForm({ ...form, frequency: e.target.value })}
              style={inp()}
            >
              {Object.entries(FREQUENCY_LABELS).map(([k, label]) => (
                <option key={k} value={k}>{label}</option>
              ))}
            </select>
          </Field>
          {(form.frequency !== 'once') && (
            <Field label="Every">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <input
                  type="number"
                  min="1"
                  value={form.interval_count}
                  onChange={(e) => setForm({ ...form, interval_count: e.target.value })}
                  style={{ ...inp(), width: 60, flex: 'none' }}
                />
                <span style={{ fontSize: 12, color: C.muted }}>
                  {form.frequency === 'weekly' ? 'week(s)'
                    : form.frequency === 'monthly' ? 'month(s)'
                    : form.frequency === 'quarterly' ? 'quarter(s)'
                    : 'week(s)'}
                </span>
              </div>
            </Field>
          )}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          <Field label={form.frequency === 'once' ? 'Date *' : 'Start date *'}>
            <input
              type="date"
              value={form.start_date}
              onChange={(e) => setForm({ ...form, start_date: e.target.value })}
              style={inp()}
            />
          </Field>
          {(form.frequency !== 'once') && (
            <Field label="End date (optional)">
              <input
                type="date"
                value={form.end_date}
                onChange={(e) => setForm({ ...form, end_date: e.target.value })}
                style={inp()}
              />
            </Field>
          )}
        </div>

        <Field label="Notes">
          <textarea
            value={form.notes}
            onChange={(e) => setForm({ ...form, notes: e.target.value })}
            style={{ ...inp(), minHeight: 60, fontFamily: 'inherit', resize: 'vertical' }}
            placeholder="Optional context — contract reference, payment terms, etc."
          />
        </Field>

        {/* Preview */}
        {preview.length > 0 && (
          <div style={{ background: C.bg, padding: 12, borderRadius: 6, marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: C.muted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>
              Next {preview.length} occurrence{preview.length === 1 ? '' : 's'}
            </div>
            {preview.map((ev, i) => (
              <div key={i} style={{
                display: 'flex', justifyContent: 'space-between',
                fontSize: 12, padding: '4px 0',
                borderBottom: i === preview.length - 1 ? 'none' : `1px solid ${C.line}`,
              }}>
                <span>{fmtDateShort(ev.date)}</span>
                <span style={{ color: C.redStatus, fontVariantNumeric: 'tabular-nums', fontWeight: 600 }}>
                  £{fmtMoney(ev.gross)}
                </span>
              </div>
            ))}
          </div>
        )}

        {error && (
          <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12, borderLeft: `3px solid ${C.redStatus}` }}>
            {error}
          </div>
        )}

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 18 }}>
          {!isNew ? (
            <button onClick={remove} disabled={busy} style={{ ...btnGhost(), color: C.redStatus, borderColor: C.redStatus }}>
              Delete
            </button>
          ) : <div />}
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={onClose} disabled={busy} style={btnGhost()}>Cancel</button>
            <button onClick={save} disabled={busy} style={btn(busy)}>
              {busy ? 'Saving…' : (isNew ? 'Create overhead' : 'Save changes')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function CategoryEditModal({ category, inUseCount, access, onClose, onSaved }) {
  const isNew = !category;
  const [form, setForm] = useState(() => ({
    name: category ? category.name : '',
    sort_order: category ? String(category.sort_order) : '50',
    active: category ? !!category.active : true,
  }));
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  const save = async () => {
    setError('');
    if (!form.name.trim()) { setError('Name is required.'); return; }
    setBusy(true);
    const payload = {
      name: form.name.trim(),
      sort_order: Number(form.sort_order) || 50,
      active: !!form.active,
    };
    try {
      if (isNew) {
        await sbInsert('overhead_categories', payload, access.session);
      } else {
        await sbUpdate('overhead_categories', `id=eq.${category.id}`, payload, access.session);
      }
      onSaved();
    } catch (e) {
      // Unique constraint on name
      if (/duplicate|unique/i.test(e.message)) {
        setError('A category with that name already exists.');
      } else {
        setError(e.message);
      }
      setBusy(false);
    }
  };

  const remove = async () => {
    if (inUseCount > 0) {
      alert(`Cannot delete — ${inUseCount} overhead${inUseCount === 1 ? '' : 's'} use this category. Reassign them first, or mark this category Inactive.`);
      return;
    }
    if (!window.confirm(`Delete category "${category.name}"?`)) return;
    setBusy(true);
    try {
      const r = await fetch(
        `${SUPABASE_URL}/rest/v1/overhead_categories?id=eq.${category.id}`,
        { method: 'DELETE', headers: sbHeaders(access.session) }
      );
      if (!r.ok) throw new Error(`Delete failed: ${r.status} ${await r.text()}`);
      onSaved();
    } catch (e) { setError(e.message); setBusy(false); }
  };

  return (
    <div className="arke-modal-backdrop" onClick={onClose}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 440 }}>
        <h2 style={{ fontFamily: '"Century Gothic", "Avenir Next", Avenir, system-ui, sans-serif', color: C.red, marginTop: 0, marginBottom: 20, fontWeight: 700, fontSize: 22 }}>
          {isNew ? 'New category' : category.name}
        </h2>
        <Field label="Name *">
          <input
            value={form.name}
            onChange={(e) => setForm({ ...form, name: e.target.value })}
            style={inp()}
            placeholder="e.g. Payroll, Software, Rent"
            autoFocus={isNew}
          />
        </Field>
        <Field label="Sort order">
          <input
            type="number"
            value={form.sort_order}
            onChange={(e) => setForm({ ...form, sort_order: e.target.value })}
            style={inp()}
          />
          <div style={{ fontSize: 11, color: C.muted, marginTop: 4, fontStyle: 'italic' }}>
            Lower numbers appear first on the cashflow grid.
          </div>
        </Field>
        <Field label="Status">
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', fontSize: 13 }}>
            <input
              type="checkbox"
              checked={form.active}
              onChange={(e) => setForm({ ...form, active: e.target.checked })}
              style={{ width: 16, height: 16 }}
            />
            <span>Active (available in the add-overhead dropdown)</span>
          </label>
        </Field>

        {!isNew && inUseCount > 0 && (
          <div style={{ background: C.amberLight, color: C.text, padding: 10, borderRadius: 6, fontSize: 12, marginBottom: 12, borderLeft: `3px solid ${C.amber}` }}>
            {inUseCount} overhead{inUseCount === 1 ? '' : 's'} currently use{inUseCount === 1 ? 's' : ''} this category.
          </div>
        )}

        {error && (
          <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12, borderLeft: `3px solid ${C.redStatus}` }}>
            {error}
          </div>
        )}

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 18 }}>
          {!isNew ? (
            <button onClick={remove} disabled={busy} style={{ ...btnGhost(), color: C.redStatus, borderColor: C.redStatus }}>
              Delete
            </button>
          ) : <div />}
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={onClose} disabled={busy} style={btnGhost()}>Cancel</button>
            <button onClick={save} disabled={busy} style={btn(busy)}>
              {busy ? 'Saving…' : (isNew ? 'Create' : 'Save')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PROJECT REGISTER
// Single-table list, filtered by RLS. Editors see all; contributors see only
// assigned. Status shown as a coloured badge. Archived hidden by default.
// ============================================================
const PROJECT_STATUS_BADGE = {
  draft:    { bg: C.amberLight,    fg: C.amber,    label: 'Draft' },
  active:   { bg: C.greenLight,    fg: C.green,    label: 'Active' },
  complete: { bg: C.prussianLight, fg: C.prussian, label: 'Complete' },
  archived: { bg: C.line,          fg: C.muted,    label: 'Archived' },
};

function ProjectsRegisterPage({ access, navigate }) {
  const [rows, setRows] = useState(null);
  const [error, setError] = useState(null);
  const [showArchived, setShowArchived] = useState(false);

  const isEditor = access.role === 'editor';

  useEffect(() => {
    (async () => {
      try {
        const list = await sbSelect('projects',
          'select=id,name,number,value,status,payment_type,updated_at,created_by_email,owner_email&order=updated_at.desc',
          access.session);
        setRows(list);

  }, [access.session]);

  if (error) return <ErrorMsg msg={error} />;
  if (rows === null) return <LoadingMsg label="Loading projects…" />;

  const visible = showArchived ? rows : rows.filter(r => r.status !== 'archived');
  const archivedCount = rows.filter(r => r.status === 'archived').length;

  return (
    <div style={{ maxWidth: 1400 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <h1 style={brandTitle()}>{isEditor ? 'Projects' : 'My projects'}</h1>
          <p style={{ color: C.muted, fontSize: 14, margin: 0 }}>
            {isEditor
              ? 'All projects in the register.'
              : 'Projects you’ve been assigned to.'}
          </p>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <ToggleSwitch
            checked={showArchived}
            onChange={setShowArchived}
            label={`Show archived${archivedCount > 0 ? ` (${archivedCount})` : ''}`}
          />
          {isEditor && (
            <a href={buildHash(['projects','new'])} style={{ ...btn(false), textDecoration: 'none', display: 'inline-flex', alignItems: 'center' }}>
              + New project
            </a>
          )}
        </div>
      </div>

      {visible.length === 0 ? (
        <div style={{ background: C.white, border: `1px solid ${C.line}`, borderRadius: 8, padding: 40, textAlign: 'center', color: C.muted }}>
          <div style={{ fontSize: 14, marginBottom: 16 }}>
            {rows.length === 0
              ? (isEditor ? 'No projects yet.' : 'You haven’t been assigned to any projects yet.')
              : 'No matching projects.'}
          </div>
          {isEditor && rows.length === 0 && (
            <a href={buildHash(['projects','new'])} style={{ ...btn(false), textDecoration: 'none', display: 'inline-block' }}>
              + Create your first project
            </a>
          )}
        </div>
      ) : (
        <div style={{ background: C.white, border: `1px solid ${C.line}`, borderRadius: 8, overflow: 'hidden' }}>
          <div style={{
            display: 'grid', gridTemplateColumns: '2.2fr 1fr 1.1fr 0.8fr 1.1fr 0.7fr',
            gap: 12, padding: '12px 18px', background: C.redSoft,
            borderBottom: `1px solid ${C.line}`,
            fontSize: 11, color: C.muted, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em',
          }}>
            <div>Project</div>
            <div>Number</div>
            <div style={{ textAlign: 'right' }}>Value</div>
            <div>Type</div>
            <div>Status</div>
            <div style={{ textAlign: 'right' }}>Updated</div>
          </div>
          {visible.map(r => <ProjectRegisterRow key={r.id} row={r} isEditor={isEditor} />)}
        </div>
      )}
    </div>
  );
}

function ProjectRegisterRow({ row, isEditor }) {
  const badge = PROJECT_STATUS_BADGE[row.status] || PROJECT_STATUS_BADGE.draft;
  const isDraft = row.status === 'draft';
  // Drafts route editors to the wizard so they can resume where they left off.
  // For contributors (who shouldn't see drafts in practice, but might if assigned
  // to one), route to the regular detail page.
  const href = (isDraft && isEditor)
    ? buildHash(['projects', row.id, 'wizard'], { step: '1' })
    : buildHash(['projects', row.id]);
  const typeLabel = !row.payment_type ? '—' : (row.payment_type === 'stage' ? 'Stage payment' : 'Valuation');

  return (
    <a href={href} style={{
      display: 'grid', gridTemplateColumns: '2.2fr 1fr 1.1fr 0.8fr 1.1fr 0.7fr',
      gap: 12, padding: '14px 18px', borderBottom: `1px solid ${C.line}`,
      textDecoration: 'none', color: C.text, alignItems: 'center',
      transition: 'background 0.1s',
    }}
      onMouseEnter={(e) => e.currentTarget.style.background = C.redSoft}
      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
    >
      <div style={{ fontSize: 14, fontWeight: 600 }}>{row.name || '(no name)'}</div>
      <div style={{ fontSize: 13, color: C.muted, fontFamily: 'monospace' }}>{row.number || '—'}</div>
      <div style={{ fontSize: 13, fontVariantNumeric: 'tabular-nums', textAlign: 'right' }}>
        {row.value ? `£${fmtMoney(row.value)}` : '—'}
      </div>
      <div style={{ fontSize: 12, color: C.muted }}>{typeLabel}</div>
      <div>
        <span style={{
          background: badge.bg, color: badge.fg, padding: '3px 10px', borderRadius: 10,
          fontSize: 11, fontWeight: 600,
        }}>
          ● {badge.label}
        </span>
      </div>
      <div style={{ fontSize: 12, color: C.muted, textAlign: 'right' }}>{timeAgo(row.updated_at)}</div>
    </a>
  );
}

// ============================================================
// NEW PROJECT WIZARD
// Routes:
//   #/projects/new?step=N        — fresh wizard, creates a draft on step 1 save
//   #/projects/<id>/wizard?step=N — resume an existing draft
// Step 1: Header  | Step 2: Payment type  | Step 3: Schedule  | Step 4: Done
// ============================================================
function NewProjectWizard({ access, navigate, route, projectId }) {
  const stepParam = parseInt(route.params.step || '1', 10);
  const step = (stepParam >= 1 && stepParam <= 4) ? stepParam : 1;

  const [loading, setLoading] = useState(!!projectId);
  const [project, setProject] = useState(null); // the row in projects
  const [error, setError] = useState(null);

  // Load existing project (for resume)
  useEffect(() => {
    if (!projectId) { setLoading(false); return; }
    (async () => {
      setLoading(true);
      try {
        const rows = await sbSelect('projects', `id=eq.${projectId}&limit=1`, access.session);
        if (!rows || rows.length === 0) {
          setError('Project not found.');
          setLoading(false);
          return;
        }
        setProject(rows[0]);
      } catch (e) { setError(e.message); }
      finally { setLoading(false); }
    })();
  }, [projectId, access.session]);

  if (error) return <ErrorMsg msg={error} />;
  if (loading) return <LoadingMsg label="Loading…" />;

  const goStep = (n) => {
    const id = projectId || (project && project.id);
    if (id) {
      navigate(['projects', id, 'wizard'], { step: String(n) });
    } else {
      navigate(['projects', 'new'], { step: String(n) });
    }
  };

  const finish = () => {
    if (project) navigate(['projects', project.id]);
    else navigate(['projects']);
  };

  return (
    <div style={{ maxWidth: 900 }}>
      <BackLink href={buildHash(['projects'])}>Projects</BackLink>
      <h1 style={brandTitle()}>{project ? `Edit “${project.name || 'Untitled'}”` : 'New project'}</h1>
      <p style={{ color: C.muted, fontSize: 14, marginTop: 0, marginBottom: 20 }}>
        Step {step} of 4 — {['Header','Payment type','Schedule','Done'][step - 1]}
      </p>

      <WizardStepper step={step} project={project} />

      <div style={{ marginTop: 20 }}>
        {step === 1 && (
          <WizardStep1Header
            access={access} project={project} setProject={setProject}
            onNext={() => goStep(2)}
          />
        )}
        {step === 2 && project && (
          <WizardStep2Type
            access={access} project={project} setProject={setProject}
            onBack={() => goStep(1)} onNext={() => goStep(3)}
          />
        )}
        {step === 3 && project && (
          <WizardStep3Schedule
            access={access} project={project} setProject={setProject}
            onBack={() => goStep(2)} onNext={() => goStep(4)}
          />
        )}
        {step === 4 && project && (
          <WizardStep4Done
            access={access} project={project} setProject={setProject}
            onBack={() => goStep(3)} onFinish={finish}
          />
        )}
        {step >= 2 && !project && (
          <Card>
            <p style={{ color: C.muted, fontSize: 13, margin: 0 }}>Complete step 1 first.</p>
            <div style={{ marginTop: 12 }}>
              <button onClick={() => goStep(1)} style={btnGhost()}>← Back to step 1</button>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

function WizardStepper({ step, project }) {
  const labels = ['Header', 'Payment type', 'Schedule', 'Done'];
  // A step is reachable if its preceding step has produced enough data:
  //   step 1: always reachable
  //   step 2+: requires project to exist
  const reachable = (n) => n === 1 || !!project;
  return (
    <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
      {labels.map((label, i) => {
        const n = i + 1;
        const isCurrent = n === step;
        const done = n < step;
        const can = reachable(n);
        return (
          <React.Fragment key={n}>
            <div style={{
              flex: 1, padding: '8px 12px', textAlign: 'center',
              border: `1px solid ${isCurrent ? C.red : C.line}`,
              background: isCurrent ? C.redSoft : (done ? C.greenLight : C.white),
              color: isCurrent ? C.red : (done ? C.green : (can ? C.text : C.muted)),
              borderRadius: 6, fontSize: 12, fontWeight: 600,
              opacity: can ? 1 : 0.5,
            }}>
              {done && '✓ '}{n}. {label}
            </div>
            {i < labels.length - 1 && <div style={{ width: 8 }} />}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ============================================================
// WIZARD STEP 1 — HEADER
// ============================================================
function WizardStep1Header({ access, project, setProject, onNext }) {
  // Owner defaults to current user on fresh project. On resume, use saved value.
  const currentUserEmail = getEmail(access.session);
  const { users } = useCashflowUsers(access.session, true);
  // Assignees state — only loaded if project exists (need project.id to query)
  const [assignees, setAssignees] = useState([]);
  useEffect(() => {
    if (!project) return;
    (async () => {
      try {
        const a = await sbSelect('project_contributors', `project_id=eq.${project.id}`, access.session);
        setAssignees(a || []);
      } catch (e) { /* non-fatal */ }
    })();
  }, [project, access.session]);

  const [form, setForm] = useState(() => ({
    name:              project ? (project.name || '') : '',
    number:            project ? (project.number || '') : '',
    value:             project ? project.value : '',
    retention_pct:     project ? project.retention_pct : '',
    defects_retention_pct: project && project.defects_retention_pct != null ? project.defects_retention_pct : '',
    start_date:        project ? (project.start_date || '') : '',
    end_date:          project ? (project.end_date || '') : '',
    retention_date:    project ? (project.retention_date || '') : '',
    payment_terms_days: project ? project.payment_terms_days : 30,
    owner_email:       project ? (project.owner_email || '') : (currentUserEmail || ''),
  }));
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  // Date validation. End-before-start and retention-before-end are both
  // category errors — hard blocks on save.
  const endBeforeStart = form.start_date && form.end_date && cmpDate(form.end_date, form.start_date) < 0;
  const retentionBeforeEnd = form.end_date && form.retention_date && cmpDate(form.retention_date, form.end_date) < 0;

  // Soft: defects retention shouldn't exceed total retention (warn, don't block).
  const defectsExceedsRetention =
    form.defects_retention_pct !== '' && form.retention_pct !== ''
    && Number(form.defects_retention_pct) > Number(form.retention_pct);

  const valid =
    form.name && form.name.trim().length > 0
    && Number(form.value) >= 0
    && !endBeforeStart
    && !retentionBeforeEnd;

  const update = (field, val) => setForm(prev => ({ ...prev, [field]: val }));

  const save = async () => {
    if (!valid) return;
    setBusy(true); setError('');
    try {
      const payload = {
        name: form.name.trim(),
        number: form.number.trim() || null,
        value: Number(form.value) || 0,
        retention_pct: form.retention_pct === '' ? 0 : Number(form.retention_pct),
        defects_retention_pct: form.defects_retention_pct === '' ? null : Number(form.defects_retention_pct),
        start_date: form.start_date || null,
        end_date: form.end_date || null,
        retention_date: form.retention_date || null,
        payment_terms_days: Number(form.payment_terms_days) || 30,
        owner_email: form.owner_email.trim() || null,
      };
      let updated;
      if (project) {
        updated = await sbUpdate('projects', `id=eq.${project.id}`, payload, access.session);
      } else {
        // Add the create_event to audit_log on insert
        const auditEvent = { event: 'created', actor: getEmail(access.session), at: new Date().toISOString() };
        updated = await sbInsert('projects', {
          ...payload,
          status: 'draft',
          created_by_email: getEmail(access.session),
          audit_log: [auditEvent],
        }, access.session);
      }
      setProject(updated[0]);
      onNext();
    } catch (e) {
      setError(e.message);
    } finally { setBusy(false); }
  };

  return (
    <Card>
      <h2 style={{ marginTop: 0, fontSize: 18, color: C.text }}>Project header</h2>
      <p style={{ color: C.muted, fontSize: 13, marginTop: 4, marginBottom: 20 }}>
        The headline information about this project. Required: name and value.
      </p>

      <Field label="Project name *">
        <input value={form.name} onChange={(e) => update('name', e.target.value)} style={inp()} autoFocus />
      </Field>

      <div style={twoCol()}>
        <Field label="Project number">
          <input value={form.number} onChange={(e) => update('number', e.target.value)} style={inp()} placeholder="e.g. P-2401" />
        </Field>
        <Field label="Owner">
          <UserPicker
            value={form.owner_email}
            onChange={(v) => update('owner_email', v)}
            users={users}
          />
        </Field>
      </div>

      <div style={threeCol()}>
        <Field label="Project value (£)">
          <MoneyInput value={form.value} onChange={(v) => update('value', v)} />
        </Field>
        <Field label="Retention (%)">
          <NumberInput value={form.retention_pct} onChange={(v) => update('retention_pct', v)} step="0.01" placeholder="e.g. 5" />
        </Field>
        <Field label="Defects retention (%)">
          <NumberInput value={form.defects_retention_pct} onChange={(v) => update('defects_retention_pct', v)} step="0.01" placeholder="optional, e.g. 2.5" />
          {defectsExceedsRetention && (
            <div style={{ fontSize: 11, color: C.amber, marginTop: 3, fontWeight: 500 }}>
              ⚠ Defects retention exceeds total retention
            </div>
          )}
          {!defectsExceedsRetention && (
            <div style={{ fontSize: 11, color: C.muted, marginTop: 3, fontStyle: 'italic' }}>
              Part of retention held past defects period. Often half of total.
            </div>
          )}
        </Field>
      </div>

      <div style={threeCol()}>
        <Field label="Start date">
          <DateField
            value={form.start_date}
            onChange={(v) => update('start_date', v)}
          />
        </Field>
        <Field label="End date">
          <DateField
            value={form.end_date}
            onChange={(v) => update('end_date', v)}
            min={form.start_date || undefined}
            warning={endBeforeStart ? 'End date must be on or after start date' : null}
            error={endBeforeStart}
          />
        </Field>
        <Field label="Retention release date">
          <DateField
            value={form.retention_date}
            onChange={(v) => update('retention_date', v)}
            min={form.end_date || form.start_date || undefined}
            hint={form.end_date ? `Typically ~12 months after end (${fmtDateShort(addDays(form.end_date, 365))})` : 'After end of defects period'}
            warning={retentionBeforeEnd ? 'Retention is released after project end' : null}
            error={retentionBeforeEnd}
          />
        </Field>
      </div>

      <Field label="Payment terms (days)">
        <NumberInput value={form.payment_terms_days} onChange={(v) => update('payment_terms_days', v)} step="1" placeholder="30" />
      </Field>

      {project ? (
        <Field label="Contributors (additional people with access)">
          <ContributorsInline
            project={project}
            assignees={assignees} setAssignees={setAssignees}
            allUsers={users}
            access={access}
          />
        </Field>
      ) : (
        <div style={{ background: C.bg, padding: 12, borderRadius: 6, fontSize: 12, color: C.muted, marginBottom: 14, fontStyle: 'italic' }}>
          Contributors can be added once the project is saved.
        </div>
      )}

      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 20 }}>
        <button onClick={save} disabled={!valid || busy} style={btn(!valid || busy)}>
          {busy ? 'Saving…' : (project ? 'Save & continue →' : 'Create & continue →')}
        </button>
      </div>
    </Card>
  );
}

// ============================================================
// WIZARD STEP 2 — PAYMENT TYPE
// ============================================================
function WizardStep2Type({ access, project, setProject, onBack, onNext }) {
  const [paymentType, setPaymentType] = useState(project.payment_type || null);
  const [first_valuation_date, setFirstValDate] = useState(project.first_valuation_date || '');
  const [valuation_cycle_days, setCycleDays] = useState(project.valuation_cycle_days || 30);
  const [review_period_days, setReviewDays] = useState(project.review_period_days || 14);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  // For valuation, all three valuation fields must be set.
  // For stage, just the type is needed at this step.
  const valid = paymentType === 'stage' || (
    paymentType === 'valuation'
    && first_valuation_date
    && Number(valuation_cycle_days) > 0
    && Number(review_period_days) >= 0
  );

  const save = async () => {
    if (!valid) return;
    setBusy(true); setError('');
    try {
      const payload = {
        payment_type: paymentType,
        first_valuation_date: paymentType === 'valuation' ? (first_valuation_date || null) : null,
        valuation_cycle_days: paymentType === 'valuation' ? (Number(valuation_cycle_days) || null) : null,
        review_period_days: paymentType === 'valuation' ? (Number(review_period_days) || null) : null,
      };
      const updated = await sbUpdate('projects', `id=eq.${project.id}`, payload, access.session);
      setProject(updated[0]);
      onNext();
    } catch (e) {
      setError(e.message);
    } finally { setBusy(false); }
  };

  return (
    <Card>
      <h2 style={{ marginTop: 0, fontSize: 18, color: C.text }}>Payment type</h2>
      <p style={{ color: C.muted, fontSize: 13, marginTop: 4, marginBottom: 20 }}>
        How is this project billed? Pick one to reveal the relevant fields.
      </p>

      <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
        <PaymentTypeOption
          selected={paymentType === 'stage'}
          onClick={() => setPaymentType('stage')}
          label="Stage payment"
          description="Fixed schedule of invoices at agreed percentages or amounts of the project value."
        />
        <PaymentTypeOption
          selected={paymentType === 'valuation'}
          onClick={() => setPaymentType('valuation')}
          label="Valuation"
          description="Recurring claims raised at intervals, reviewed, then invoiced."
        />
      </div>

      {paymentType === 'valuation' && (
        <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 16, marginTop: 4 }}>
          <h3 style={{ fontSize: 14, color: C.text, margin: '0 0 12px' }}>Valuation parameters</h3>
          <div style={threeCol()}>
            <Field label="First valuation date">
              <DateInput value={first_valuation_date} onChange={setFirstValDate} />
            </Field>
            <Field label="Cycle (days)">
              <NumberInput value={valuation_cycle_days} onChange={setCycleDays} step="1" placeholder="30" />
            </Field>
            <Field label="Review period (days)">
              <NumberInput value={review_period_days} onChange={setReviewDays} step="1" placeholder="14" />
            </Field>
          </div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>
            Cycle = how often a new claim is raised. Review = how long between claim and invoice.
          </div>
        </div>
      )}

      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginTop: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between', marginTop: 20 }}>
        <button onClick={onBack} style={btnGhost()}>← Back</button>
        <button onClick={save} disabled={!valid || busy} style={btn(!valid || busy)}>
          {busy ? 'Saving…' : 'Save & continue →'}
        </button>
      </div>
    </Card>
  );
}

// ============================================================
// WIZARD STEP 3 — SCHEDULE

// ============================================================
// STAGE PAYMENT SCHEDULE EDITOR
// Stores invoice_pct in DB. UI offers % and £ modes; conversion is one-way at display.
// Hard-validated: sum of % must equal 100 (tolerance 0.005%).
// ============================================================
function StageScheduleEditor({ access, project, setProject, onBack, onNext }) {
  const [rows, setRows] = useState(null);
  const [mode, setMode] = useState('pct'); // 'pct' | 'gbp'
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [askSplit, setAskSplit] = useState(false);

  // Load existing invoice rows (in case the user is resuming a draft)
  useEffect(() => {
    (async () => {
      try {
        const list = await sbSelect('project_invoices',
          `project_id=eq.${project.id}&order=sequence.asc`,
          access.session);
        setRows(list.map((r, i) => ({
          // Each row gets a temp ID for keyed React rendering. Sticky across edits.
          _key: r.id || `existing-${i}-${Math.random()}`,
          id: r.id, // real DB id (if persisted)
          sequence: r.sequence,
          invoice_date: r.invoice_date || '',
          payment_date_override: r.payment_date_override || '',
          invoice_pct: r.invoice_pct == null ? '' : r.invoice_pct,
          notes: r.notes || '',
        })));
      } catch (e) { setError(e.message); }
    })();
  }, [project.id, access.session]);

  if (rows === null) return <LoadingMsg label="Loading schedule…" />;

  const projectValue = Number(project.value) || 0;

  // pct/gbp conversion helpers
  const pctToGbp = (pct) => pct == null || pct === '' ? '' : Number(pct) / 100 * projectValue;
  const gbpToPct = (gbp) => gbp == null || gbp === '' || projectValue === 0 ? '' : Number(gbp) / projectValue * 100;

  const sumPct = rows.reduce((s, r) => s + (Number(r.invoice_pct) || 0), 0);
  const sumGbp = sumPct / 100 * projectValue;
  const validSum = Math.abs(sumPct - 100) <= 0.005;

  const addRow = () => {
    setRows(prev => [...prev, {
      _key: `new-${Date.now()}-${Math.random()}`,
      id: null,
      sequence: prev.length + 1,
      invoice_date: '',
      payment_date_override: '',
      invoice_pct: '',
      notes: '',
    }]);
  };

  const removeRow = (key) => {
    setRows(prev => prev.filter(r => r._key !== key).map((r, i) => ({ ...r, sequence: i + 1 })));
  };

  const updateRow = (key, field, value) => {
    setRows(prev => prev.map(r => {
      if (r._key !== key) return r;
      if (field === 'invoice_pct' && mode === 'gbp') {
        // In £ mode, "invoice_pct" is actually a £ input; convert and store as %.
        return { ...r, invoice_pct: value === '' ? '' : Number(gbpToPct(value)) };
      }
      return { ...r, [field]: value };
    }));
  };

  const splitEvenly = (n) => {
    const evenPct = Math.round((100 / n) * 10000) / 10000; // 4 dp
    // Account for rounding remainder on the last row so the sum is exactly 100.
    const lastPct = Math.round((100 - evenPct * (n - 1)) * 10000) / 10000;
    // Spread dates evenly between start_date and end_date, or use today's date.
    const newRows = [];
    const start = project.start_date ? new Date(project.start_date) : new Date();
    const end = project.end_date ? new Date(project.end_date) : new Date(start.getTime() + n * 30 * 86400 * 1000);
    const totalMs = end.getTime() - start.getTime();
    for (let i = 0; i < n; i++) {
      const date = new Date(start.getTime() + (totalMs * i) / Math.max(n - 1, 1));
      newRows.push({
        _key: `split-${Date.now()}-${i}-${Math.random()}`,
        id: null,
        sequence: i + 1,
        invoice_date: date.toISOString().slice(0, 10),
        payment_date_override: '',
        invoice_pct: i === n - 1 ? lastPct : evenPct,
        notes: '',
      });
    }
    setRows(newRows);
    setAskSplit(false);
  };

  const save = async () => {
    if (!validSum) { setError('Stages must sum to exactly 100%.'); return; }
    if (rows.length === 0) { setError('Add at least one stage.'); return; }
    if (rows.some(r => !r.invoice_date)) { setError('Every stage needs an invoice date.'); return; }
    // Hard block: payment date override (when set) must not be before invoice date.
    const bad = rows.find(r => r.payment_date_override && cmpDate(r.payment_date_override, r.invoice_date) < 0);
    if (bad) { setError(`Stage ${bad.sequence}: payment date is before the invoice date.`); return; }
    setBusy(true); setError('');
    try {
      // Wipe and rewrite — simplest reliable approach for a wizard.
      // RLS allows pi_write because the project exists and current user can access it.
      await sbDelete('project_invoices', `project_id=eq.${project.id}`, access.session);
      const inserts = rows.map(r => ({
        project_id: project.id,
        sequence: r.sequence,
        invoice_date: r.invoice_date,
        payment_date_override: r.payment_date_override || null,
        invoice_pct: Number(r.invoice_pct),
        invoice_value_net: pctToGbp(r.invoice_pct), // denormalised for convenience
        notes: r.notes || null,
      }));
      if (inserts.length > 0) await sbInsert('project_invoices', inserts, access.session);
      onNext();
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
        <h2 style={{ marginTop: 0, fontSize: 18, color: C.text }}>Stage payment schedule</h2>
        <ModeToggle mode={mode} setMode={setMode} />
      </div>
      <p style={{ color: C.muted, fontSize: 13, marginTop: 0, marginBottom: 20 }}>
        Add one row per invoice. {mode === 'pct'
          ? 'The percentages must sum to exactly 100%.'
          : `The pound amounts must sum to exactly £${fmtMoney(projectValue)}.`}
      </p>

      <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
        <button onClick={addRow} style={btnGhost()}>+ Add stage</button>
        <button onClick={() => setAskSplit(true)} style={btnGhost()}>Split evenly into N stages…</button>
        {askSplit && <SplitPrompt onCancel={() => setAskSplit(false)} onSplit={splitEvenly} />}
      </div>

      {rows.length === 0 ? (
        <div style={{ padding: 30, textAlign: 'center', color: C.muted, fontSize: 13, border: `1px dashed ${C.line}`, borderRadius: 6 }}>
          No stages yet. Add one above or use “Split evenly”.
        </div>
      ) : (
        <div style={{ overflowX: 'auto' }}>
          <div style={{ minWidth: 1100 }}>
            <ScheduleHeaderRow isStage={true} />
            {rows.map((r, i) => (
              <StageRowEditor
                key={r._key}
                row={r}
                mode={mode}
                project={project}
                projectValue={projectValue}
                onChange={(field, value) => updateRow(r._key, field, value)}
                onRemove={() => removeRow(r._key)}
              />
            ))}
            <ScheduleSumRow
              rows={rows} project={project} isStage={true}
              validSum={validSum} sumPct={sumPct}
            />
          </div>
        </div>
      )}

      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginTop: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between', marginTop: 20 }}>
        <button onClick={onBack} style={btnGhost()}>← Back</button>
        <button onClick={save} disabled={!validSum || busy || rows.length === 0} style={btn(!validSum || busy || rows.length === 0)}>
          {busy ? 'Saving…' : 'Save & continue →'}
        </button>
      </div>
    </Card>
  );
}

// Grid template for schedule rows. Kept in one place so the header, rows, and
// footer all agree on column widths.
const STAGE_GRID = '36px 130px 165px 80px 110px 110px 110px 110px 120px minmax(140px, 1fr) 32px';
const VAL_GRID   = '36px 130px 165px 110px 110px 110px 110px 120px minmax(140px, 1fr) 32px';

// Compute the math for a single invoice/claim row given the project header.
// Returns { gross, retention, subtotal, vat, total } — all numbers (£), zero if not yet entered.
function computeRowBreakdown(row, project, isStage) {
  const projectValue = Number(project.value) || 0;
  const retPct = Number(project.retention_pct) || 0;
  const vatRate = (project.vat_rate == null || project.vat_rate === '') ? 0.20 : Number(project.vat_rate);

  let gross = 0;
  if (isStage) {
    const pct = Number(row.invoice_pct);
    if (!isNaN(pct)) gross = pct / 100 * projectValue;
  } else {
    const v = Number(row.invoice_value_net);
    if (!isNaN(v)) gross = v;
  }
  const retention = gross * (retPct / 100);
  const subtotal = gross - retention;
  const vat = subtotal * vatRate;
  const total = subtotal + vat;
  return { gross, retention, subtotal, vat, total };
}

// Small read-only money cell used in the schedule breakdown.
function DerivedMoneyCell({ value, color, bold }) {
  return (
    <div style={{
      padding: '8px 8px', background: C.redSoft, border: `1px solid ${C.line}`,
      borderRadius: 4, fontSize: 13, fontWeight: bold ? 700 : 500,
      color: color || C.text, textAlign: 'right',
      fontVariantNumeric: 'tabular-nums', minWidth: 0,
      boxSizing: 'border-box', overflow: 'hidden', textOverflow: 'ellipsis',
    }}>
      {value === 0 || value ? `£${fmtMoney(value)}` : '—'}
    </div>
  );
}

// Header row for the schedule breakdown table. Shared by wizard + detail page.
function ScheduleHeaderRow({ isStage }) {
  const headerCell = (label, align) => (
    <div style={{
      fontSize: 11, color: C.muted, fontWeight: 600,
      textTransform: 'uppercase', letterSpacing: '0.05em',
      textAlign: align || 'left',
    }}>{label}</div>
  );
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: isStage ? STAGE_GRID : VAL_GRID,
      gap: 8, padding: '6px 4px',
      borderBottom: `1px solid ${C.line}`, marginBottom: 4,
    }}>
      {headerCell('#')}
      {headerCell('Invoice date')}
      {headerCell('Payment date')}
      {isStage && headerCell('%', 'right')}
      {headerCell('Amount £', 'right')}
      {headerCell('Retention £', 'right')}
      {headerCell('Subtotal', 'right')}
      {headerCell('VAT', 'right')}
      {headerCell('Total', 'right')}
      {headerCell('Notes')}
      {headerCell('')}
    </div>
  );
}

// Sum row at the bottom of the schedule. Totals every numeric column.
// Also shows the % validation indicator for stage schedules.
function ScheduleSumRow({ rows, project, isStage, validSum, sumPct }) {
  let totals = { gross: 0, retention: 0, subtotal: 0, vat: 0, total: 0 };
  for (const r of (rows || [])) {
    const bd = computeRowBreakdown(r, project, isStage);
    totals.gross += bd.gross;
    totals.retention += bd.retention;
    totals.subtotal += bd.subtotal;
    totals.vat += bd.vat;
    totals.total += bd.total;
  }

  // Cell that shows the percentage sum (stage only)
  const pctSumCell = (
    <div style={{
      padding: '8px 8px', background: C.redSoft,
      border: `1px solid ${validSum ? C.line : C.redStatus}`,
      borderRadius: 4, fontSize: 13, fontWeight: 700,
      color: validSum ? C.green : C.redStatus, textAlign: 'right',
      fontVariantNumeric: 'tabular-nums', minWidth: 0,
      boxSizing: 'border-box',
    }}>
      {sumPct != null ? `${sumPct.toFixed(4).replace(/\.?0+$/, '')}%` : '—'}
    </div>
  );

  return (
    <div>
      <div style={{
        display: 'grid',
        gridTemplateColumns: isStage ? STAGE_GRID : VAL_GRID,
        gap: 8, padding: '10px 4px 4px',
        borderTop: `2px solid ${C.line}`, marginTop: 8, alignItems: 'center',
      }}>
        {/* # — empty */}
        <div></div>
        {/* Invoice date — empty, except for the 'Sum' label */}
        <div style={{ fontSize: 12, fontWeight: 700, color: C.text, paddingLeft: 4 }}>Sum</div>
        {/* Payment date — empty */}
        <div></div>
        {/* % (stage only) */}
        {isStage && pctSumCell}
        {/* Gross */}
        <DerivedMoneyCell value={totals.gross} bold />
        {/* Retention (negative for clarity) */}
        <DerivedMoneyCell
          value={totals.retention === 0 ? 0 : -totals.retention}
          bold
          color={totals.retention > 0 ? C.redStatus : undefined}
        />
        {/* Subtotal */}
        <DerivedMoneyCell value={totals.subtotal} bold />
        {/* VAT */}
        <DerivedMoneyCell value={totals.vat} bold />
        {/* Total */}
        <DerivedMoneyCell value={totals.total} bold color={C.green} />
        {/* Notes — empty */}
        <div></div>
        {/* × — empty */}
        <div></div>
      </div>

      {isStage && (
        <div style={{
          padding: '6px 4px',
          fontSize: 12, color: validSum ? C.green : C.redStatus, fontWeight: 600,
          textAlign: 'right',
        }}>
          {validSum
            ? `✓ Stages sum to 100%`
            : `⚠ Stages sum to ${sumPct.toFixed(4).replace(/\.?0+$/, '')}% — need 100% (${(100 - sumPct).toFixed(4).replace(/\.?0+$/, '')}% to go)`}
        </div>
      )}
    </div>
  );
}

function StageRowEditor({ row, mode, project, projectValue, onChange, onRemove }) {
  const valueShown = mode === 'pct'
    ? row.invoice_pct
    : (row.invoice_pct === '' ? '' : (Number(row.invoice_pct) / 100 * projectValue));

  const terms = Number(project.payment_terms_days) || 30;
  const startDate = project.start_date || null;
  const endDate = project.end_date || null;
  const computedPayment = row.invoice_date ? addDays(row.invoice_date, terms) : '';

  let invoiceWarning = null;
  if (row.invoice_date && startDate && cmpDate(row.invoice_date, startDate) < 0) {
    invoiceWarning = 'Before project start';
  } else if (row.invoice_date && endDate && cmpDate(row.invoice_date, endDate) > 0) {
    invoiceWarning = 'After project end';
  }
  const paymentBeforeInvoice =
    row.payment_date_override && row.invoice_date
    && cmpDate(row.payment_date_override, row.invoice_date) < 0;

  const bd = computeRowBreakdown(row, project, true);

  return (
    <div style={{
      display: 'grid', gridTemplateColumns: STAGE_GRID,
      gap: 8, padding: '6px 4px', alignItems: 'flex-start',
    }}>
      <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, paddingTop: 8 }}>{row.sequence}</div>
      <DateField
        value={row.invoice_date}
        onChange={(v) => onChange('invoice_date', v)}
        min={startDate || undefined}
        warning={invoiceWarning}
      />
      <OverrideDateField
        value={row.payment_date_override}
        defaultValue={computedPayment}
        onChange={(v) => onChange('payment_date_override', v)}
        defaultHintText={`payment terms (+${terms} days)`}
        min={row.invoice_date || undefined}
        warning={paymentBeforeInvoice ? 'Before invoice date' : null}
        error={paymentBeforeInvoice}
      />
      <NumberInput
        value={valueShown}
        onChange={(v) => onChange('invoice_pct', v)}
        step={mode === 'pct' ? '0.01' : '1'}
        align="right"
      />
      <DerivedMoneyCell value={bd.gross} />
      <DerivedMoneyCell value={bd.retention === 0 ? 0 : -bd.retention} color={bd.retention > 0 ? C.redStatus : undefined} />
      <DerivedMoneyCell value={bd.subtotal} />
      <DerivedMoneyCell value={bd.vat} />
      <DerivedMoneyCell value={bd.total} bold color={C.green} />
      <input value={row.notes} onChange={(e) => onChange('notes', e.target.value)} style={inp()} placeholder="Optional" />
      <button onClick={onRemove} style={{ ...miniBtn(), color: C.redStatus, padding: '6px 8px' }}>×</button>
    </div>
  );
}

function ModeToggle({ mode, setMode }) {
  return (
    <div style={{ display: 'inline-flex', border: `1px solid ${C.line}`, borderRadius: 6, overflow: 'hidden', fontSize: 12 }}>
      <button onClick={() => setMode('pct')} style={modeBtn(mode === 'pct')}>%</button>
      <button onClick={() => setMode('gbp')} style={modeBtn(mode === 'gbp')}>£</button>
