// ============================================================
// SUPABASE AUTH — ported verbatim from furniture form
// ============================================================
async function signIn(email, password) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error_description || err.msg || `Sign-in failed (${r.status})`);
  }
  const session = await r.json();
  session.expires_at = Math.floor(Date.now() / 1000) + (session.expires_in || 3600);
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  return session;
}

async function refreshSession(session) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: session.refresh_token }),
  });
  if (!r.ok) {
    localStorage.removeItem(SESSION_KEY);
    return null;
  }
  const fresh = await r.json();
  fresh.expires_at = Math.floor(Date.now() / 1000) + (fresh.expires_in || 3600);
  localStorage.setItem(SESSION_KEY, JSON.stringify(fresh));
  return fresh;
}

function getStoredSession() {
  try {
    const s = localStorage.getItem(SESSION_KEY);
    return s ? JSON.parse(s) : null;
  } catch (e) { return null; }
}

function signOut() {
  localStorage.removeItem(SESSION_KEY);
  window.location.hash = '';
  window.location.reload();
}

function getEmail(session) {
  return session && session.user && session.user.email ? session.user.email : null;
}

function isArkeUser(session) {
  const e = getEmail(session);
  return !!(e && e.toLowerCase().endsWith(ARKE_DOMAIN));
}

function useSession() {
  const [session, setSession] = useState(getStoredSession());
  useEffect(() => {
    let cancelled = false;
    const maybeRefresh = async () => {
      const s = getStoredSession();
      if (!s) { if (!cancelled) setSession(null); return; }
      const now = Math.floor(Date.now() / 1000);
      if (s.expires_at && (s.expires_at - now) < 300) {
        const fresh = await refreshSession(s);
        if (!cancelled) setSession(fresh);
      } else {
        if (!cancelled) setSession(s);
      }
    };
    maybeRefresh();
    const interval = setInterval(maybeRefresh, 10 * 60 * 1000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);
  return [session, setSession];
}

// ============================================================
// SUPABASE REST CLIENT — ported verbatim
// ============================================================
function sbHeaders(session) {
  const token = (session && session.access_token) ? session.access_token : SUPABASE_ANON_KEY;
  return {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${token}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
  };
}

async function sbSelect(table, query, session) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${query}`;
  const r = await fetch(url, { headers: sbHeaders(session) });
  if (!r.ok) throw new Error(`Select failed: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbInsert(table, data, session) {
  const url = `${SUPABASE_URL}/rest/v1/${table}`;
  const r = await fetch(url, {
    method: 'POST', headers: sbHeaders(session), body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`Insert failed: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbUpdate(table, query, data, session) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${query}`;
  const r = await fetch(url, {
    method: 'PATCH', headers: sbHeaders(session), body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`Update failed: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbDelete(table, query, session) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${query}`;
  const r = await fetch(url, {
    method: 'DELETE', headers: sbHeaders(session),
  });
  if (!r.ok) throw new Error(`Delete failed: ${r.status} ${await r.text()}`);
  return r.status === 204 ? null : r.json();
}

// Call a Supabase Edge Function with the user's JWT. Used for privileged
// operations (creating auth users, resetting passwords) that the anon key
// can't do on its own.
async function callEdgeFunction(name, body, session) {
  if (!session || !session.access_token) {
    throw new Error('Not signed in');
  }
  const r = await fetch(EDGE_FN(name), {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${session.access_token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body || {}),
  });
  const text = await r.text();
  let payload;
  try { payload = text ? JSON.parse(text) : {}; } catch (e) { payload = { error: text }; }
  if (!r.ok) throw new Error(payload.error || `Edge function ${name} failed (${r.status})`);
  return payload;
}

// ============================================================
// CRYPTO HELPERS — kept for future use (CSV preset sharing etc.)
// ============================================================
async function hashPassword(password, saltB64, iterations) {
  const enc = new TextEncoder();
  const salt = Uint8Array.from(atob(saltB64), c => c.charCodeAt(0));
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMaterial, 256
  );
  return btoa(String.fromCharCode(...new Uint8Array(bits)));
}

function generateSalt() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr));
}

function fmtMoney(n) {
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '';
  return Number(n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtPct(n) {
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '';
  return Number(n).toFixed(2) + '%';
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-GB', {
    day: 'numeric', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function timeAgo(iso) {
  if (!iso) return '';
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h';
  if (sec < 86400 * 30) return Math.floor(sec / 86400) + 'd';
  if (sec < 86400 * 365) return Math.floor(sec / (86400 * 30)) + 'mo';
  return Math.floor(sec / (86400 * 365)) + 'y';
}

// Add `days` days to an ISO date string (YYYY-MM-DD), returning a new ISO date.
// Returns '' if input is missing or invalid. Days can be negative.
function addDays(iso, days) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00Z');
  if (isNaN(d.getTime())) return '';
  d.setUTCDate(d.getUTCDate() + Number(days || 0));
  return d.toISOString().slice(0, 10);
}

// Compare two ISO dates (YYYY-MM-DD). Returns -1/0/1. Missing dates compare as 0.
function cmpDate(a, b) {
  if (!a || !b) return 0;
  if (a < b) return -1;
  if (a > b) return 1;
  return 0;
}

// Format an ISO date as a short label, e.g. "15 Aug 2026". Used in placeholders
// where space is tight. Empty input → ''.
function fmtDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00Z');
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

// Round to 2 decimals — used wherever we generate money figures programmatically.
function round2(n) {
  if (n == null || isNaN(Number(n))) return 0;
  return Math.round(Number(n) * 100) / 100;
}

// ============================================================
// HASH ROUTING — new for this app
// Path: #/projects/abc?tab=schedule  =>
//   { path: ['projects', 'abc'], params: { tab: 'schedule' } }
// ============================================================
function parseHash(hash) {
  // Strip leading '#' and '/'
  let h = (hash || '').replace(/^#/, '').replace(/^\//, '');
  if (h === '') return { path: [], params: {} };
  const [pathStr, queryStr] = h.split('?');
  const path = pathStr.split('/').filter(Boolean).map(decodeURIComponent);
  const params = {};
  if (queryStr) {
    for (const pair of queryStr.split('&')) {
      const [k, v] = pair.split('=');
      if (k) params[decodeURIComponent(k)] = v == null ? '' : decodeURIComponent(v);
    }
  }
  return { path, params };
}

function buildHash(path, params) {
  let h = '#/' + (path || []).map(encodeURIComponent).join('/');
  if (params && Object.keys(params).length > 0) {
    const qs = Object.entries(params)
      .filter(([k, v]) => v != null && v !== '')
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    if (qs) h += '?' + qs;
  }
  return h;
}

function useHashRoute() {
  const [route, setRoute] = useState(() => parseHash(window.location.hash));
  useEffect(() => {
    const handler = () => setRoute(parseHash(window.location.hash));
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  const navigate = useCallback((path, params, replace) => {
    const hash = buildHash(path, params);
    if (replace) {
      const url = window.location.href.split('#')[0] + hash;
      window.history.replaceState(null, '', url);
      setRoute(parseHash(hash));
    } else {
      window.location.hash = hash;
    }
  }, []);
  return { route, navigate };
}

// ============================================================
// ACCESS CONTROL — new
// Wraps useSession and resolves the user's cashflow_users row.
// Returns { session, role, displayName, hasAccess, loading, error, refetch }
// ============================================================
function useAccessControl() {
  const [session, setSession] = useSession();
  const [state, setState] = useState({
    role: null, displayName: null, hasAccess: false, loading: true, error: null,
  });

  const fetchRole = useCallback(async () => {
    if (!session) {
      setState({ role: null, displayName: null, hasAccess: false, loading: false, error: null });
      return;
    }
    if (!isArkeUser(session)) {
      setState({ role: null, displayName: null, hasAccess: false, loading: false, error: 'non_arke' });
      return;
    }
    try {
      // RLS allows self-read on cashflow_users via cu_self_read policy
      const rows = await sbSelect('cashflow_users', `user_id=eq.${session.user.id}&select=role,display_name,active&limit=1`, session);
      if (!rows || rows.length === 0) {
        setState({ role: null, displayName: null, hasAccess: false, loading: false, error: 'no_row' });
        return;
      }
      const row = rows[0];
      if (!row.active) {
        setState({ role: row.role, displayName: row.display_name, hasAccess: false, loading: false, error: 'inactive' });
        return;
      }
      setState({ role: row.role, displayName: row.display_name, hasAccess: true, loading: false, error: null });
    } catch (e) {
      setState({ role: null, displayName: null, hasAccess: false, loading: false, error: e.message });
    }
  }, [session]);

  useEffect(() => { fetchRole(); }, [fetchRole]);

  return { session, setSession, ...state, refetch: fetchRole };
}

// useCashflowUsers — loads the directory of active users for picker UIs
// (assignee dropdowns, owner pickers). Refetch on demand.
function useCashflowUsers(session, enabled) {
  const [users, setUsers] = useState(null);
  const [error, setError] = useState(null);

  const fetch = useCallback(async () => {
    if (!enabled || !session) return;
    try {
      const u = await sbSelect('cashflow_users',
        'select=user_id,email,display_name,role,active&active=eq.true&order=display_name.asc',
        session);
      setUsers(u || []);
    } catch (e) { setError(e.message); }
  }, [session, enabled]);

  useEffect(() => { fetch(); }, [fetch]);

  return { users, error, refetch: fetch };
}

// ============================================================
// ROOT
// ============================================================
function App() {
  const access = useAccessControl();
  const { route, navigate } = useHashRoute();

  if (access.loading) {
    return <Shell session={access.session}><LoadingMsg label="Loading…" /></Shell>;
  }

  // Not signed in at all
  if (!access.session) {
    return <Shell session={null}><PublicLanding /></Shell>;
  }

  // Signed in but no access (wrong domain / not in cashflow_users / inactive)
  if (!access.hasAccess) {
    return <Shell session={access.session}><NoAccessScreen reason={access.error} email={getEmail(access.session)} /></Shell>;
  }

  // Authed and authorised — render the sidebar shell with current route
  return (
    <SignedInShell access={access} route={route} navigate={navigate}>
      <RouteSwitch route={route} navigate={navigate} access={access} />
    </SignedInShell>
  );
}

// ============================================================
// ROUTE SWITCH
// Routes a user can hit depend on their role. Any disallowed route → home.
// ============================================================
function Redirect({ navigate, to }) {
  // Wrapper that performs a hash navigation on mount. Used by RouteSwitch
  // to bounce users out of routes they can't access without breaking the
  // rules of hooks (which would happen if we called useEffect conditionally
  // inside RouteSwitch's branches).
  useEffect(() => { navigate(to, {}, true); }, []);
  return <LoadingMsg label="Redirecting…" />;
}

function RouteSwitch({ route, navigate, access }) {
  const isEditor = access.role === 'editor';
  const seg = route.path[0] || '';

  // Editor-only routes
  const editorOnly = ['cashflow', 'debtors', 'overheads', 'settings'];

  // Wrong route for role → bounce home
  if (!isEditor && editorOnly.includes(seg)) {
    return <Redirect navigate={navigate} to={[]} />;
  }

  // Home — different by role
  if (seg === '' || seg === 'home') {
    return isEditor ? <CashflowPage access={access} /> : <ProjectsRegisterPage access={access} navigate={navigate} />;
  }
  if (seg === 'cashflow') return <CashflowPage access={access} />;
  if (seg === 'projects') {
    // Wizard (both /new and /<id>/wizard) is editor-only
    const isWizardRoute = route.path[1] === 'new' || route.path[2] === 'wizard';
    if (!isEditor && isWizardRoute) {
      return <Redirect navigate={navigate} to={['projects']} />;
    }
    if (route.path[1] === 'new') return <NewProjectWizard access={access} navigate={navigate} route={route} />;
    if (route.path[1] && route.path[2] === 'wizard') return <NewProjectWizard access={access} navigate={navigate} route={route} projectId={route.path[1]} />;
    if (route.path[1]) return <ProjectDetailPage id={route.path[1]} access={access} navigate={navigate} />;
    return <ProjectsRegisterPage access={access} navigate={navigate} />;
  }
  if (seg === 'debtors') {
    if (route.path[1] === 'import') return <DebtorImportStub />;
    return <DebtorListStub />;
  }
  if (seg === 'overheads') return <OverheadListStub />;
  if (seg === 'settings') {
    if (route.path[1] === 'users') return <SettingsUsersPage access={access} />;
    if (route.path[1] === 'categories') return <SettingsCategoriesStub />;
    if (route.path[1] === 'csv-presets') return <SettingsCsvPresetsStub />;
    return <SettingsHub access={access} />;
  }
  return <NotFound navigate={navigate} />;
}

// NO ACCESS SCREEN

function NoAccessScreen({ reason, email }) {
  const messages = {
    non_arke: {
      title: 'Wrong account',
      body: `This tool is only available to @arkecreative.co.uk accounts. You're signed in as ${email}.`,
    },
    no_row: {
      title: 'Access not yet granted',
      body: `You're signed in as ${email} but you haven't been added to the Cashflow Hub yet. Ask an editor to add you in Settings → Users.`,
    },
    inactive: {
      title: 'Access deactivated',
      body: `Your account (${email}) has been deactivated. Speak to an editor if you think that's a mistake.`,
    },
  };
  const m = messages[reason] || { title: 'Access denied', body: `Couldn't verify access for ${email}.` };
  return (
    <div style={{ maxWidth: 480, margin: '80px auto', padding: '0 24px', textAlign: 'center' }}>
      <Card>
        <h2 style={{ ...brandTitle(), fontSize: 22, marginTop: 0 }}>{m.title}</h2>
        <p style={{ color: C.muted, fontSize: 14, lineHeight: 1.6 }}>{m.body}</p>
        <button onClick={signOut} style={{ ...btnGhost(), marginTop: 16 }}>Sign out</button>
      </Card>
    </div>
  );
}

// ============================================================
// SIGN-IN MODAL — ported from furniture form
// ============================================================
function SignInModal({ onClose, onSignedIn }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setBusy(true);
    try {
      const session = await signIn(email.trim(), password);
      if (!isArkeUser(session)) {
        localStorage.removeItem(SESSION_KEY);
        throw new Error('This tool is for @arkecreative.co.uk accounts only.');
      }
      onSignedIn(session);
      onClose();
    } catch (err) {
      setError(err.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="arke-modal-backdrop" onClick={onClose}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()}
        style={{ maxWidth: 380, textAlign: 'left', padding: '24px 24px 20px' }}>
        <h2 style={{ ...brandTitle(), marginTop: 0, marginBottom: 4, fontSize: 22 }}>
          Sign in
        </h2>
        <p style={{ color: C.muted, fontSize: 13, marginTop: 0, marginBottom: 20 }}>
          Use your @arkecreative.co.uk email and password.
        </p>
        <form onSubmit={submit}>
          <Field label="Email">
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)}
              autoFocus style={inp()} placeholder="you@arkecreative.co.uk" />
          </Field>
          <Field label="Password">
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} style={inp()} />
          </Field>
          {error && (
            <div style={{ color: C.redStatus, fontSize: 13, marginBottom: 12 }}>{error}</div>
          )}
          <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
            <button type="submit" disabled={busy || !email || !password} style={btn(busy || !email || !password)}>
              {busy ? 'Signing in…' : 'Sign in'}
            </button>
            <button type="button" onClick={onClose} style={btnGhost()}>Cancel</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ============================================================
// MASTER CASHFLOW PAGE (editor-only)
// Aggregates every qualifying project's cash events into a weekly grid.
// "Qualifying" = active projects, OR completed projects with unreleased retention.
// ============================================================
function CashflowPage({ access }) {
  const [projects, setProjects] = useState(null);
  const [invoicesByProject, setInvoicesByProject] = useState({});
  const [releasesByProject, setReleasesByProject] = useState({});
  const [settings, setSettings] = useState(null);
  const [windowWeeks, setWindowWeeks] = useState(13);
  const [error, setError] = useState(null);
  const [drillCell, setDrillCell] = useState(null); // { weekStart, events }
  const [editingOB, setEditingOB] = useState(false);

  // Load everything in parallel
  useEffect(() => {
    (async () => {
      try {
        const [allProjects, settingsRows] = await Promise.all([
          // Pull all non-archived non-draft projects — we'll filter to "qualifying" below
          sbSelect('projects',
            `select=*&status=in.(active,complete)&order=name.asc`,
            access.session),
          sbSelect('cashflow_settings',
            `singleton=eq.cashflow&limit=1`,
            access.session),
        ]);

        // Fetch invoices + releases for ALL of these projects in two queries
        if (allProjects.length === 0) {
          setProjects([]);
          setInvoicesByProject({});
          setReleasesByProject({});
        } else {
          const idList = allProjects.map(p => `"${p.id}"`).join(',');
          const [invoices, releases] = await Promise.all([
            sbSelect('project_invoices', `project_id=in.(${idList})&order=sequence.asc`, access.session),
            sbSelect('project_retention_releases', `project_id=in.(${idList})&order=release_date.asc`, access.session),
          ]);
          // Bucket by project id
          const invs = {}, rels = {};
          for (const inv of invoices) {
            (invs[inv.project_id] = invs[inv.project_id] || []).push(inv);
          }
          for (const r of releases) {
            (rels[r.project_id] = rels[r.project_id] || []).push(r);
          }
          setProjects(allProjects);
          setInvoicesByProject(invs);
          setReleasesByProject(rels);
        }

        if (settingsRows && settingsRows[0]) {
          setSettings(settingsRows[0]);
        } else {
          // Should never happen if migration was run, but fall back to defaults
          setSettings({ singleton: 'cashflow', opening_balance: 0, opening_as_of_date: new Date().toISOString().slice(0, 10) });
        }
      } catch (e) { setError(e.message); }
    })();
  }, [access.session]);

  // Filter projects: keep active + (complete with unreleased retention)
  const qualifyingProjects = useMemo(() => {
    if (!projects) return null;
    return projects.filter(p => {
      if (p.status === 'active') return true;
      if (p.status === 'complete') {
        // Has remaining retention?
        const invs = invoicesByProject[p.id] || [];
        const rels = releasesByProject[p.id] || [];
        const retPct = Number(p.retention_pct) || 0;
        if (retPct === 0) return false;
        const pv = Number(p.value) || 0;
        const withheld = invs.reduce((s, inv) => {
          let gross = 0;
          if (inv.invoice_pct != null) gross = (Number(inv.invoice_pct) / 100) * pv;
          else if (inv.invoice_value_net != null) gross = Number(inv.invoice_value_net);
          return s + gross * (retPct / 100);
        }, 0);
        const released = rels.reduce((s, r) => s + (Number(r.amount) || 0), 0);
        return (withheld - released) > 0.01;
      }
      return false;
    });
  }, [projects, invoicesByProject, releasesByProject]);

  // Build the week-column array. Window starts on the Monday of "as of date" (or today).
  const weekColumns = useMemo(() => {
    const anchor = settings ? settings.opening_as_of_date : new Date().toISOString().slice(0, 10);
    const startMon = mondayOf(anchor);
    const cols = [];
    for (let i = 0; i < windowWeeks; i++) cols.push(addDays(startMon, i * 7));
    return cols;
  }, [settings, windowWeeks]);

  // Compute the per-project per-week cell totals + drill-through event lists
  const grid = useMemo(() => {
    if (!qualifyingProjects) return null;
    const result = {
      // perProject[projectId] = { weeks: { [mondayISO]: { total, events: [...] } }, rowTotal, past, future }
      perProject: {},
      weekTotals: {},   // [mondayISO] = number
      grandTotal: 0,
      pastTotal: 0,     // events before window
      futureTotal: 0,   // events after window
    };
    const windowStart = weekColumns[0];
    const windowEnd = addDays(weekColumns[weekColumns.length - 1], 7); // exclusive

    for (const p of qualifyingProjects) {
      const events = projectCashEvents(p, invoicesByProject[p.id] || [], releasesByProject[p.id] || []);
      const row = { weeks: {}, rowTotal: 0, past: 0, future: 0 };
      for (const wk of weekColumns) row.weeks[wk] = { total: 0, events: [] };
      for (const ev of events) {
        if (cmpDate(ev.date, windowStart) < 0) {
          row.past += ev.gross;
          result.pastTotal += ev.gross;
          continue;
        }
        if (cmpDate(ev.date, windowEnd) >= 0) {
          row.future += ev.gross;
          result.futureTotal += ev.gross;
          continue;
        }
        const wk = mondayOf(ev.date);
        if (!row.weeks[wk]) row.weeks[wk] = { total: 0, events: [] };
        row.weeks[wk].total += ev.gross;
        row.weeks[wk].events.push({ ...ev, project: p });
        row.rowTotal += ev.gross;
        result.weekTotals[wk] = (result.weekTotals[wk] || 0) + ev.gross;
        result.grandTotal += ev.gross;
      }
      result.perProject[p.id] = row;
    }
    return result;
  }, [qualifyingProjects, invoicesByProject, releasesByProject, weekColumns]);

  // Running balance row: opening balance + cumulative weekly inflows
  const runningBalance = useMemo(() => {
    if (!grid || !settings) return null;
    const ob = Number(settings.opening_balance) || 0;
    let bal = ob;
    const balances = [];
    for (const wk of weekColumns) {
      bal += (grid.weekTotals[wk] || 0);
      balances.push(bal);
    }
    return balances;
  }, [grid, settings, weekColumns]);

  if (error) return <ErrorMsg msg={error} />;
  if (projects === null || settings === null) return <LoadingMsg label="Loading cashflow…" />;

  // Opening balance save handler
  const saveOpeningBalance = async (newBalance, newAsOfDate) => {
    try {
      const updated = await sbUpdate('cashflow_settings', `singleton=eq.cashflow`, {
        opening_balance: newBalance,
        opening_as_of_date: newAsOfDate,
        updated_at: new Date().toISOString(),
        updated_by_email: getEmail(access.session),
      }, access.session);
      if (updated && updated[0]) setSettings(updated[0]);
      setEditingOB(false);
    } catch (e) {
      alert('Could not save opening balance: ' + e.message);
    }
  };

  const openDrill = (weekStart, projectName, events) => {
    setDrillCell({ weekStart, projectName, events });
  };

  // Export handlers
  const exportRows = () => {
    // Returns array-of-arrays for CSV/XLSX consumption
    const headerRow = ['Project', 'Status', ...weekColumns.map(wk => `Wk of ${fmtDateShort(wk)}`), 'Total'];
    const rows = [headerRow];
    for (const p of qualifyingProjects) {
      const row = grid.perProject[p.id];
      const cells = [
        p.name + (p.number ? ` (${p.number})` : ''),
        p.status,
        ...weekColumns.map(wk => row.weeks[wk].total || 0),
        row.rowTotal,
      ];
      rows.push(cells);
    }
    // Totals
    rows.push([
      'Week total', '',
      ...weekColumns.map(wk => grid.weekTotals[wk] || 0),
      grid.grandTotal,
    ]);
    // Running balance
    rows.push([
      `Running balance (from £${fmtMoney(settings.opening_balance)} on ${fmtDateShort(settings.opening_as_of_date)})`, '',
      ...runningBalance,
      runningBalance[runningBalance.length - 1],
    ]);
    return rows;
  };

  const exportCsv = () => {
    const rows = exportRows();
    const csv = rows.map(r =>
      r.map(cell => {
        if (cell == null) return '';
        const s = typeof cell === 'number' ? cell.toFixed(2) : String(cell);
        if (s.includes(',') || s.includes('"') || s.includes('\n')) {
          return '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }).join(',')
    ).join('\n');
    downloadBlob(csv, `arke-cashflow-${new Date().toISOString().slice(0, 10)}.csv`, 'text/csv;charset=utf-8');
  };

  const exportXlsx = () => {
    if (typeof XLSX === 'undefined') {
      alert('XLSX library not loaded. Try refreshing the page.');
      return;
    }
    const rows = exportRows();
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Apply column widths
    ws['!cols'] = [
      { wch: 32 }, // project
      { wch: 10 }, // status
      ...weekColumns.map(() => ({ wch: 14 })),
      { wch: 14 }, // total
    ];
    XLSX.utils.book_append_sheet(wb, ws, 'Cashflow');
    XLSX.writeFile(wb, `arke-cashflow-${new Date().toISOString().slice(0, 10)}.xlsx`);
  };

  // Cell width — sized to fit comfortable money amounts. Project name column is wider.
  const PROJECT_COL = 240;
  const TOTAL_COL = 110;
  const WEEK_COL = 100;
  const totalWidth = PROJECT_COL + (weekColumns.length * WEEK_COL) + TOTAL_COL;

  return (
    <div style={{ maxWidth: 1280 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 16, marginBottom: 20 }}>
        <div>
          <h1 style={{ ...brandTitle(), margin: '0 0 6px' }}>Cashflow</h1>
          <div style={{ fontSize: 13, color: C.muted }}>
            Weekly view across {qualifyingProjects.length} project{qualifyingProjects.length === 1 ? '' : 's'}.
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
          <WindowPicker value={windowWeeks} onChange={setWindowWeeks} />
          <button onClick={exportCsv} style={btnGhost()} title="Download as CSV">↓ CSV</button>
          <button onClick={exportXlsx} style={btnGhost()} title="Download as Excel">↓ XLSX</button>
        </div>
      </div>

      <OpeningBalanceCard
        settings={settings}
        editing={editingOB}
        onEdit={() => setEditingOB(true)}
        onCancel={() => setEditingOB(false)}
        onSave={saveOpeningBalance}
      />

      {qualifyingProjects.length === 0 ? (
        <SectionBox title="Cashflow grid">
          <div style={{ padding: 30, textAlign: 'center', color: C.muted, fontSize: 13 }}>
            No active projects to display.
          </div>
        </SectionBox>
      ) : (
        <SectionBox
          title="Cashflow grid"
          actions={
            <span style={{ fontSize: 11, color: C.muted }}>
              Click any cell for breakdown
            </span>
          }
        >
          {grid.pastTotal > 0 && (
            <div style={{ fontSize: 12, color: C.muted, padding: '6px 10px', background: C.bg, borderRadius: 4, marginBottom: 10 }}>
              {Object.values(grid.perProject).reduce((s, r) => s + (r.past > 0 ? 1 : 0), 0)} project{Object.values(grid.perProject).filter(r => r.past > 0).length === 1 ? ' has' : 's have'} cash events before the window — totalling £{fmtMoney(grid.pastTotal)}
            </div>
          )}

          <div style={{ overflowX: 'auto' }}>
            <div style={{ minWidth: totalWidth }}>
              {/* Header row */}
              <div style={{
                display: 'grid',
                gridTemplateColumns: `${PROJECT_COL}px repeat(${weekColumns.length}, ${WEEK_COL}px) ${TOTAL_COL}px`,
                fontSize: 11, color: C.muted, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em',
                padding: '8px 4px', borderBottom: `2px solid ${C.line}`,
              }}>
                <div style={{ padding: '0 8px' }}>Project</div>
                {weekColumns.map(wk => (
                  <div key={wk} style={{ textAlign: 'right', padding: '0 8px' }}>
                    {fmtDateShort(wk).replace(/, 20\d\d/, '')}
                  </div>
                ))}
                <div style={{ textAlign: 'right', padding: '0 8px' }}>Total</div>
              </div>

              {/* Project rows */}
              {qualifyingProjects.map(p => {
                const row = grid.perProject[p.id];
                return (
                  <div key={p.id} style={{
                    display: 'grid',
                    gridTemplateColumns: `${PROJECT_COL}px repeat(${weekColumns.length}, ${WEEK_COL}px) ${TOTAL_COL}px`,
                    borderBottom: `1px solid ${C.line}`,
                    fontSize: 12, fontVariantNumeric: 'tabular-nums',
                  }}>
                    <div style={{ padding: '8px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      <a href={buildHash(['projects', p.id])} style={{ color: C.text, fontWeight: 600, textDecoration: 'none' }}>
                        {p.name}
                      </a>
                      {p.status === 'complete' && (
                        <span style={{ fontSize: 10, color: C.muted, marginLeft: 6, fontStyle: 'italic' }}>(retention only)</span>
                      )}
                      {p.number && <div style={{ fontSize: 10, color: C.muted, fontFamily: 'monospace' }}>{p.number}</div>}
                    </div>
                    {weekColumns.map(wk => {
                      const cell = row.weeks[wk];
                      const hasEvents = cell.events.length > 0;
                      return (
                        <button
                          key={wk}
                          onClick={hasEvents ? () => openDrill(wk, p.name, cell.events) : undefined}
                          disabled={!hasEvents}
                          style={{
                            border: 'none', background: hasEvents ? C.greenLight : 'transparent',
                            cursor: hasEvents ? 'pointer' : 'default',
                            textAlign: 'right', padding: '8px 8px',
                            fontFamily: 'inherit', fontSize: 12,
                            color: hasEvents ? C.text : C.line,
                            fontVariantNumeric: 'tabular-nums', fontWeight: hasEvents ? 600 : 400,
                            borderRight: `1px solid ${C.line}`,
                          }}
                          title={hasEvents ? `${cell.events.length} event${cell.events.length === 1 ? '' : 's'} — click to view` : ''}
                        >
                          {hasEvents ? `£${fmtMoney(cell.total)}` : '—'}
                        </button>
                      );
                    })}
                    <div style={{
                      padding: '8px', textAlign: 'right', fontWeight: 700, color: C.text,
                      background: C.bg,
                    }}>
                      £{fmtMoney(row.rowTotal)}
                    </div>
                  </div>
                );
              })}

              {/* Week totals row */}
              <div style={{
                display: 'grid',
                gridTemplateColumns: `${PROJECT_COL}px repeat(${weekColumns.length}, ${WEEK_COL}px) ${TOTAL_COL}px`,
                background: C.redSoft, borderTop: `2px solid ${C.line}`,
                fontSize: 12, fontWeight: 700, fontVariantNumeric: 'tabular-nums',
              }}>
                <div style={{ padding: '10px 8px', color: C.red }}>Week totals</div>
                {weekColumns.map(wk => (
                  <div key={wk} style={{ padding: '10px 8px', textAlign: 'right', color: C.text, borderRight: `1px solid ${C.line}` }}>
                    {grid.weekTotals[wk] ? `£${fmtMoney(grid.weekTotals[wk])}` : '—'}
                  </div>
                ))}
                <div style={{ padding: '10px 8px', textAlign: 'right', color: C.green }}>
                  £{fmtMoney(grid.grandTotal)}
                </div>
              </div>

              {/* Running balance row */}
              <div style={{
                display: 'grid',
                gridTemplateColumns: `${PROJECT_COL}px repeat(${weekColumns.length}, ${WEEK_COL}px) ${TOTAL_COL}px`,
                background: C.prussianLight,
                fontSize: 12, fontWeight: 700, fontVariantNumeric: 'tabular-nums',
              }}>
                <div style={{ padding: '10px 8px', color: C.prussian }}>
                  Running balance
                  <div style={{ fontSize: 10, fontWeight: 500, color: C.muted }}>
                    from £{fmtMoney(settings.opening_balance)} on {fmtDateShort(settings.opening_as_of_date)}
                  </div>
                </div>
                {runningBalance.map((bal, i) => (
                  <div key={i} style={{
                    padding: '10px 8px', textAlign: 'right',
                    color: bal < 0 ? C.redStatus : C.prussian,
                    borderRight: `1px solid ${C.line}`,
                  }}>
                    £{fmtMoney(bal)}
                  </div>
                ))}
                <div style={{ padding: '10px 8px', textAlign: 'right', color: C.prussian }}>
                  £{fmtMoney(runningBalance[runningBalance.length - 1])}
                </div>
              </div>
            </div>
          </div>

          {grid.futureTotal > 0 && (
            <div style={{ fontSize: 12, color: C.muted, padding: '6px 10px', background: C.bg, borderRadius: 4, marginTop: 10 }}>
              {Object.values(grid.perProject).filter(r => r.future > 0).length} project{Object.values(grid.perProject).filter(r => r.future > 0).length === 1 ? ' has' : 's have'} cash events after the window — totalling £{fmtMoney(grid.futureTotal)}
            </div>
          )}
        </SectionBox>
      )}

      {drillCell && <CashflowDrillModal drill={drillCell} onClose={() => setDrillCell(null)} />}
    </div>
  );
}

// ============================================================
// OPENING BALANCE CARD
// ============================================================
function OpeningBalanceCard({ settings, editing, onEdit, onCancel, onSave }) {
  const [draftBalance, setDraftBalance] = useState(settings.opening_balance);
  const [draftDate, setDraftDate] = useState(settings.opening_as_of_date);
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    if (editing) {
      setDraftBalance(settings.opening_balance);
      setDraftDate(settings.opening_as_of_date);
    }
  }, [editing, settings]);

  const save = async () => {
    if (!draftDate) { alert('Date is required.'); return; }
    setBusy(true);
    try {
      await onSave(Number(draftBalance) || 0, draftDate);
    } finally { setBusy(false); }
  };

  return (
    <SectionBox
      title="Opening balance"
      actions={
        !editing && <button onClick={onEdit} style={miniBtn()}>✎ Edit</button>
      }
    >
      {!editing ? (
        <div style={{ display: 'flex', gap: 32, alignItems: 'baseline', flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontSize: 11, color: C.muted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Bank balance</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: C.text, fontVariantNumeric: 'tabular-nums', marginTop: 2 }}>
              £{fmtMoney(settings.opening_balance)}
            </div>
          </div>
          <div>

// Trigger a browser download of a string as a file. Used for CSV export.
function downloadBlob(text, filename, mime) {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// PROJECT DETAIL PAGE
// The home of an individual project after wizard completion.
// Composed of independent sections, each managing its own dirty/save state.
// ============================================================
function ProjectDetailPage({ id, access, navigate }) {
  const [project, setProject] = useState(null);
  const [invoices, setInvoices] = useState(null);
  const [releases, setReleases] = useState(null);
  const [assignees, setAssignees] = useState(null);
  const [allUsers, setAllUsers] = useState(null);
  const [error, setError] = useState(null);
  const [flash, setFlash] = useState(null);

  const isEditor = access.role === 'editor';

  const showFlash = (kind, msg) => {
    setFlash({ kind, msg });
    setTimeout(() => setFlash(null), 5000);
  };

  // Load everything needed for the page
  const loadAll = useCallback(async () => {
    try {
      const [proj, invs, rels, assigns] = await Promise.all([
        sbSelect('projects', `id=eq.${id}&limit=1`, access.session),
        sbSelect('project_invoices', `project_id=eq.${id}&order=sequence.asc`, access.session),
        sbSelect('project_retention_releases', `project_id=eq.${id}&order=release_date.asc`, access.session),
        sbSelect('project_contributors', `project_id=eq.${id}`, access.session),
      ]);
      if (!proj || proj.length === 0) {
        setError('Project not found.');
        return;
      }
      setProject(proj[0]);
      setInvoices(invs || []);
      setReleases(rels || []);
      setAssignees(assigns || []);
    } catch (e) { setError(e.message); }
  }, [id, access.session]);

  // Directory read is allowed for anyone in cashflow_users (cu_directory_read).
  // Needed so we can display contributor names in the header for everyone.
  const loadUsers = useCallback(async () => {
    try {
      const u = await sbSelect('cashflow_users', 'select=user_id,email,display_name,role,active&active=eq.true&order=display_name.asc', access.session);
      setAllUsers(u || []);
    } catch (e) { /* non-fatal */ }
  }, [access.session]);

  useEffect(() => { loadAll(); }, [loadAll]);
  useEffect(() => { loadUsers(); }, [loadUsers]);

  if (error) return <ErrorMsg msg={error} />;
  if (project === null) return <LoadingMsg label="Loading project…" />;

  // Drafts shouldn't really be reached here (wizard handles them) but if a
  // contributor somehow gets here, route them politely.
  if (project.status === 'draft') {
    if (isEditor) {
      // Push editor back into the wizard
      return <Redirect navigate={navigate} to={['projects', id, 'wizard']} />;
    }
    // Contributors see a placeholder
    return (
      <div style={{ maxWidth: 720 }}>
        <BackLink href={buildHash(['projects'])}>Projects</BackLink>
        <h1 style={brandTitle()}>{project.name}</h1>
        <Card>
          <p style={{ color: C.muted, fontSize: 14, margin: 0 }}>
            This project is still in draft. It will appear in full once an editor activates it.
          </p>
        </Card>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 1080 }}>
      <BackLink href={buildHash(['projects'])}>Projects</BackLink>

      {flash && (
        <div style={{
          padding: '10px 14px', marginBottom: 16, borderRadius: 6,
          background: flash.kind === 'ok' ? C.greenLight : C.redStatusLight,
          color: flash.kind === 'ok' ? C.green : C.redStatus,
          borderLeft: `3px solid ${flash.kind === 'ok' ? C.green : C.redStatus}`,
          fontSize: 13,
        }}>{flash.msg}</div>
      )}

      <ProjectDetailHeader
        project={project} setProject={setProject}
        access={access} isEditor={isEditor}
        invoices={invoices}
        showFlash={showFlash} reloadAll={loadAll}
      />

      <HeaderSection
        project={project} setProject={setProject}
        access={access} showFlash={showFlash}
        assignees={assignees} setAssignees={setAssignees}
        allUsers={allUsers}
      />

      <ScheduleSection
        project={project} invoices={invoices} setInvoices={setInvoices}
        access={access} showFlash={showFlash}
      />

      <RetentionReleasesSection
        project={project} releases={releases} setReleases={setReleases}
        access={access} showFlash={showFlash}
      />

      <RetentionPotCard project={project} invoices={invoices} releases={releases} />

      <CashflowReconciliationCard project={project} invoices={invoices} releases={releases} />

      <ProjectLifecycleTimeline project={project} invoices={invoices} releases={releases} />

      <ProjectMiniCashflowSection project={project} invoices={invoices} releases={releases} />

      <AuditLogSection project={project} />
    </div>
  );
}

// ============================================================
// HEADER STRIP — name, status badge, actions
// ============================================================
function ProjectDetailHeader({ project, setProject, access, isEditor, invoices, showFlash, reloadAll }) {
  const [confirm, setConfirm] = useState(null);
  const [busy, setBusy] = useState(false);
  const badge = PROJECT_STATUS_BADGE[project.status] || PROJECT_STATUS_BADGE.draft;

  // Status transitions:
  //  active ↔ complete ↔ archived (one step at a time)
  //  also: any → archived (escape hatch)
  //  archived → previous status (un-archive)
  const isArchived = project.status === 'archived';

  const transition = async (toStatus, options) => {
    options = options || {};
    const at = new Date().toISOString();
    const actor = getEmail(access.session);
    setBusy(true);
    try {
      const updates = {
        status: toStatus,
        // When archiving, remember current status so we can un-archive cleanly.
        ...(toStatus === 'archived' ? { pre_archive_status: project.status } : {}),
        ...(options.clearPreArchive ? { pre_archive_status: null } : {}),
        audit_log: [
          ...(Array.isArray(project.audit_log) ? project.audit_log : []),
          { event: options.event || 'status_changed', from: project.status, to: toStatus, actor, at },
        ],
      };
      const result = await sbUpdate('projects', `id=eq.${project.id}`, updates, access.session);
      setProject(result[0]);
      showFlash('ok', `Project ${options.event === 'unarchived' ? 'un-archived' : 'moved to ' + toStatus}.`);
    } catch (e) {
      showFlash('err', 'Could not update status: ' + e.message);
    } finally {
      setBusy(false);
      setConfirm(null);
    }
  };

  const unarchive = async () => {
    const restoreTo = project.pre_archive_status || 'active';
    await transition(restoreTo, { event: 'unarchived', clearPreArchive: true });
  };

  // Allowed forward/backward transitions one-step-at-a-time, plus jump-to-archive.
  const allowedNext = {
    active:   { forward: 'complete' },
    complete: { forward: 'archived', backward: 'active' },
    archived: {},
  };
  const next = allowedNext[project.status] || {};

  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <h1 style={{ ...brandTitle(), margin: '0 0 6px' }}>{project.name || '(no name)'}</h1>
          <div style={{ fontSize: 13, color: C.muted, display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
            {project.number && <span style={{ fontFamily: 'monospace' }}>{project.number}</span>}
            <span style={{
              background: badge.bg, color: badge.fg, padding: '3px 10px', borderRadius: 10,
              fontSize: 11, fontWeight: 600,
            }}>● {badge.label}</span>
            {project.owner_email && <span>Owner: {project.owner_email}</span>}
          </div>
        </div>
        {isEditor && (
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
            {isArchived ? (
              <button onClick={unarchive} disabled={busy} style={btn(busy)}>↺ Un-archive</button>
            ) : (
              <React.Fragment>
                {next.backward && (
                  <button
                    onClick={() => setConfirm({
                      title: `Move back to ${next.backward}?`,
                      message: `This will change the project status from ${project.status} back to ${next.backward}.`,
                      confirmLabel: `Move to ${next.backward}`,
                      onConfirm: () => transition(next.backward),
                    })}
                    style={btnGhost()}
                  >← {next.backward.charAt(0).toUpperCase() + next.backward.slice(1)}</button>
                )}
                {next.forward && next.forward !== 'archived' && (
                  <button
                    onClick={() => {
                      // For "Mark as complete" specifically, warn if future payment dates exist.
                      // Soft warning, not a block — flexibility for early-completion scenarios.
                      let warning = null;
                      if (next.forward === 'complete' && Array.isArray(invoices)) {
                        const today = new Date().toISOString().slice(0, 10);
                        const terms = Number(project.payment_terms_days) || 30;
                        const futureRows = invoices.filter(inv => {
                          const payDate = inv.payment_date_override
                            || (inv.invoice_date ? addDays(inv.invoice_date, terms) : null);
                          return payDate && cmpDate(payDate, today) > 0;
                        });
                        if (futureRows.length > 0) {
                          warning = ` ⚠ ${futureRows.length} payment date${futureRows.length === 1 ? '' : 's'} still in the future. Mark complete anyway?`;
                        }
                      }
                      setConfirm({
                        title: `Mark as ${next.forward}?`,
                        message: `This will change the project status from ${project.status} to ${next.forward}.${warning || ''}`,
                        confirmLabel: `Mark as ${next.forward}`,
                        onConfirm: () => transition(next.forward),
                      });
                    }}
                    style={btn(false)}
                  >{next.forward.charAt(0).toUpperCase() + next.forward.slice(1)} →</button>
                )}
                <button
                  onClick={() => setConfirm({
                    title: 'Archive project?',
                    message: 'Archiving removes this project from the active register and the cashflow grid. You can un-archive it later if needed.',
                    confirmLabel: 'Archive',
                    destructive: true,
                    onConfirm: () => transition('archived'),
                  })}
                  style={{ ...btnGhost(), color: C.muted }}
                >Archive</button>
              </React.Fragment>
            )}
          </div>
        )}
      </div>
      {confirm && (
        <ConfirmModal {...confirm} busy={busy} onCancel={() => setConfirm(null)} />
      )}
    </div>
  );
}

function HeaderEditor({ project, onSave, onCancel, access, assignees, setAssignees, allUsers, showFlash }) {
  const { users } = useCashflowUsers(access.session, true);
  // Re-uses the wizard's Step 1 form shape. Saves directly here, doesn't navigate.
  const [form, setForm] = useState(() => ({
    name:                  project.name || '',
    number:                project.number || '',
    value:                 project.value != null ? project.value : '',
    retention_pct:         project.retention_pct != null ? project.retention_pct : '',
    defects_retention_pct: project.defects_retention_pct != null ? project.defects_retention_pct : '',
    start_date:            project.start_date || '',
    end_date:              project.end_date || '',
    retention_date:        project.retention_date || '',
    payment_terms_days:    project.payment_terms_days,
    owner_email:           project.owner_email || '',
    first_valuation_date:  project.first_valuation_date || '',
    valuation_cycle_days:  project.valuation_cycle_days != null ? project.valuation_cycle_days : '',
    review_period_days:    project.review_period_days != null ? project.review_period_days : '',
  }));
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  const endBeforeStart = form.start_date && form.end_date && cmpDate(form.end_date, form.start_date) < 0;
  const retentionBeforeEnd = form.end_date && form.retention_date && cmpDate(form.retention_date, form.end_date) < 0;
  const defectsExceedsRetention =
    form.defects_retention_pct !== '' && form.retention_pct !== ''
    && Number(form.defects_retention_pct) > Number(form.retention_pct);

  const valid =
    form.name && form.name.trim().length > 0
    && Number(form.value) >= 0
    && !endBeforeStart
    && !retentionBeforeEnd;

  const update = (field, val) => setForm(prev => ({ ...prev, [field]: val }));

  const save = async () => {
    if (!valid) return;
    setBusy(true); setError('');
    try {
      const payload = {
        name: form.name.trim(),
        number: form.number.trim() || null,
        value: Number(form.value) || 0,
        retention_pct: form.retention_pct === '' ? 0 : Number(form.retention_pct),
        defects_retention_pct: form.defects_retention_pct === '' ? null : Number(form.defects_retention_pct),
        start_date: form.start_date || null,
        end_date: form.end_date || null,
        retention_date: form.retention_date || null,
        payment_terms_days: Number(form.payment_terms_days) || 30,
        owner_email: form.owner_email.trim() || null,
        first_valuation_date: project.payment_type === 'valuation' ? (form.first_valuation_date || null) : null,
        valuation_cycle_days: project.payment_type === 'valuation' && form.valuation_cycle_days !== '' ? Number(form.valuation_cycle_days) : null,
        review_period_days: project.payment_type === 'valuation' && form.review_period_days !== '' ? Number(form.review_period_days) : null,
        audit_log: [
          ...(Array.isArray(project.audit_log) ? project.audit_log : []),
          { event: 'header_edited', actor: getEmail(access.session), at: new Date().toISOString() },
        ],
      };
      const updated = await sbUpdate('projects', `id=eq.${project.id}`, payload, access.session);
      onSave(updated[0]);
    } catch (e) {
      setError(e.message);
    } finally { setBusy(false); }
  };

  return (
    <div>
      <Field label="Project name *">
        <input value={form.name} onChange={(e) => update('name', e.target.value)} style={inp()} />
      </Field>
      <div style={twoCol()}>
        <Field label="Project number">
          <input value={form.number} onChange={(e) => update('number', e.target.value)} style={inp()} />
        </Field>
        <Field label="Owner">
          <UserPicker
            value={form.owner_email}

        <Field label="Project value (£)">
          <MoneyInput value={form.value} onChange={(v) => update('value', v)} />
        </Field>
        <Field label="Retention (%)">
          <NumberInput value={form.retention_pct} onChange={(v) => update('retention_pct', v)} step="0.01" />
        </Field>
        <Field label="Defects retention (%)">

        <Field label="Retention release date">
          <DateField value={form.retention_date} onChange={(v) => update('retention_date', v)} min={form.end_date || form.start_date || undefined}

      </div>
      <Field label="Payment terms (days)">
        <NumberInput value={form.payment_terms_days} onChange={(v) => update('payment_terms_days', v)} step="1" />
      </Field>
      {project.payment_type === 'valuation' && (
        <div style={threeCol()}>
          <Field label="First valuation date">
            <DateField value={form.first_valuation_date} onChange={(v) => update('first_valuation_date', v)} />
          </Field>
          <Field label="Valuation cycle (days)">
            <NumberInput value={form.valuation_cycle_days} onChange={(v) => update('valuation_cycle_days', v)} step="1" />
          </Field>
          <Field label="Review period (days)">
            <NumberInput value={form.review_period_days} onChange={(v) => update('review_period_days', v)} step="1" />
          </Field>
        </div>
      )}
      <Field label="Contributors (additional people with access)">
        <ContributorsInline
          project={project}
          assignees={assignees} setAssignees={setAssignees}
          allUsers={allUsers}
          access={access}
          showFlash={showFlash}
        />
