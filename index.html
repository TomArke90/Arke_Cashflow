// ============================================================
// SUPABASE AUTH — ported verbatim from furniture form
// ============================================================
async function signIn(email, password) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error_description || err.msg || `Sign-in failed (${r.status})`);
  }
  const session = await r.json();
  session.expires_at = Math.floor(Date.now() / 1000) + (session.expires_in || 3600);
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  return session;
}

async function refreshSession(session) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: session.refresh_token }),
  });
  if (!r.ok) {
    localStorage.removeItem(SESSION_KEY);
    return null;
  }
  const fresh = await r.json();
  fresh.expires_at = Math.floor(Date.now() / 1000) + (fresh.expires_in || 3600);
  localStorage.setItem(SESSION_KEY, JSON.stringify(fresh));
  return fresh;
}

function getStoredSession() {
  try {
    const s = localStorage.getItem(SESSION_KEY);
    return s ? JSON.parse(s) : null;
  } catch (e) { return null; }
}

function signOut() {
  localStorage.removeItem(SESSION_KEY);
  window.location.hash = '';
  window.location.reload();
}

function getEmail(session) {
  return session && session.user && session.user.email ? session.user.email : null;
}

function isArkeUser(session) {
  const e = getEmail(session);
  return !!(e && e.toLowerCase().endsWith(ARKE_DOMAIN));
}

function useSession() {
  const [session, setSession] = useState(getStoredSession());
  useEffect(() => {
    let cancelled = false;
    const maybeRefresh = async () => {
      const s = getStoredSession();
      if (!s) { if (!cancelled) setSession(null); return; }
      const now = Math.floor(Date.now() / 1000);
      if (s.expires_at && (s.expires_at - now) < 300) {
        const fresh = await refreshSession(s);
        if (!cancelled) setSession(fresh);
      } else {
        if (!cancelled) setSession(s);
      }
    };
    maybeRefresh();
    const interval = setInterval(maybeRefresh, 10 * 60 * 1000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);
  return [session, setSession];
}

// ============================================================
// SUPABASE REST CLIENT — ported verbatim
// ============================================================
function sbHeaders(session) {
  const token = (session && session.access_token) ? session.access_token : SUPABASE_ANON_KEY;
  return {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${token}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
  };
}

async function sbSelect(table, query, session) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${query}`;
  const r = await fetch(url, { headers: sbHeaders(session) });
  if (!r.ok) throw new Error(`Select failed: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbInsert(table, data, session) {
  const url = `${SUPABASE_URL}/rest/v1/${table}`;
  const r = await fetch(url, {
    method: 'POST', headers: sbHeaders(session), body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`Insert failed: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbUpdate(table, query, data, session) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${query}`;
  const r = await fetch(url, {
    method: 'PATCH', headers: sbHeaders(session), body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`Update failed: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbDelete(table, query, session) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${query}`;
  const r = await fetch(url, {
    method: 'DELETE', headers: sbHeaders(session),
  });
  if (!r.ok) throw new Error(`Delete failed: ${r.status} ${await r.text()}`);
  return r.status === 204 ? null : r.json();
}

// Call a Supabase Edge Function with the user's JWT. Used for privileged
// operations (creating auth users, resetting passwords) that the anon key
// can't do on its own.
async function callEdgeFunction(name, body, session) {
  if (!session || !session.access_token) {
    throw new Error('Not signed in');
  }
  const r = await fetch(EDGE_FN(name), {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${session.access_token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body || {}),
  });
  const text = await r.text();
  let payload;
  try { payload = text ? JSON.parse(text) : {}; } catch (e) { payload = { error: text }; }
  if (!r.ok) throw new Error(payload.error || `Edge function ${name} failed (${r.status})`);
  return payload;
}

// ============================================================
// CRYPTO HELPERS — kept for future use (CSV preset sharing etc.)
// ============================================================
async function hashPassword(password, saltB64, iterations) {
  const enc = new TextEncoder();
  const salt = Uint8Array.from(atob(saltB64), c => c.charCodeAt(0));
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMaterial, 256
  );
  return btoa(String.fromCharCode(...new Uint8Array(bits)));
}

function generateSalt() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr));
}

function fmtMoney(n) {
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '';
  return Number(n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtPct(n) {
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '';
  return Number(n).toFixed(2) + '%';
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-GB', {
    day: 'numeric', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function timeAgo(iso) {
  if (!iso) return '';
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h';
  if (sec < 86400 * 30) return Math.floor(sec / 86400) + 'd';
  if (sec < 86400 * 365) return Math.floor(sec / (86400 * 30)) + 'mo';
  return Math.floor(sec / (86400 * 365)) + 'y';
}

// ============================================================
// HASH ROUTING — new for this app
// Path: #/projects/abc?tab=schedule  =>
//   { path: ['projects', 'abc'], params: { tab: 'schedule' } }
// ============================================================
function parseHash(hash) {
  // Strip leading '#' and '/'
  let h = (hash || '').replace(/^#/, '').replace(/^\//, '');
  if (h === '') return { path: [], params: {} };
  const [pathStr, queryStr] = h.split('?');
  const path = pathStr.split('/').filter(Boolean).map(decodeURIComponent);
  const params = {};
  if (queryStr) {
    for (const pair of queryStr.split('&')) {
      const [k, v] = pair.split('=');
      if (k) params[decodeURIComponent(k)] = v == null ? '' : decodeURIComponent(v);
    }
  }
  return { path, params };
}

function buildHash(path, params) {
  let h = '#/' + (path || []).map(encodeURIComponent).join('/');
  if (params && Object.keys(params).length > 0) {
    const qs = Object.entries(params)
      .filter(([k, v]) => v != null && v !== '')
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    if (qs) h += '?' + qs;
  }
  return h;
}

function useHashRoute() {
  const [route, setRoute] = useState(() => parseHash(window.location.hash));
  useEffect(() => {
    const handler = () => setRoute(parseHash(window.location.hash));
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  const navigate = useCallback((path, params, replace) => {
    const hash = buildHash(path, params);
    if (replace) {
      const url = window.location.href.split('#')[0] + hash;
      window.history.replaceState(null, '', url);
      setRoute(parseHash(hash));
    } else {
      window.location.hash = hash;
    }
  }, []);
  return { route, navigate };
}

// ============================================================
// ACCESS CONTROL — new
// Wraps useSession and resolves the user's cashflow_users row.
// Returns { session, role, displayName, hasAccess, loading, error, refetch }
// ============================================================
function useAccessControl() {
  const [session, setSession] = useSession();
  const [state, setState] = useState({
    role: null, displayName: null, hasAccess: false, loading: true, error: null,
  });

  const fetchRole = useCallback(async () => {
    if (!session) {
      setState({ role: null, displayName: null, hasAccess: false, loading: false, error: null });
      return;
    }
    if (!isArkeUser(session)) {
      setState({ role: null, displayName: null, hasAccess: false, loading: false, error: 'non_arke' });
      return;
    }
    try {
      // RLS allows self-read on cashflow_users via cu_self_read policy
      const rows = await sbSelect('cashflow_users', `user_id=eq.${session.user.id}&select=role,display_name,active&limit=1`, session);
      if (!rows || rows.length === 0) {
        setState({ role: null, displayName: null, hasAccess: false, loading: false, error: 'no_row' });
        return;
      }
      const row = rows[0];
      if (!row.active) {
        setState({ role: row.role, displayName: row.display_name, hasAccess: false, loading: false, error: 'inactive' });
        return;
      }
      setState({ role: row.role, displayName: row.display_name, hasAccess: true, loading: false, error: null });
    } catch (e) {
      setState({ role: null, displayName: null, hasAccess: false, loading: false, error: e.message });
    }
  }, [session]);

  useEffect(() => { fetchRole(); }, [fetchRole]);

  return { session, setSession, ...state, refetch: fetchRole };
}

// ============================================================
// ROOT
// ============================================================
function App() {
  const access = useAccessControl();
  const { route, navigate } = useHashRoute();

  if (access.loading) {
    return <Shell session={access.session}><LoadingMsg label="Loading…" /></Shell>;
  }

  // Not signed in at all
  if (!access.session) {
    return <Shell session={null}><PublicLanding /></Shell>;
  }

  // Signed in but no access (wrong domain / not in cashflow_users / inactive)
  if (!access.hasAccess) {
    return <Shell session={access.session}><NoAccessScreen reason={access.error} email={getEmail(access.session)} /></Shell>;
  }

  // Authed and authorised — render the sidebar shell with current route
  return (
    <SignedInShell access={access} route={route} navigate={navigate}>
      <RouteSwitch route={route} navigate={navigate} access={access} />
    </SignedInShell>
  );
}

// ============================================================
// ROUTE SWITCH
// Routes a user can hit depend on their role. Any disallowed route → home.
// ============================================================
function RouteSwitch({ route, navigate, access }) {
  const isEditor = access.role === 'editor';
  const seg = route.path[0] || '';

  // Editor-only routes
  const editorOnly = ['cashflow', 'debtors', 'overheads', 'settings'];

  // Wrong route for role → bounce home
  if (!isEditor && editorOnly.includes(seg)) {
    useEffect(() => { navigate([], {}, true); }, []);
    return <LoadingMsg label="Redirecting…" />;
  }

  // Home — different by role
  if (seg === '' || seg === 'home') {
    return isEditor ? <CashflowPage access={access} /> : <ContributorHome access={access} navigate={navigate} />;
  }
  if (seg === 'cashflow') return <CashflowPage access={access} />;
  if (seg === 'projects') {
    if (route.path[1] === 'new') return <NewProjectStub />;
    if (route.path[1]) return <ProjectDetailStub id={route.path[1]} access={access} />;
    return <ProjectsListStub access={access} />;
  }
  if (seg === 'debtors') {
    if (route.path[1] === 'import') return <DebtorImportStub />;
    return <DebtorListStub />;
  }
  if (seg === 'overheads') return <OverheadListStub />;
  if (seg === 'settings') {
    if (route.path[1] === 'users') return <SettingsUsersPage access={access} />;
    if (route.path[1] === 'categories') return <SettingsCategoriesStub />;
    if (route.path[1] === 'csv-presets') return <SettingsCsvPresetsStub />;
    return <SettingsHub access={access} />;
  }
  return <NotFound navigate={navigate} />;
}

function NoAccessScreen({ reason, email }) {

    non_arke: {
      title: 'Wrong account',
      body: `This tool is only available to @arkecreative.co.uk accounts. You're signed in as ${email}.`,

        <button onClick={signOut} style={{ ...btnGhost(), marginTop: 16 }}>Sign out</button>
      </Card>
    </div>

}

// ============================================================
// SIGN-IN MODAL — ported from furniture form
// ============================================================
function SignInModal({ onClose, onSignedIn }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setBusy(true);
    try {
      const session = await signIn(email.trim(), password);
      if (!isArkeUser(session)) {
        localStorage.removeItem(SESSION_KEY);
        throw new Error('This tool is for @arkecreative.co.uk accounts only.');
      }
      onSignedIn(session);
      onClose();
    } catch (err) {
      setError(err.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="arke-modal-backdrop" onClick={onClose}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()}
        style={{ maxWidth: 380, textAlign: 'left', padding: '24px 24px 20px' }}>
        <h2 style={{ ...brandTitle(), marginTop: 0, marginBottom: 4, fontSize: 22 }}>
          Sign in
        </h2>
        <p style={{ color: C.muted, fontSize: 13, marginTop: 0, marginBottom: 20 }}>
          Use your @arkecreative.co.uk email and password.
        </p>
        <form onSubmit={submit}>
          <Field label="Email">
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)}
              autoFocus style={inp()} placeholder="you@arkecreative.co.uk" />
          </Field>
          <Field label="Password">
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} style={inp()} />
          </Field>
          {error && (
            <div style={{ color: C.redStatus, fontSize: 13, marginBottom: 12 }}>{error}</div>
          )}
          <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
            <button type="submit" disabled={busy || !email || !password} style={btn(busy || !email || !password)}>
              {busy ? 'Signing in…' : 'Sign in'}
            </button>
            <button type="button" onClick={onClose} style={btnGhost()}>Cancel</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ============================================================
// SIGNED-IN SHELL — sidebar + main area
// ============================================================
function SignedInShell({ access, route, navigate, children }) {
  const isEditor = access.role === 'editor';
  return (
    <div style={{ minHeight: '100vh', background: C.bg, display: 'flex' }}>
      <Sidebar isEditor={isEditor} route={route} navigate={navigate} access={access} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <TopBar access={access} />
        <main style={{ flex: 1, padding: '24px 32px 80px' }}>
          {children}
        </main>
      </div>
    </div>
  );
}

function Sidebar({ isEditor, route, navigate, access }) {
  const items = isEditor ? [
    { id: 'cashflow', label: 'Cashflow', path: ['cashflow'] },
    { id: 'projects', label: 'Projects', path: ['projects'] },
    { id: 'debtors',  label: 'Debtors',  path: ['debtors'] },
    { id: 'overheads',label: 'Overheads',path: ['overheads'] },
    { id: 'settings', label: 'Settings', path: ['settings'] },
  ] : [
    { id: 'projects', label: 'My projects', path: ['projects'] },
  ];

  // Active item: match first path segment, plus '' or 'home' counts as cashflow for editors
  const seg = route.path[0] || (isEditor ? 'cashflow' : 'projects');
  return (
    <aside style={{
      width: 220, background: C.white, borderRight: `1px solid ${C.line}`,
      padding: '20px 12px', display: 'flex', flexDirection: 'column',

// SETTINGS — USERS PAGE
// ============================================================
function SettingsUsersPage({ access }) {
  const [users, setUsers] = useState(null);
  const [error, setError] = useState(null);
  const [showInvite, setShowInvite] = useState(false);
  const [resetTarget, setResetTarget] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [busy, setBusy] = useState(false);
  const [flash, setFlash] = useState(null); // { kind: 'ok'|'err', msg: string }

  const refetch = useCallback(async () => {
    try {
      const rows = await sbSelect('cashflow_users',
        'select=*&order=role.asc,added_at.desc', access.session);
      setUsers(rows);
    } catch (e) { setError(e.message); }
  }, [access.session]);

  useEffect(() => { refetch(); }, [refetch]);

  const showFlash = (kind, msg) => {
    setFlash({ kind, msg });
    setTimeout(() => setFlash(null), 5000);
  };

  // Cached: how many active editors exist? Used to disable destructive actions
  // that would leave the system with no editors.
  const activeEditorCount = useMemo(() => {
    if (!users) return 0;
    return users.filter(u => u.role === 'editor' && u.active).length;
  }, [users]);

  const myUserId = access.session && access.session.user && access.session.user.id;

  const toggleActive = async (u) => {
    // Guardrails
    if (u.user_id === myUserId && u.active) {
      showFlash('err', 'You cannot deactivate your own account.');
      return;
    }
    if (u.active && u.role === 'editor' && activeEditorCount === 1) {
      showFlash('err', 'Cannot deactivate the last active editor.');
      return;
    }
    setBusy(true);
    try {
      await sbUpdate('cashflow_users', `id=eq.${u.id}`, { active: !u.active }, access.session);
      showFlash('ok', `${u.email} ${!u.active ? 'reactivated' : 'deactivated'}.`);
      await refetch();
    } catch (e) {
      showFlash('err', 'Could not update: ' + e.message);
    } finally { setBusy(false); }
  };

  const changeRole = async (u, newRole) => {
    if (u.user_id === myUserId && u.role === 'editor' && newRole === 'contributor') {
      showFlash('err', 'You cannot demote yourself.');
      return;
    }
    if (u.role === 'editor' && newRole === 'contributor' && u.active && activeEditorCount === 1) {
      showFlash('err', 'Cannot demote the last active editor.');
      return;
    }
    setBusy(true);
    try {
      await sbUpdate('cashflow_users', `id=eq.${u.id}`, { role: newRole }, access.session);
      showFlash('ok', `${u.email} is now a ${newRole}.`);
      await refetch();
    } catch (e) {
      showFlash('err', 'Could not change role: ' + e.message);
    } finally { setBusy(false); }
  };

  const deleteUser = async (u) => {
    setBusy(true);
    try {
      await callEdgeFunction('manage-users', {
        action: 'delete',
        user_id: u.user_id,
      }, access.session);
      showFlash('ok', `${u.email} removed.`);
      await refetch();
    } catch (e) {
      showFlash('err', 'Could not remove: ' + e.message);
    } finally {
      setBusy(false);
      setConfirm(null);
    }
  };

  if (error) return <ErrorMsg msg={error} />;

  return (
    <div style={{ maxWidth: 920 }}>
      <BackLink href={buildHash(['settings'])}>Settings</BackLink>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <h1 style={brandTitle()}>Users & access</h1>
          <p style={{ color: C.muted, fontSize: 14, margin: 0 }}>
            Editors can do everything. Contributors only see projects they're assigned to.
          </p>
        </div>
        <button onClick={() => setShowInvite(true)} style={btn(busy)}>
          + Invite user
        </button>
      </div>

      {flash && (
        <div style={{
          padding: '10px 14px', marginBottom: 16, borderRadius: 6,
          background: flash.kind === 'ok' ? C.greenLight : C.redStatusLight,
          color: flash.kind === 'ok' ? C.green : C.redStatus,
          borderLeft: `3px solid ${flash.kind === 'ok' ? C.green : C.redStatus}`,
          fontSize: 13,
        }}>{flash.msg}</div>
      )}

      {users === null ? <LoadingMsg label="Loading users…" /> : (
        <div style={{ background: C.white, border: `1px solid ${C.line}`, borderRadius: 8, overflow: 'hidden' }}>
          <div style={{
            display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1.5fr 1.2fr',
            gap: 12, padding: '12px 18px', background: C.redSoft,
            borderBottom: `1px solid ${C.line}`,
            fontSize: 11, color: C.muted, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em',
          }}>
            <div>User</div>
            <div>Role</div>
            <div>Status</div>
            <div>Added</div>
            <div style={{ textAlign: 'right' }}>Actions</div>
          </div>
          {users.length === 0 && (
            <div style={{ padding: 40, textAlign: 'center', color: C.muted, fontSize: 13 }}>
              No users yet. Click "Invite user" to add the first.
            </div>
          )}
          {users.map(u => (
            <UserRow
              key={u.id}
              user={u}
              isSelf={u.user_id === myUserId}
              activeEditorCount={activeEditorCount}
              busy={busy}
              onToggleActive={() => toggleActive(u)}
              onChangeRole={(r) => changeRole(u, r)}
              onResetPassword={() => setResetTarget(u)}
              onDelete={() => setConfirm({
                title: 'Remove user',
                message: `Permanently remove ${u.email}? They'll lose access immediately. Their record will be deleted from auth and the cashflow user list. Project history isn't affected.`,
                confirmLabel: 'Remove',
                destructive: true,
                onConfirm: () => deleteUser(u),
              })}
            />
          ))}
        </div>
      )}

      {showInvite && (
        <InviteUserModal
          session={access.session}
          onClose={() => setShowInvite(false)}
          onCreated={async (msg) => { showFlash('ok', msg); await refetch(); }}
        />
      )}
      {resetTarget && (
        <ResetPasswordModal
          session={access.session}
          target={resetTarget}
          onClose={() => setResetTarget(null)}
          onDone={(msg) => { showFlash('ok', msg); setResetTarget(null); }}
        />
      )}
      {confirm && (
        <ConfirmModal
          {...confirm}
          busy={busy}
          onCancel={() => setConfirm(null)}
        />
      )}
    </div>
  );
}

function UserRow({ user, isSelf, activeEditorCount, busy, onToggleActive, onChangeRole, onResetPassword, onDelete }) {
  const roleBadge = user.role === 'editor'
    ? { bg: C.redLight, fg: C.red, label: 'Editor' }
    : { bg: C.prussianLight, fg: C.prussian, label: 'Contributor' };
  const statusBadge = user.active
    ? { bg: C.greenLight, fg: C.green, label: 'Active' }
    : { bg: C.line, fg: C.muted, label: 'Deactivated' };

  // Guardrails for the role dropdown
  const cantDemote =
    isSelf
    || (user.role === 'editor' && user.active && activeEditorCount === 1);
  const cantDeactivate =
    isSelf
    || (user.role === 'editor' && user.active && activeEditorCount === 1);

  return (
    <div style={{
      display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1.5fr 1.2fr',
      gap: 12, padding: '14px 18px', borderBottom: `1px solid ${C.line}`,
      alignItems: 'center', fontSize: 13,
    }}>
      <div>
        <div style={{ fontWeight: 600, marginBottom: 2 }}>
          {user.display_name || user.email}
          {isSelf && <span style={{ marginLeft: 6, fontSize: 10, color: C.muted, fontWeight: 500 }}>(you)</span>}
        </div>
        {user.display_name && (
          <div style={{ fontSize: 11, color: C.muted }}>{user.email}</div>
        )}
      </div>
      <div>
        <select
          value={user.role}
          onChange={(e) => onChangeRole(e.target.value)}
          disabled={busy || (cantDemote && user.role === 'editor')}
          style={{ ...inp(busy), padding: '6px 8px', fontSize: 12 }}
        >
          <option value="editor">Editor</option>
          <option value="contributor">Contributor</option>
        </select>
      </div>
      <div>
        <span style={{
          background: statusBadge.bg, color: statusBadge.fg,
          padding: '3px 10px', borderRadius: 10,
          fontSize: 11, fontWeight: 600,
        }}>
          ● {statusBadge.label}
        </span>
      </div>
      <div style={{ fontSize: 12, color: C.muted }}>
        {timeAgo(user.added_at)}
        {user.added_by_email && <div style={{ fontSize: 11 }}>by {user.added_by_email}</div>}
      </div>
      <div style={{ textAlign: 'right', display: 'flex', gap: 6, justifyContent: 'flex-end', flexWrap: 'wrap' }}>
        <button
          onClick={onToggleActive}
          disabled={busy || (user.active && cantDeactivate)}
          style={{ ...miniBtn(), color: user.active ? C.amber : C.green }}
          title={cantDeactivate && user.active ? 'Cannot deactivate the last active editor or yourself' : ''}
        >
          {user.active ? 'Deactivate' : 'Reactivate'}
        </button>
        <button onClick={onResetPassword} disabled={busy || isSelf} style={miniBtn()} title={isSelf ? 'Use your account settings to change your own password' : ''}>
          Reset pw
        </button>
        <button onClick={onDelete} disabled={busy || isSelf} style={{ ...miniBtn(), color: C.redStatus }}>
          Remove
        </button>
      </div>
    </div>
  );
}

// INVITE USER MODAL
// ============================================================
function InviteUserModal({ session, onClose, onCreated }) {
  const [email, setEmail] = useState('');
  const [displayName, setDisplayName] = useState('');
  const [role, setRole] = useState('contributor');
  const [password, setPassword] = useState(generateMemorablePassword());
  const [showPassword, setShowPassword] = useState(true);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [done, setDone] = useState(null); // { email, password }

  // Email validation: just the Arke domain + a sensible local part.
  const emailValid = /^[^\s@]+@arkecreative\.co\.uk$/i.test(email.trim());
  const canSubmit = emailValid && password.length >= 8 && !busy;

  const submit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setError(''); setBusy(true);
    try {
      await callEdgeFunction('manage-users', {
        action: 'create',
        email: email.trim().toLowerCase(),
        display_name: displayName.trim() || null,
        role,
        password,
      }, session);
      // Hold the modal open at a "done" screen showing the credentials once.
      setDone({ email: email.trim().toLowerCase(), password });
      onCreated(`Invited ${email.trim().toLowerCase()} as ${role}.`);
    } catch (err) {
      setError(err.message);
    } finally { setBusy(false); }
  };

  if (done) {
    return (
      <div className="arke-modal-backdrop" onClick={onClose}>
        <div className="arke-modal" onClick={(e) => e.stopPropagation()}>
          <h2 style={{ ...brandTitle(), marginTop: 0, fontSize: 22 }}>✓ User created</h2>
          <p style={{ color: C.muted, fontSize: 13, marginBottom: 16 }}>
            Send these credentials to the user out-of-band (Slack DM, in person, etc).
            The password is shown once — copy it now, we can't recover it later.
          </p>
          <Field label="Email">
            <div style={{ display: 'flex', gap: 8 }}>
              <input readOnly value={done.email} onFocus={(e) => e.target.select()} style={{ ...inp(), fontFamily: 'monospace', fontSize: 12 }} />
              <CopyButton text={done.email} />
            </div>
          </Field>
          <Field label="Password (shown once)">
            <div style={{ display: 'flex', gap: 8 }}>
              <input readOnly value={done.password} onFocus={(e) => e.target.select()} style={{ ...inp(), fontFamily: 'monospace', fontSize: 16, letterSpacing: '0.05em' }} />
              <CopyButton text={done.password} />
            </div>
          </Field>
          <div style={{ background: C.amberLight, padding: 12, borderRadius: 6, fontSize: 12, marginTop: 12, borderLeft: `3px solid ${C.amber}` }}>
            Once this dialog closes, the password is gone. The user can change it after signing in, or you can reset it from the Users page if it goes missing.
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 18 }}>
            <button onClick={onClose} style={btn(false)}>Done</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="arke-modal-backdrop" onClick={onClose}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()}>
        <h2 style={{ ...brandTitle(), marginTop: 0, fontSize: 22 }}>Invite user</h2>
        <p style={{ color: C.muted, fontSize: 13, marginBottom: 18 }}>
          Creates the user with the password you set. Send them the credentials separately.
        </p>
        <form onSubmit={submit}>
          <Field label="Arke email">
            <input
              type="email" value={email}
              onChange={(e) => setEmail(e.target.value)}
              autoFocus style={inp()}
              placeholder="firstname@arkecreative.co.uk"
            />
            {email && !emailValid && (
              <div style={{ color: C.redStatus, fontSize: 12, marginTop: 4 }}>
                Must end in {ARKE_DOMAIN}
              </div>
            )}
          </Field>
          <Field label="Display name (optional)">
            <input value={displayName} onChange={(e) => setDisplayName(e.target.value)} style={inp()} placeholder="First Last" />
          </Field>
          <Field label="Role">
            <div style={{ display: 'flex', gap: 8 }}>
              <RoleOption selected={role === 'contributor'} onClick={() => setRole('contributor')} label="Contributor" description="Project access only" />
              <RoleOption selected={role === 'editor'} onClick={() => setRole('editor')} label="Editor" description="Full access" />
            </div>
          </Field>
          <Field label="Password (≥ 8 characters)">
            <div style={{ display: 'flex', gap: 8 }}>
              <input
                type={showPassword ? 'text' : 'password'}
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                style={{ ...inp(), fontFamily: 'monospace' }}
              />
              <button type="button" onClick={() => setPassword(generateMemorablePassword())} style={btnGhost()} title="Regenerate">↻</button>
              <button type="button" onClick={() => setShowPassword(s => !s)} style={btnGhost()}>
                {showPassword ? 'Hide' : 'Show'}
              </button>
            </div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>
              Auto-generated. Editable.
            </div>
          </Field>
          {error && (
            <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12, borderLeft: `3px solid ${C.redStatus}` }}>
              {error}
            </div>
          )}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 4 }}>
            <button type="button" onClick={onClose} style={btnGhost()}>Cancel</button>
            <button type="submit" disabled={!canSubmit} style={btn(!canSubmit)}>
              {busy ? 'Creating…' : 'Create user'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function RoleOption({ selected, onClick, label, description }) {
  return (
    <button type="button" onClick={onClick} style={{
      flex: 1, padding: '12px 14px', background: selected ? C.redSoft : C.white,
      border: `2px solid ${selected ? C.red : C.line}`, borderRadius: 6,
      cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit',
    }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: selected ? C.red : C.text }}>{label}</div>
      <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{description}</div>
    </button>
  );
}

function ResetPasswordModal({ session, target, onClose, onDone }) {
  const [password, setPassword] = useState(generateMemorablePassword());
  const [showPassword, setShowPassword] = useState(true);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [done, setDone] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setBusy(true);
    try {
      await callEdgeFunction('manage-users', {
        action: 'reset_password',
        user_id: target.user_id,
        password,
      }, session);
      setDone(true);
    } catch (err) {
      setError(err.message);
    } finally { setBusy(false); }
  };

  if (done) {
    return (
      <div className="arke-modal-backdrop" onClick={() => { onDone(`Password reset for ${target.email}.`); }}>
        <div className="arke-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 420 }}>
          <h2 style={{ ...brandTitle(), marginTop: 0, fontSize: 22 }}>✓ Password reset</h2>
          <p style={{ color: C.muted, fontSize: 13, marginBottom: 16 }}>
            Send the new password to <strong>{target.email}</strong>. The old one no longer works.
          </p>
          <Field label="New password (shown once)">
            <div style={{ display: 'flex', gap: 8 }}>
              <input readOnly value={password} onFocus={(e) => e.target.select()} style={{ ...inp(), fontFamily: 'monospace', fontSize: 16, letterSpacing: '0.05em' }} />
              <CopyButton text={password} />
            </div>
          </Field>
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 18 }}>
            <button onClick={() => onDone(`Password reset for ${target.email}.`)} style={btn(false)}>Done</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="arke-modal-backdrop" onClick={onClose}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 420 }}>
        <h2 style={{ ...brandTitle(), marginTop: 0, fontSize: 22 }}>Reset password</h2>
        <p style={{ color: C.muted, fontSize: 13, marginBottom: 18 }}>
          Reset the password for <strong>{target.email}</strong>. The current password will stop working immediately.
        </p>
        <form onSubmit={submit}>
          <Field label="New password (≥ 8 characters)">
            <div style={{ display: 'flex', gap: 8 }}>
              <input
                type={showPassword ? 'text' : 'password'}
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                style={{ ...inp(), fontFamily: 'monospace' }}
              />
              <button type="button" onClick={() => setPassword(generateMemorablePassword())} style={btnGhost()} title="Regenerate">↻</button>
              <button type="button" onClick={() => setShowPassword(s => !s)} style={btnGhost()}>
                {showPassword ? 'Hide' : 'Show'}
              </button>
            </div>
          </Field>
          {error && (
            <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12, borderLeft: `3px solid ${C.redStatus}` }}>
              {error}
            </div>
          )}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <button type="button" onClick={onClose} style={btnGhost()}>Cancel</button>
            <button type="submit" disabled={busy || password.length < 8} style={btn(busy || password.length < 8)}>
              {busy ? 'Resetting…' : 'Reset password'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ============================================================
// CONFIRM MODAL — reusable destructive-action confirmation
// ============================================================
function ConfirmModal({ title, message, confirmLabel, destructive, busy, onConfirm, onCancel }) {
  return (
    <div className="arke-modal-backdrop" onClick={busy ? null : onCancel}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 440 }}>
        <h2 style={{ ...brandTitle(), marginTop: 0, fontSize: 22 }}>{title}</h2>
        <p style={{ color: C.text, fontSize: 14, lineHeight: 1.5, marginBottom: 24 }}>{message}</p>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
          <button onClick={onCancel} disabled={busy} style={btnGhost()}>Cancel</button>
          <button
            onClick={onConfirm}
            disabled={busy}
            style={{
              ...btn(busy),
              background: destructive ? (busy ? C.line : C.redStatus) : (busy ? C.line : C.red),
            }}
          >
            {busy ? 'Working…' : (confirmLabel || 'Confirm')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MEMORABLE PASSWORD GENERATOR
// 4 word-like syllables + 2 digits — easy to dictate, hard to brute-force.
// Used as default for invite + password reset (always editable).
// ============================================================
function generateMemorablePassword() {
  const syllables = [
    'kar','ven','tor','mes','lin','dor','pel','nav','quil','rax',
    'fen','mil','tor','jex','vol','rip','mor','tan','sek','rud',
    'lev','bin','cor','dax','fil','gor','han','jor','kix','lum',
  ];
  const pick = () => syllables[Math.floor(Math.random() * syllables.length)];
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  const digits = String(10 + Math.floor(Math.random() * 90));
  return cap(pick()) + pick() + '-' + pick() + cap(pick()) + digits;
}

function SettingsCsvPresetsStub()     { return <StubPage title="Settings — CSV presets" subtitle="Saved column mappings for debtor uploads.">CSV preset management — Stage 6.</StubPage>; }

// ============================================================
// LAYOUT PRIMITIVES — ported from furniture form
// ============================================================
function Shell({ children, session }) {
  return (
    <div style={{ minHeight: '100vh', background: C.bg, fontFamily: 'inherit', color: C.text }}>
      <header style={{
        background: C.white, borderBottom: `1px solid ${C.line}`,
        padding: '14px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <a href="#/" style={{ fontSize: 26, color: C.red, fontWeight: 400, letterSpacing: '-0.01em', textDecoration: 'none' }}>arke</a>
        {session && getEmail(session) && (
          <span style={{ fontSize: 13, color: C.muted }}>{getEmail(session)}</span>
        )}
      </header>
      {children}
    </div>
  );
}

function Card({ children }) {
  return <div style={{ background: C.white, border: `1px solid ${C.line}`, borderRadius: 8, padding: 24 }}>{children}</div>;
}

function Section({ title, children }) {
  return (
    <div style={{ background: C.white, border: `1px solid ${C.line}`, borderRadius: 8, marginBottom: 20, overflow: 'hidden' }}>
      <div style={{ padding: '12px 18px', background: C.red, color: C.white }}>
        <div style={{ fontSize: 13, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{title}</div>
      </div>
      <div style={{ padding: 18 }}>{children}</div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>
        {label}
      </label>
      {children}
    </div>
  );
}

function Row({ children }) {
  return <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '6px 0' }}>{children}</div>;
}

function FieldLabel({ children }) {
  return <div style={{ width: 200, fontSize: 13, color: C.text, fontWeight: 500 }}>{children}</div>;
}

function ReadOnlyValue({ value }) {
  return (
    <div style={{
      flex: 1, padding: '8px 10px', background: C.redSoft, border: `1px solid ${C.line}`,
      borderRadius: 4, fontSize: 13, color: value && value !== '—' ? C.text : C.muted, fontWeight: 500,
      fontVariantNumeric: 'tabular-nums', boxSizing: 'border-box', minWidth: 0,
    }}>{value || '—'}</div>
  );
}

function CopyButton({ text, label }) {
  const [copied, setCopied] = useState(false);
  const handleClick = async (e) => {
    e.stopPropagation();
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (err) {
      alert('Could not copy: ' + err.message);
    }
  };
  return (
    <button onClick={handleClick} style={btnGhost()}>
      {copied ? '✓ Copied' : (label || 'Copy')}
    </button>
  );
}

function LoadingMsg({ label }) {
  return <div style={{ maxWidth: 600, margin: '80px auto', textAlign: 'center', color: C.muted }}>{label || 'Loading…'}</div>;
}

function ErrorMsg({ msg }) {
  return (
    <div style={{ maxWidth: 600, margin: '80px auto', padding: '0 32px', textAlign: 'center' }}>
      <div style={{
        background: C.redStatusLight, color: C.redStatus, padding: 20, borderRadius: 8,
        fontSize: 14, borderLeft: `3px solid ${C.redStatus}`,
      }}>{msg}</div>
    </div>
  );
}

function settingsLink() {

  setTimeout(() => {
