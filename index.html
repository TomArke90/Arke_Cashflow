}

function modeBtn(active) {
  return {
    padding: '6px 14px',
    background: active ? C.red : C.white,
    color: active ? C.white : C.text,
    border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600, fontSize: 13,
  };
}

function SplitPrompt({ onCancel, onSplit }) {
  const [n, setN] = useState(4);
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 10px', background: C.bg, border: `1px solid ${C.line}`, borderRadius: 6 }}>

      />

      <button onClick={onCancel} style={{ ...btnGhost(), padding: '4px 10px', fontSize: 12 }}>Cancel</button>
    </div>
  );
}

// ============================================================
// VALUATION SCHEDULE EDITOR
// Stores invoice_value_net directly in DB. Claim count derived from row count.
// Brief specifies no enforced sum, but we show sum vs project value for sanity.
// ============================================================
function ValuationScheduleEditor({ access, project, setProject, onBack, onNext }) {
  const [rows, setRows] = useState(null);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [askGen, setAskGen] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const list = await sbSelect('project_invoices',
          `project_id=eq.${project.id}&order=sequence.asc`,
          access.session);
        setRows(list.map((r, i) => ({
          _key: r.id || `existing-${i}-${Math.random()}`,
          id: r.id,
          sequence: r.sequence,
          invoice_date: r.invoice_date || '',
          payment_date_override: r.payment_date_override || '',
          invoice_value_net: r.invoice_value_net == null ? '' : r.invoice_value_net,
          notes: r.notes || '',
        })));
      } catch (e) { setError(e.message); }
    })();
  }, [project.id, access.session]);

  if (rows === null) return <LoadingMsg label="Loading schedule…" />;

  const projectValue = Number(project.value) || 0;
  const sumGbp = rows.reduce((s, r) => s + (Number(r.invoice_value_net) || 0), 0);

  const addRow = () => {
    setRows(prev => [...prev, {
      _key: `new-${Date.now()}-${Math.random()}`,
      id: null,
      sequence: prev.length + 1,
      invoice_date: '',
      payment_date_override: '',
      invoice_value_net: '',
      notes: '',
    }]);
  };

  const removeRow = (key) => {
    setRows(prev => prev.filter(r => r._key !== key).map((r, i) => ({ ...r, sequence: i + 1 })));
  };

  const updateRow = (key, field, value) => {
    setRows(prev => prev.map(r => r._key === key ? { ...r, [field]: value } : r));
  };

  const generate = (n, amount) => {
    // Walk forward from First Valuation Date in valuation_cycle_days steps.
    const start = project.first_valuation_date ? new Date(project.first_valuation_date) : new Date();
    const cycle = Number(project.valuation_cycle_days) || 30;
    const newRows = [];
    for (let i = 0; i < n; i++) {
      const valuationDate = new Date(start.getTime() + i * cycle * 86400 * 1000);
      // Invoice date = valuation date + review period
      const review = Number(project.review_period_days) || 0;
      const invoiceDate = new Date(valuationDate.getTime() + review * 86400 * 1000);
      newRows.push({
        _key: `gen-${Date.now()}-${i}-${Math.random()}`,
        id: null,
        sequence: i + 1,
        invoice_date: invoiceDate.toISOString().slice(0, 10),
        payment_date_override: '',
        invoice_value_net: amount,
        notes: `Claim ${i + 1}`,
      });
    }
    setRows(newRows);
    setAskGen(false);
  };

  const save = async () => {
    if (rows.length === 0) { setError('Add at least one claim.'); return; }
    if (rows.some(r => !r.invoice_date)) { setError('Every claim needs an invoice date.'); return; }
    if (rows.some(r => r.invoice_value_net === '' || Number(r.invoice_value_net) <= 0)) {
      setError('Every claim needs a positive value.'); return;
    }
    const bad = rows.find(r => r.payment_date_override && cmpDate(r.payment_date_override, r.invoice_date) < 0);
    if (bad) { setError(`Claim ${bad.sequence}: payment date is before the invoice date.`); return; }
    setBusy(true); setError('');
    try {
      await sbDelete('project_invoices', `project_id=eq.${project.id}`, access.session);
      const inserts = rows.map(r => ({
        project_id: project.id,
        sequence: r.sequence,
        invoice_date: r.invoice_date,
        payment_date_override: r.payment_date_override || null,
        invoice_pct: null,
        invoice_value_net: Number(r.invoice_value_net),
        notes: r.notes || null,
      }));
      if (inserts.length > 0) await sbInsert('project_invoices', inserts, access.session);
      onNext();
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };

  return (
    <Card>
      <h2 style={{ marginTop: 0, fontSize: 18, color: C.text }}>Valuation claims</h2>
      <p style={{ color: C.muted, fontSize: 13, marginTop: 4, marginBottom: 20 }}>
        Estimated claims for this project. Sum is informational — valuations are estimates, not contracts.
      </p>

      <div style={{ display: 'flex', gap: 8, marginBottom: 12, alignItems: 'center', flexWrap: 'wrap' }}>
        <button onClick={addRow} style={btnGhost()}>+ Add claim</button>
        <button onClick={() => setAskGen(true)} style={btnGhost()}>Generate N claims at £X each…</button>
        {askGen && <ValGenPrompt project={project} onCancel={() => setAskGen(false)} onGenerate={generate} />}
      </div>

      {rows.length === 0 ? (
        <div style={{ padding: 30, textAlign: 'center', color: C.muted, fontSize: 13, border: `1px dashed ${C.line}`, borderRadius: 6 }}>
          No claims yet. Add one above or generate a schedule.
        </div>
      ) : (
        <div style={{ overflowX: 'auto' }}>
          <div style={{ minWidth: 1050 }}>
            <ScheduleHeaderRow isStage={false} />
            {rows.map(r => (
              <ValuationRowEditor
                key={r._key} row={r}
                project={project}
                onChange={(field, value) => updateRow(r._key, field, value)}
                onRemove={() => removeRow(r._key)}
              />
            ))}
            <ScheduleSumRow
              rows={rows} project={project} isStage={false}
            />
            <div style={{ fontSize: 12, color: C.muted, padding: '6px 4px', textAlign: 'right' }}>
              Project value: £{fmtMoney(projectValue)}
              {projectValue > 0 && sumGbp > 0 && (
                <span style={{ marginLeft: 6 }}>· claims at {(sumGbp / projectValue * 100).toFixed(1)}% of value</span>
              )}
            </div>
          </div>
        </div>
      )}

      {error && (
        <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginTop: 12, borderLeft: `3px solid ${C.redStatus}` }}>
          {error}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between', marginTop: 20 }}>
        <button onClick={onBack} style={btnGhost()}>← Back</button>
        <button onClick={save} disabled={busy || rows.length === 0} style={btn(busy || rows.length === 0)}>
          {busy ? 'Saving…' : 'Save & continue →'}
        </button>
      </div>
    </Card>
  );
}

function ValuationRowEditor({ row, project, onChange, onRemove }) {
  const terms = Number(project.payment_terms_days) || 30;
  const startDate = project.start_date || null;
  const endDate = project.end_date || null;
  const computedPayment = row.invoice_date ? addDays(row.invoice_date, terms) : '';

  let invoiceWarning = null;
  if (row.invoice_date && startDate && cmpDate(row.invoice_date, startDate) < 0) {
    invoiceWarning = 'Before project start';
  } else if (row.invoice_date && endDate && cmpDate(row.invoice_date, endDate) > 0) {
    invoiceWarning = 'After project end';
  }
  const paymentBeforeInvoice =
    row.payment_date_override && row.invoice_date
    && cmpDate(row.payment_date_override, row.invoice_date) < 0;

  const bd = computeRowBreakdown(row, project, false);

  return (
    <div style={{
      display: 'grid', gridTemplateColumns: VAL_GRID,
      gap: 8, padding: '6px 4px', alignItems: 'flex-start',
    }}>
      <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, paddingTop: 8 }}>{row.sequence}</div>
      <DateField
        value={row.invoice_date}
        onChange={(v) => onChange('invoice_date', v)}
        min={startDate || undefined}
        warning={invoiceWarning}
      />
      <OverrideDateField
        value={row.payment_date_override}
        defaultValue={computedPayment}
        onChange={(v) => onChange('payment_date_override', v)}
        defaultHintText={`payment terms (+${terms} days)`}
        min={row.invoice_date || undefined}
        warning={paymentBeforeInvoice ? 'Before invoice date' : null}
        error={paymentBeforeInvoice}
      />
      <NumberInput value={row.invoice_value_net} onChange={(v) => onChange('invoice_value_net', v)} step="0.01" align="right" />
      <DerivedMoneyCell value={bd.retention === 0 ? 0 : -bd.retention} color={bd.retention > 0 ? C.redStatus : undefined} />
      <DerivedMoneyCell value={bd.subtotal} />
      <DerivedMoneyCell value={bd.vat} />
      <DerivedMoneyCell value={bd.total} bold color={C.green} />
      <input value={row.notes} onChange={(e) => onChange('notes', e.target.value)} style={inp()} placeholder="Optional" />
      <button onClick={onRemove} style={{ ...miniBtn(), color: C.redStatus, padding: '6px 8px' }}>×</button>
    </div>
  );
}

function ValGenPrompt({ project, onCancel, onGenerate }) {
  const [n, setN] = useState(6);
  const projectValue = Number(project.value) || 0;
  const [amount, setAmount] = useState(projectValue > 0 ? Math.round(projectValue / n) : 0);
  // Re-default amount whenever n changes (only on user-typed n changes really; cheap to allow)
  const handleN = (nv) => {
    const newN = Math.max(1, Math.min(60, Number(nv) || 1));
    setN(newN);
    if (projectValue > 0) setAmount(Math.round(projectValue / newN));
  };
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 10px', background: C.bg, border: `1px solid ${C.line}`, borderRadius: 6, flexWrap: 'wrap' }}>
      <span style={{ fontSize: 12, color: C.muted }}>How many?</span>
      <input type="number" value={n} min="1" max="60" onChange={(e) => handleN(e.target.value)} style={{ ...inp(), width: 60, padding: '4px 6px', fontSize: 13 }} autoFocus />
      <span style={{ fontSize: 12, color: C.muted }}>at £</span>
      <input type="number" value={amount} step="0.01" onChange={(e) => setAmount(Number(e.target.value) || 0)} style={{ ...inp(), width: 100, padding: '4px 6px', fontSize: 13, textAlign: 'right' }} />
      <span style={{ fontSize: 12, color: C.muted }}>each</span>
      <button onClick={() => onGenerate(n, amount)} style={{ ...btn(false), padding: '4px 10px', fontSize: 12 }}>Generate</button>
      <button onClick={onCancel} style={{ ...btnGhost(), padding: '4px 10px', fontSize: 12 }}>Cancel</button>
    </div>
  );
}

function DateInput({ value, onChange, placeholder, disabled, min, max }) {
  // <input type="date"> ignores the `placeholder` attribute in every browser
  // (W3C quirk). For "auto: 15 Aug 2026" style hints, use <DateField> instead,
  // which renders the hint below the input. The placeholder prop here is kept
  // for API symmetry only; effectively a no-op.
  return (
    <input
      type="date"
      value={value || ''}
      onChange={(e) => onChange(e.target.value)}
      disabled={disabled}
      placeholder={placeholder}
      min={min || undefined}
      max={max || undefined}
      style={{ ...inp(disabled), fontFamily: 'inherit' }}
    />
  );
}

// DateField — a DateInput with optional hint (sub-label) and warning (red).
// `hint` is shown when value is empty and a default would apply.
// `warning` is shown when the chosen value is outside the allowed range.
// If `error` is true the warning text shows in red; otherwise amber.
function DateField({ value, onChange, disabled, min, max, hint, warning, error }) {
  return (
    <div style={{ minWidth: 0 }}>
      <DateInput value={value} onChange={onChange} disabled={disabled} min={min} max={max} />
      {(!value && hint) && (
        <div style={{ fontSize: 11, color: C.muted, marginTop: 3, fontStyle: 'italic' }}>{hint}</div>
      )}
      {warning && (
        <div style={{ fontSize: 11, color: error ? C.redStatus : C.amber, marginTop: 3, fontWeight: 500 }}>
          ⚠ {warning}
        </div>
      )}
    </div>
  );
}

// OverrideDateField — three-state input for payment date overrides.
//   value           = the saved override (string '' if none)
//   defaultValue    = the computed default to show when no override is set
//   defaultHintText = the explanatory line under the field (e.g. "payment terms (+30 days)")
//   min             = lower bound on the date picker (e.g. invoice_date)
//   warning/error   = passed through to the warning line below the field
// States:
//   1. Default      — value empty. Shows defaultValue greyed-out & read-only, pencil icon to edit.
//   2. Editing      — pencil just clicked; input becomes a regular date picker pre-filled with default.
//                     Revert × visible. Picker stays "active" until blur away from the row.
//   3. Overridden   — value set, not in editing mode. Black text, pencil + revert, "was DEFAULT" line.
function OverrideDateField({ value, defaultValue, onChange, defaultHintText, min, warning, error }) {
  const [isEditing, setIsEditing] = useState(false);

  const hasOverride = !!value;
  // Drop out of editing mode when the user clears the override
  useEffect(() => {
    if (!hasOverride && isEditing) setIsEditing(false);
  }, [hasOverride, isEditing]);

  const startEditing = () => {
    // Seed the override with the default so the picker has something sensible.
    // If user then changes it, that's the new override; if they don't, revert
    // returns it to empty.
    if (!hasOverride && defaultValue) {
      onChange(defaultValue);
    }
    setIsEditing(true);
  };

  const revert = () => {
    onChange('');
    setIsEditing(false);
  };

  const showAsEditable = isEditing || hasOverride;

  // ICON BUTTONS shared across states
  const PencilButton = (
    <button
      type="button"
      onClick={startEditing}
      title="Override payment date"
      style={iconBtn()}
    >
      ✎
    </button>
  );
  const RevertButton = (
    <button
      type="button"
      onClick={revert}
      title="Use payment terms default"
      style={{ ...iconBtn(), color: C.redStatus }}
    >
      ✕
    </button>
  );

  return (
    <div style={{ minWidth: 0 }}>
      <div style={{ display: 'flex', gap: 4, alignItems: 'stretch' }}>
        {showAsEditable ? (
          // States 2 & 3 — real editable date picker
          <input
            type="date"
            value={value || defaultValue || ''}
            onChange={(e) => onChange(e.target.value)}
            min={min || undefined}
            autoFocus={isEditing && !hasOverride}
            style={{
              ...inp(false), fontFamily: 'inherit', flex: 1,
              // Once overridden the text is black; in editing mode it's also black
              color: C.text, fontWeight: 500,
            }}
          />
        ) : (
          // State 1 — default. Read-only-looking, greyed out, click toggles edit
          <div
            onClick={startEditing}
            style={{
              ...inp(true), flex: 1, cursor: 'pointer',
              fontFamily: 'inherit', fontVariantNumeric: 'tabular-nums',
              display: 'flex', alignItems: 'center',
              color: C.muted, background: C.bg,
            }}
            title="Click pencil to override"
          >
            {defaultValue ? fmtDateShort(defaultValue) : '—'}
          </div>
        )}
        {hasOverride ? (
          <React.Fragment>
            {!isEditing && PencilButton}
            {RevertButton}
          </React.Fragment>
        ) : (
          PencilButton
        )}
      </div>

      {/* Sub-line: defaultHintText in state 1, "was X" in state 3 (or 2 if user has typed) */}
      {!hasOverride && defaultHintText && (
        <div style={{ fontSize: 11, color: C.muted, marginTop: 3, fontStyle: 'italic' }}>
          {defaultHintText}
        </div>
      )}
      {hasOverride && (
        <div style={{ fontSize: 11, color: C.muted, marginTop: 3, fontStyle: 'italic' }}>
          overridden — default was {defaultValue ? fmtDateShort(defaultValue) : '—'}
        </div>
      )}

      {warning && (
        <div style={{ fontSize: 11, color: error ? C.redStatus : C.amber, marginTop: 3, fontWeight: 500 }}>
          ⚠ {warning}
        </div>
      )}
    </div>
  );
}

function SettingsUsersPage({ access }) {
  const [users, setUsers] = useState(null);
  const [error, setError] = useState(null);
  const [showInvite, setShowInvite] = useState(false);
  const [resetTarget, setResetTarget] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [busy, setBusy] = useState(false);
  const [flash, setFlash] = useState(null); // { kind: 'ok'|'err', msg: string }

  const refetch = useCallback(async () => {
    try {
      const rows = await sbSelect('cashflow_users',
        'select=*&order=role.asc,added_at.desc', access.session);
      setUsers(rows);
    } catch (e) { setError(e.message); }
  }, [access.session]);

  useEffect(() => { refetch(); }, [refetch]);

  const showFlash = (kind, msg) => {
    setFlash({ kind, msg });
    setTimeout(() => setFlash(null), 5000);
  };

  // Cached: how many active editors exist? Used to disable destructive actions
  // that would leave the system with no editors.
  const activeEditorCount = useMemo(() => {
    if (!users) return 0;
    return users.filter(u => u.role === 'editor' && u.active).length;
  }, [users]);

  const myUserId = access.session && access.session.user && access.session.user.id;

  const toggleActive = async (u) => {
    // Guardrails
    if (u.user_id === myUserId && u.active) {
      showFlash('err', 'You cannot deactivate your own account.');
      return;
    }
    if (u.active && u.role === 'editor' && activeEditorCount === 1) {
      showFlash('err', 'Cannot deactivate the last active editor.');
      return;
    }
    setBusy(true);
    try {
      await sbUpdate('cashflow_users', `id=eq.${u.id}`, { active: !u.active }, access.session);
      showFlash('ok', `${u.email} ${!u.active ? 'reactivated' : 'deactivated'}.`);
      await refetch();
    } catch (e) {
      showFlash('err', 'Could not update: ' + e.message);
    } finally { setBusy(false); }
  };

  const changeRole = async (u, newRole) => {
    if (u.user_id === myUserId && u.role === 'editor' && newRole === 'contributor') {
      showFlash('err', 'You cannot demote yourself.');
      return;
    }
    if (u.role === 'editor' && newRole === 'contributor' && u.active && activeEditorCount === 1) {
      showFlash('err', 'Cannot demote the last active editor.');
      return;
    }
    setBusy(true);
    try {
      await sbUpdate('cashflow_users', `id=eq.${u.id}`, { role: newRole }, access.session);
      showFlash('ok', `${u.email} is now a ${newRole}.`);
      await refetch();
    } catch (e) {
      showFlash('err', 'Could not change role: ' + e.message);
    } finally { setBusy(false); }
  };

  const deleteUser = async (u) => {
    setBusy(true);
    try {
      await callEdgeFunction('manage-users', {
        action: 'delete',
        user_id: u.user_id,
      }, access.session);
      showFlash('ok', `${u.email} removed.`);
      await refetch();
    } catch (e) {
      showFlash('err', 'Could not remove: ' + e.message);
    } finally {
      setBusy(false);
      setConfirm(null);
    }
  };

  if (error) return <ErrorMsg msg={error} />;

  return (
    <div style={{ maxWidth: 1080 }}>
      <BackLink href={buildHash(['settings'])}>Settings</BackLink>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <h1 style={brandTitle()}>Users & access</h1>
          <p style={{ color: C.muted, fontSize: 14, margin: 0 }}>
            Editors can do everything. Contributors only see projects they're assigned to.
          </p>
        </div>
        <button onClick={() => setShowInvite(true)} style={btn(busy)}>
          + Invite user
        </button>
      </div>

      {flash && (
        <div style={{
          padding: '10px 14px', marginBottom: 16, borderRadius: 6,
          background: flash.kind === 'ok' ? C.greenLight : C.redStatusLight,
          color: flash.kind === 'ok' ? C.green : C.redStatus,
          borderLeft: `3px solid ${flash.kind === 'ok' ? C.green : C.redStatus}`,
          fontSize: 13,
        }}>{flash.msg}</div>
      )}

      {users === null ? <LoadingMsg label="Loading users…" /> : (
        <div style={{ background: C.white, border: `1px solid ${C.line}`, borderRadius: 8, overflow: 'hidden' }}>
          <div style={{
            display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1.5fr 1.2fr',
            gap: 12, padding: '12px 18px', background: C.redSoft,
            borderBottom: `1px solid ${C.line}`,
            fontSize: 11, color: C.muted, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em',
          }}>
            <div>User</div>
            <div>Role</div>
            <div>Status</div>
            <div>Added</div>
            <div style={{ textAlign: 'right' }}>Actions</div>
          </div>
          {users.length === 0 && (
            <div style={{ padding: 40, textAlign: 'center', color: C.muted, fontSize: 13 }}>
              No users yet. Click "Invite user" to add the first.
            </div>
          )}
          {users.map(u => (
            <UserRow
              key={u.id}
              user={u}
              isSelf={u.user_id === myUserId}
              activeEditorCount={activeEditorCount}
              busy={busy}
              onToggleActive={() => toggleActive(u)}
              onChangeRole={(r) => changeRole(u, r)}
              onResetPassword={() => setResetTarget(u)}
              onDelete={() => setConfirm({
                title: 'Remove user',
                message: `Permanently remove ${u.email}? They'll lose access immediately. Their record will be deleted from auth and the cashflow user list. Project history isn't affected.`,
                confirmLabel: 'Remove',
                destructive: true,
                onConfirm: () => deleteUser(u),
              })}
            />
          ))}
        </div>
      )}

      {showInvite && (
        <InviteUserModal
          session={access.session}
          onClose={() => setShowInvite(false)}
          onCreated={async (msg) => { showFlash('ok', msg); await refetch(); }}
        />
      )}
      {resetTarget && (
        <ResetPasswordModal
          session={access.session}
          target={resetTarget}
          onClose={() => setResetTarget(null)}
          onDone={(msg) => { showFlash('ok', msg); setResetTarget(null); }}
        />
      )}
      {confirm && (
        <ConfirmModal
          {...confirm}
          busy={busy}
          onCancel={() => setConfirm(null)}
        />
      )}
    </div>
  );
}

function UserRow({ user, isSelf, activeEditorCount, busy, onToggleActive, onChangeRole, onResetPassword, onDelete }) {
  const roleBadge = user.role === 'editor'
    ? { bg: C.redLight, fg: C.red, label: 'Editor' }
    : { bg: C.prussianLight, fg: C.prussian, label: 'Contributor' };
  const statusBadge = user.active
    ? { bg: C.greenLight, fg: C.green, label: 'Active' }
    : { bg: C.line, fg: C.muted, label: 'Deactivated' };

  // Guardrails for the role dropdown
  const cantDemote =
    isSelf
    || (user.role === 'editor' && user.active && activeEditorCount === 1);
  const cantDeactivate =
    isSelf
    || (user.role === 'editor' && user.active && activeEditorCount === 1);

  return (
    <div style={{
      display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1.5fr 1.2fr',
      gap: 12, padding: '14px 18px', borderBottom: `1px solid ${C.line}`,
      alignItems: 'center', fontSize: 13,
    }}>
      <div>
        <div style={{ fontWeight: 600, marginBottom: 2 }}>
          {user.display_name || user.email}
          {isSelf && <span style={{ marginLeft: 6, fontSize: 10, color: C.muted, fontWeight: 500 }}>(you)</span>}
        </div>
        {user.display_name && (
          <div style={{ fontSize: 11, color: C.muted }}>{user.email}</div>
        )}
      </div>
      <div>
        <select
          value={user.role}
          onChange={(e) => onChangeRole(e.target.value)}
          disabled={busy || (cantDemote && user.role === 'editor')}
          style={{ ...inp(busy), padding: '6px 8px', fontSize: 12 }}
        >
          <option value="editor">Editor</option>
          <option value="contributor">Contributor</option>
        </select>
      </div>
      <div>
        <span style={{
          background: statusBadge.bg, color: statusBadge.fg,
          padding: '3px 10px', borderRadius: 10,
          fontSize: 11, fontWeight: 600,
        }}>
          ● {statusBadge.label}
        </span>
      </div>
      <div style={{ fontSize: 12, color: C.muted }}>
        {timeAgo(user.added_at)}
        {user.added_by_email && <div style={{ fontSize: 11 }}>by {user.added_by_email}</div>}
      </div>
      <div style={{ textAlign: 'right', display: 'flex', gap: 6, justifyContent: 'flex-end', flexWrap: 'wrap' }}>
        <button
          onClick={onToggleActive}
          disabled={busy || (user.active && cantDeactivate)}
          style={{ ...miniBtn(), color: user.active ? C.amber : C.green }}
          title={cantDeactivate && user.active ? 'Cannot deactivate the last active editor or yourself' : ''}
        >
          {user.active ? 'Deactivate' : 'Reactivate'}
        </button>
        <button onClick={onResetPassword} disabled={busy || isSelf} style={miniBtn()} title={isSelf ? 'Use your account settings to change your own password' : ''}>
          Reset pw
        </button>
        <button onClick={onDelete} disabled={busy || isSelf} style={{ ...miniBtn(), color: C.redStatus }}>
          Remove
        </button>
      </div>
    </div>
  );
}

function InviteUserModal({ session, onClose, onCreated }) {
  const [email, setEmail] = useState('');
  const [displayName, setDisplayName] = useState('');
  const [role, setRole] = useState('contributor');
  const [password, setPassword] = useState(generateMemorablePassword());
  const [showPassword, setShowPassword] = useState(true);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [done, setDone] = useState(null); // { email, password }

  // Email validation: just the Arke domain + a sensible local part.
  const emailValid = /^[^\s@]+@arkecreative\.co\.uk$/i.test(email.trim());
  const canSubmit = emailValid && password.length >= 8 && !busy;

  const submit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setError(''); setBusy(true);
    try {
      await callEdgeFunction('manage-users', {
        action: 'create',
        email: email.trim().toLowerCase(),
        display_name: displayName.trim() || null,
        role,
        password,
      }, session);
      // Hold the modal open at a "done" screen showing the credentials once.
      setDone({ email: email.trim().toLowerCase(), password });
      onCreated(`Invited ${email.trim().toLowerCase()} as ${role}.`);
    } catch (err) {
      setError(err.message);
    } finally { setBusy(false); }
  };

  if (done) {
    return (
      <div className="arke-modal-backdrop" onClick={onClose}>
        <div className="arke-modal" onClick={(e) => e.stopPropagation()}>
          <h2 style={{ ...brandTitle(), marginTop: 0, fontSize: 22 }}>✓ User created</h2>
          <p style={{ color: C.muted, fontSize: 13, marginBottom: 16 }}>
            Send these credentials to the user out-of-band (Slack DM, in person, etc).
            The password is shown once — copy it now, we can't recover it later.
          </p>
          <Field label="Email">
            <div style={{ display: 'flex', gap: 8 }}>
              <input readOnly value={done.email} onFocus={(e) => e.target.select()} style={{ ...inp(), fontFamily: 'monospace', fontSize: 12 }} />
              <CopyButton text={done.email} />
            </div>
          </Field>
          <Field label="Password (shown once)">
            <div style={{ display: 'flex', gap: 8 }}>
              <input readOnly value={done.password} onFocus={(e) => e.target.select()} style={{ ...inp(), fontFamily: 'monospace', fontSize: 16, letterSpacing: '0.05em' }} />
              <CopyButton text={done.password} />
            </div>
          </Field>
          <div style={{ background: C.amberLight, padding: 12, borderRadius: 6, fontSize: 12, marginTop: 12, borderLeft: `3px solid ${C.amber}` }}>
            Once this dialog closes, the password is gone. The user can change it after signing in, or you can reset it from the Users page if it goes missing.
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 18 }}>
            <button onClick={onClose} style={btn(false)}>Done</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="arke-modal-backdrop" onClick={onClose}>
      <div className="arke-modal" onClick={(e) => e.stopPropagation()}>
        <h2 style={{ ...brandTitle(), marginTop: 0, fontSize: 22 }}>Invite user</h2>
        <p style={{ color: C.muted, fontSize: 13, marginBottom: 18 }}>
          Creates the user with the password you set. Send them the credentials separately.
        </p>
        <form onSubmit={submit}>
          <Field label="Arke email">
            <input
              type="email" value={email}
              onChange={(e) => setEmail(e.target.value)}
              autoFocus style={inp()}
              placeholder="firstname@arkecreative.co.uk"
            />
            {email && !emailValid && (
              <div style={{ color: C.redStatus, fontSize: 12, marginTop: 4 }}>
                Must end in {ARKE_DOMAIN}
              </div>
            )}
          </Field>
          <Field label="Display name (optional)">
            <input value={displayName} onChange={(e) => setDisplayName(e.target.value)} style={inp()} placeholder="First Last" />
          </Field>
          <Field label="Role">
            <div style={{ display: 'flex', gap: 8 }}>
              <RoleOption selected={role === 'contributor'} onClick={() => setRole('contributor')} label="Contributor" description="Project access only" />
              <RoleOption selected={role === 'editor'} onClick={() => setRole('editor')} label="Editor" description="Full access" />
            </div>
          </Field>
          <Field label="Password (≥ 8 characters)">
            <div style={{ display: 'flex', gap: 8 }}>
              <input
                type={showPassword ? 'text' : 'password'}
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                style={{ ...inp(), fontFamily: 'monospace' }}
              />
              <button type="button" onClick={() => setPassword(generateMemorablePassword())} style={btnGhost()} title="Regenerate">↻</button>
              <button type="button" onClick={() => setShowPassword(s => !s)} style={btnGhost()}>
                {showPassword ? 'Hide' : 'Show'}
              </button>
            </div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>
              Auto-generated. Editable.
            </div>
          </Field>
          {error && (
            <div style={{ background: C.redStatusLight, color: C.redStatus, padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12, borderLeft: `3px solid ${C.redStatus}` }}>
              {error}
            </div>
          )}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 4 }}>
            <button type="button" onClick={onClose} style={btnGhost()}>Cancel</button>
            <button type="submit" disabled={!canSubmit} style={btn(!canSubmit)}>
              {busy ? 'Creating…' : 'Create user'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ============================================================
// MEMORABLE PASSWORD GENERATOR
// 4 word-like syllables + 2 digits — easy to dictate, hard to brute-force.
// Used as default for invite + password reset (always editable).
// ============================================================
function generateMemorablePassword() {
  const syllables = [
    'kar','ven','tor','mes','lin','dor','pel','nav','quil','rax',
    'fen','mil','tor','jex','vol','rip','mor','tan','sek','rud',
    'lev','bin','cor','dax','fil','gor','han','jor','kix','lum',
  ];
  const pick = () => syllables[Math.floor(Math.random() * syllables.length)];
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  const digits = String(10 + Math.floor(Math.random() * 90));
  return cap(pick()) + pick() + '-' + pick() + cap(pick()) + digits;
}

function CopyButton({ text, label }) {
  const [copied, setCopied] = useState(false);
  const handleClick = async (e) => {

      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (err) {
      alert('Could not copy: ' + err.message);
    }
  };
  return (
    <button onClick={handleClick} style={btnGhost()}>
      {copied ? '✓ Copied' : (label || 'Copy')}
    </button>
  );
}

// MOUNT
// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

requestAnimationFrame(() => {
  setTimeout(() => {
    const splash = document.getElementById('splash');
    if (splash) {
      splash.classList.add('hide');
      setTimeout(() => splash.remove(), 350);
    }
  }, 100);
});
</script>
